<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giriş</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 18px;
      color: #64748b;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #475569;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      margin-bottom: 14px;
      font-size: 14px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }
    button[disabled] {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .hidden {
      display: none;
    }
    .msg {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }
    .msg.show {
      display: block;
    }
    .msg.error {
      background: #fee2e2;
      color: #991b1b;
    }
    .msg.ok {
      background: #dcfce7;
      color: #166534;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Giriş</h1>
    <p>Admin alanına erişmek için giriş yap.</p>

    <div id="message" class="msg"></div>

    <form id="loginForm">
      <label for="username">Kullanıcı adı</label>
      <input id="username" name="username" type="text" autocomplete="username" required />

      <label for="password">Şifre</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button id="loginBtn" type="submit">Kod Gönder</button>
    </form>

    <form id="verifyForm" class="hidden" style="margin-top:16px;">
      <label for="code">Mail doğrulama kodu</label>
      <input id="code" name="code" type="text" inputmode="numeric" maxlength="6" placeholder="6 haneli kod" required />

      <button id="verifyBtn" type="submit">Doğrula</button>
    </form>
  </div>

  <script>
    let currentLoginId = "";

    function showMessage(text, type) {
      const box = document.getElementById("message");
      box.className = "msg show " + type;
      box.textContent = text;
    }

    async function checkExistingSession() {
      try {
        const res = await fetch("/api/verify", {
          method: "GET",
          credentials: "same-origin",
          headers: { "Accept": "application/json" }
        });

        const data = await res.json();
        if (data.ok && data.authenticated) {
          window.location.replace("/admin/index.html");
        }
      } catch (err) {}
    }

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const loginBtn = document.getElementById("loginBtn");
      loginBtn.disabled = true;

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!data.ok) {
          showMessage(data.error || "Giriş başarısız.", "error");
          loginBtn.disabled = false;
          return;
        }

        currentLoginId = data.loginId || "";
        document.getElementById("verifyForm").classList.remove("hidden");
        showMessage("Kod mail adresine gönderildi.", "ok");
      } catch (err) {
        showMessage("İstek sırasında hata oluştu.", "error");
      }

      loginBtn.disabled = false;
    });

    document.getElementById("verifyForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const verifyBtn = document.getElementById("verifyBtn");
      verifyBtn.disabled = true;

      const code = document.getElementById("code").value.trim();

      try {
        const res = await fetch("/api/verify", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({
            loginId: currentLoginId,
            code
          })
        });

        const data = await res.json();

        if (!data.ok) {
          showMessage(data.error || "Kod doğrulama başarısız.", "error");
          verifyBtn.disabled = false;
          return;
        }

        window.location.replace("/admin/index.html");
      } catch (err) {
        showMessage("İstek sırasında hata oluştu.", "error");
      }

      verifyBtn.disabled = false;
    });

    checkExistingSession();
  </script>
</body>
</html>

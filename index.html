<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9fafb;
      color: #1f2937;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 1100px;
      margin: auto;
      padding: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 26px;
      margin: 0;
      color: #2563eb;
    }
    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      gap: 12px;
      margin: 0 0 24px 0;
      flex-wrap: wrap;
    }
    nav li {
      cursor: pointer;
      padding: 8px 14px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
      color: #374151;
      border: 1px solid #dbeafe;
      background: #ffffff;
    }
    nav li:hover {
      background: #eff6ff;
    }
    nav li.active {
      background: #2563eb;
      color: #ffffff;
      border-color: #2563eb;
    }
    main {
      background: #ffffff;
      padding: 24px;
      border-radius: 14px;
      min-height: 320px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .admin-link {
      color: #2563eb;
      text-decoration: none;
      font-weight: bold;
    }
    .muted {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Site Başlığı</h1>
      <a href="/login.html" class="admin-link">Yönetici Girişi</a>
    </header>

    <nav>
      <ul id="menuList"></ul>
    </nav>

    <main id="content">Yükleniyor...</main>
  </div>

  <script>
    let menus = [];
    let pages = [];

    function getQueryPage() {
      const url = new URL(window.location.href);
      return url.searchParams.get("page");
    }

    function setQueryPage(slug) {
      const url = new URL(window.location.href);
      url.searchParams.set("page", slug);
      window.history.replaceState({}, "", url.toString());
    }

    function renderContent(page) {
      const content = document.getElementById("content");

      if (!page) {
        content.innerHTML = "<h2>Sayfa bulunamadı</h2><p class='muted'>İçerik mevcut değil.</p>";
        document.title = "Sayfa bulunamadı";
        return;
      }

      if (page.seoTitle) {
        document.title = page.seoTitle;
      } else {
        document.title = page.title || "Site";
      }

      const safeDescription = page.seoDescription || "";
      let meta = document.querySelector('meta[name="description"]');
      if (!meta) {
        meta = document.createElement("meta");
        meta.name = "description";
        document.head.appendChild(meta);
      }
      meta.content = safeDescription;

      content.innerHTML = `
        <h2>${page.title || ""}</h2>
        <div>${page.content || ""}</div>
      `;
    }

    function activateMenu(menuSlug) {
      document.querySelectorAll("#menuList li").forEach((li) => {
        li.classList.remove("active");
        if (li.dataset.slug === menuSlug) {
          li.classList.add("active");
        }
      });
    }

    function renderMenus() {
      const list = document.getElementById("menuList");
      list.innerHTML = "";

      if (!menus.length) {
        list.innerHTML = "<li class='muted' style='cursor:default;'>Menü bulunamadı</li>";
        document.getElementById("content").innerHTML = "<h2>İçerik yok</h2><p class='muted'>Henüz menü tanımlanmamış.</p>";
        return;
      }

      menus.forEach((menu) => {
        const li = document.createElement("li");
        li.textContent = menu.title;
        li.dataset.slug = menu.slug;

        li.addEventListener("click", () => {
          const page = pages.find((p) => p.slug === menu.pageSlug) || null;
          renderContent(page);
          activateMenu(menu.slug);
          if (page?.slug) {
            setQueryPage(page.slug);
          }
        });

        list.appendChild(li);
      });

      const queryPage = getQueryPage();

      if (queryPage) {
        const matchedMenu = menus.find((m) => m.pageSlug === queryPage);
        const matchedPage = pages.find((p) => p.slug === queryPage);
        if (matchedMenu && matchedPage) {
          renderContent(matchedPage);
          activateMenu(matchedMenu.slug);
          return;
        }
      }

      const firstMenu = menus[0];
      const firstPage = pages.find((p) => p.slug === firstMenu.pageSlug) || null;
      renderContent(firstPage);
      activateMenu(firstMenu.slug);
      if (firstPage?.slug) {
        setQueryPage(firstPage.slug);
      }
    }

    async function loadSite() {
      try {
        const [menuRes, pagesRes] = await Promise.all([
          fetch("/api/menu"),
          fetch("/api/pages")
        ]);

        const menuData = await menuRes.json();
        const pagesData = await pagesRes.json();

        menus = (menuData.menus || []).sort((a, b) => (a.order || 0) - (b.order || 0));
        pages = pagesData.pages || [];

        renderMenus();
      } catch (err) {
        document.getElementById("content").textContent = "Veriler yüklenemedi: " + err.message;
      }
    }

    loadSite();
  </script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site</title>
  <style>
    :root {
      --site-bg: #f8fafc;
      --site-text: #0f172a;
      --site-card: #ffffff;
      --site-border: #e2e8f0;
      --site-accent: #2563eb;
      --site-width: 1180px;
      --site-padding: 24px;
      --nav-radius: 999px;
      --main-radius: 18px;
      --main-padding: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--site-bg);
      color: var(--site-text);
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: var(--site-width);
      margin: auto;
      padding: var(--site-padding);
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 26px;
      margin: 0;
      color: var(--site-accent);
    }
    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      gap: 12px;
      margin: 0 0 24px 0;
      flex-wrap: wrap;
    }
    nav li {
      cursor: pointer;
      padding: 9px 14px;
      border-radius: var(--nav-radius);
      transition: background .2s, color .2s, border-color .2s;
      color: #334155;
      border: 1px solid #dbeafe;
      background: #ffffff;
    }
    nav li:hover {
      background: #eff6ff;
    }
    nav li.active {
      background: var(--site-accent);
      color: #ffffff;
      border-color: var(--site-accent);
    }
    main {
      background: var(--site-card);
      padding: var(--main-padding);
      border-radius: var(--main-radius);
      min-height: 360px;
      border: 1px solid var(--site-border);
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
    }
    .admin-link {
      color: var(--site-accent);
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
    }
    .muted {
      color: #64748b;
    }
    .page-shell {
      margin: 0 auto;
      width: 100%;
    }
    .page-shell a {
      color: var(--accent-color, var(--site-accent));
    }
    .page-shell button,
    .page-shell .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: var(--button-color, var(--site-accent));
      color: var(--button-text-color, #ffffff);
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    .page-frame {
      width: 100%;
      min-height: 720px;
      border: 0;
      border-radius: 14px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="siteTitle">Site Başlığı</h1>
      <a href="/login.html" class="admin-link">Yönetici Girişi</a>
    </header>

    <nav>
      <ul id="menuList"></ul>
    </nav>

    <main id="content">Yükleniyor...</main>
  </div>

  <script>
    let menus = [];
    let pages = [];
    let siteSettings = {};

    function getQueryPage() {
      const url = new URL(window.location.href);
      return url.searchParams.get("page");
    }

    function setQueryPage(slug) {
      const url = new URL(window.location.href);
      url.searchParams.set("page", slug);
      window.history.replaceState({}, "", url.toString());
    }

    function ensureMetaDescription(content) {
      let meta = document.querySelector('meta[name="description"]');
      if (!meta) {
        meta = document.createElement("meta");
        meta.name = "description";
        document.head.appendChild(meta);
      }
      meta.content = content || "";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function applySiteSettings(settings) {
      siteSettings = settings || {};
      document.getElementById("siteTitle").textContent = siteSettings.siteTitle || "Site Başlığı";
      document.title = siteSettings.siteTitle || "Site";

      document.documentElement.style.setProperty("--site-bg", siteSettings.siteBg || "#f8fafc");
      document.documentElement.style.setProperty("--site-text", siteSettings.siteText || "#0f172a");
      document.documentElement.style.setProperty("--site-card", siteSettings.siteCard || "#ffffff");
      document.documentElement.style.setProperty("--site-border", siteSettings.siteBorder || "#e2e8f0");
      document.documentElement.style.setProperty("--site-accent", siteSettings.siteAccent || "#2563eb");
      document.documentElement.style.setProperty("--site-width", (siteSettings.headerMaxWidth || 1180) + "px");
      document.documentElement.style.setProperty("--site-padding", (siteSettings.headerPadding || 24) + "px");
      document.documentElement.style.setProperty("--nav-radius", (siteSettings.navRadius || 999) + "px");
      document.documentElement.style.setProperty("--main-radius", (siteSettings.mainRadius || 18) + "px");
      document.documentElement.style.setProperty("--main-padding", (siteSettings.mainPadding || 24) + "px");
    }

    function renderStandardPage(page) {
      const content = document.getElementById("content");
      const s = page.settings || {};
      const accent = s.accentColor || "#2563eb";
      const buttonColor = s.buttonColor || accent;
      const buttonTextColor = s.buttonTextColor || "#ffffff";
      const bg = s.pageBg || "#f8fafc";
      const surface = s.contentBg || "#ffffff";
      const text = s.textColor || "#0f172a";
      const muted = s.mutedColor || "#475569";
      const titleSize = Number(s.titleSize || 40);
      const bodySize = Number(s.bodySize || 17);
      const radius = Number(s.borderRadius || 18);
      const shellMax = Number(s.fullWidth ? 2400 : (s.maxWidth || 1280));
      const shellWidth = Number(s.fullWidth ? 100 : (s.contentWidth || 100));
      const containerPadding = Number(s.containerPadding || 24);
      const sectionGap = Number(s.sectionGap || 18);
      const textAlign = s.textAlign || "left";

      document.body.style.background = bg;
      document.documentElement.style.setProperty("--site-accent", accent);

      const sectionsHtml = (page.sections || []).map((section) => `
        <section
          style="
            width:${Number(section.width || 100)}%;
            max-width:100%;
            background:${section.background || "#ffffff"};
            color:${section.textColor || text};
            padding:${Number(section.padding || 24)}px;
            border-radius:${Number(section.radius || 18)}px;
            margin:0 auto;
          "
        >
          ${section.title ? `<h2 style="margin:0 0 12px;">${section.title}</h2>` : ""}
          <div>${section.content || ""}</div>
        </section>
      `).join("");

      content.innerHTML = `
        <section class="page-shell" style="max-width:${shellMax}px;">
          <article
            style="
              width:${shellWidth}%;
              margin:0 auto;
              background:${surface};
              color:${text};
              border-radius:${radius}px;
              padding:${containerPadding}px;
              text-align:${textAlign};
              font-size:${bodySize}px;
              line-height:1.75;
              --accent-color:${accent};
              --button-color:${buttonColor};
              --button-text-color:${buttonTextColor};
            "
          >
            <header style="margin-bottom:${sectionGap}px;">
              <h2 style="margin:0 0 12px;font-size:${titleSize}px;line-height:1.1;">${page.title || ""}</h2>
              ${page.excerpt ? `<p style="margin:0;color:${muted};">${page.excerpt}</p>` : ""}
            </header>
            <div style="display:flex;flex-direction:column;gap:${sectionGap}px;">
              ${sectionsHtml}
            </div>
          </article>
        </section>
      `;
    }

    function buildIframeDocument(page) {
      const title = escapeHtml(page.seoTitle || page.title || "Özel Sayfa");
      const description = escapeHtml(page.seoDescription || page.excerpt || "");
      const html = page.html || "";
      const css = page.css || "";
      const js = page.js || "";

      return `<!doctype html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${title}</title>
<meta name="description" content="${description}">
<style>
html,body{margin:0;padding:0;font-family:Arial,sans-serif}
${css}
</style>
</head>
<body>
${html}
<script>
${js.replace(/<\/script>/gi, "<\\/script>")}
<\/script>
</body>
</html>`;
    }

    function renderCodePage(page) {
      const content = document.getElementById("content");
      const iframe = document.createElement("iframe");
      iframe.className = "page-frame";
      iframe.setAttribute("sandbox", "allow-scripts allow-forms allow-modals");
      iframe.srcdoc = buildIframeDocument(page);
      content.innerHTML = "";
      content.appendChild(iframe);
    }

    function renderContent(page) {
      if (!page) {
        document.getElementById("content").innerHTML = "<h2>Sayfa bulunamadı</h2><p class='muted'>İçerik mevcut değil.</p>";
        ensureMetaDescription("");
        return;
      }

      document.title = page.seoTitle || page.title || siteSettings.siteTitle || "Site";
      ensureMetaDescription(page.seoDescription || page.excerpt || siteSettings.siteDescription || "");

      if (page.mode === "code") {
        renderCodePage(page);
      } else {
        renderStandardPage(page);
      }
    }

    function activateMenu(menuSlug) {
      document.querySelectorAll("#menuList li").forEach((li) => {
        li.classList.remove("active");
        if (li.dataset.slug === menuSlug) {
          li.classList.add("active");
        }
      });
    }

    function renderMenus() {
      const list = document.getElementById("menuList");
      list.innerHTML = "";

      if (!menus.length) {
        list.innerHTML = "<li class='muted' style='cursor:default;'>Menü bulunamadı</li>";
        document.getElementById("content").innerHTML = "<h2>İçerik yok</h2><p class='muted'>Henüz menü tanımlanmamış.</p>";
        return;
      }

      menus.forEach((menu) => {
        const li = document.createElement("li");
        li.textContent = menu.title;
        li.dataset.slug = menu.slug;

        li.addEventListener("click", () => {
          const page = pages.find((p) => p.slug === menu.pageSlug) || null;
          renderContent(page);
          activateMenu(menu.slug);
          if (page?.slug) setQueryPage(page.slug);
        });

        list.appendChild(li);
      });

      const queryPage = getQueryPage();

      if (queryPage) {
        const matchedMenu = menus.find((m) => m.pageSlug === queryPage);
        const matchedPage = pages.find((p) => p.slug === queryPage);
        if (matchedMenu && matchedPage) {
          renderContent(matchedPage);
          activateMenu(matchedMenu.slug);
          return;
        }
      }

      const firstMenu = menus[0];
      const firstPage = pages.find((p) => p.slug === firstMenu.pageSlug) || null;
      renderContent(firstPage);
      activateMenu(firstMenu.slug);
      if (firstPage?.slug) setQueryPage(firstPage.slug);
    }

    async function loadSite() {
      try {
        const [settingsRes, menuRes, pagesRes] = await Promise.all([
          fetch("/api/settings"),
          fetch("/api/menu"),
          fetch("/api/pages")
        ]);

        const settingsData = await settingsRes.json();
        const menuData = await menuRes.json();
        const pagesData = await pagesRes.json();

        applySiteSettings(settingsData.settings || {});
        menus = (menuData.menus || []).sort((a, b) => (a.order || 0) - (b.order || 0));
        pages = pagesData.pages || [];

        renderMenus();
      } catch (err) {
        document.getElementById("content").textContent = "Veriler yüklenemedi: " + err.message;
      }
    }

    loadSite();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera</title>
  <meta name="description" content="Hoş geldiniz." />
  <style id="baseStyles">
    * { box-sizing: border-box; }

    :root {
      --body-bg: #f8fafc;
      --body-text: #0f172a;
      --border-color: #e2e8f0;
      --primary-color: #2563eb;
      --container-width: 1200px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--body-bg);
      color: var(--body-text);
    }

    a { color: inherit; }

    .site-header {
      border-bottom: 1px solid var(--border-color);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .site-header-inner,
    .site-footer-inner,
    .wrap {
      max-width: var(--container-width);
      margin: 0 auto;
      padding-left: 24px;
      padding-right: 24px;
    }

    .site-header-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .site-brand {
      text-decoration: none;
      font-size: 24px;
      font-weight: 800;
    }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .site-nav a {
      text-decoration: none;
      color: #334155;
      font-weight: 700;
      font-size: 14px;
    }

    .top-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 700;
      background: var(--primary-color);
      color: #ffffff;
      border: 1px solid var(--primary-color);
    }

    .wrap {
      padding-top: 24px;
      padding-bottom: 24px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 18px;
      min-height: 40vh;
    }

    .block-shell {
      width: 100%;
      display: flex;
    }

    .block-inner {
      width: 100%;
      border: 1px solid var(--border-color);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    .hero h1 {
      margin: 0 0 12px;
      font-size: 38px;
    }

    .hero p {
      margin: 0 0 24px;
      line-height: 1.7;
      font-size: 16px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 700;
      border: 1px solid #cbd5e1;
      color: #0f172a;
      background: #ffffff;
      min-width: 120px;
    }

    a.btn.primary {
      background: var(--primary-color);
      color: #ffffff;
      border-color: var(--primary-color);
    }

    .text-block h2 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .text-block p {
      margin: 0;
      line-height: 1.8;
    }

    .image-block img {
      max-width: 100%;
      border-radius: 12px;
      display: inline-block;
    }

    .button-block {
      display: flex;
    }

    .button-block.left { justify-content: flex-start; }
    .button-block.center { justify-content: center; }
    .button-block.right { justify-content: flex-end; }

    .html-block {
      line-height: 1.8;
    }

    .site-footer {
      margin-top: 28px;
      border-top: 1px solid var(--border-color);
      background: #ffffff;
    }

    .site-footer-inner {
      padding-top: 18px;
      padding-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .footer-muted {
      color: #64748b;
      font-size: 14px;
    }

    .spacer-block {
      width: 100%;
      border: 0;
      box-shadow: none;
      background: transparent;
    }

    @media (max-width: 900px) {
      .site-header-inner,
      .site-footer-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero h1 {
        font-size: 30px;
      }
    }
  </style>
  <style id="customCss"></style>
</head>
<body>
  <div id="beforeBodyHtml"></div>

  <header id="siteHeader" class="site-header" style="display:none;">
    <div class="site-header-inner">
      <a id="siteBrand" class="site-brand" href="/">Vera</a>
      <nav id="siteNav" class="site-nav"></nav>
      <a id="topCta" class="top-cta" href="#" style="display:none;">İletişim</a>
    </div>
  </header>

  <main class="wrap">
    <div id="content" class="stack"></div>
  </main>

  <footer id="siteFooter" class="site-footer" style="display:none;">
    <div class="site-footer-inner">
      <div id="footerText" class="footer-muted"></div>
      <div id="footerContact" class="footer-muted"></div>
    </div>
  </footer>

  <div id="afterBodyHtml"></div>

  <script>
    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function applyTheme(theme = {}) {
      document.documentElement.style.setProperty("--body-bg", theme.bodyBg || "#f8fafc");
      document.documentElement.style.setProperty("--body-text", theme.bodyText || "#0f172a");
      document.documentElement.style.setProperty("--border-color", theme.borderColor || "#e2e8f0");
      document.documentElement.style.setProperty("--primary-color", theme.primaryColor || "#2563eb");
      document.documentElement.style.setProperty("--container-width", (theme.containerWidth || 1200) + "px");
    }

    function blockWrapper(block, innerHtml, extraClass = "") {
      const align = ["left", "center", "right"].includes(block.align) ? block.align : "left";
      const justify =
        align === "center" ? "center" :
        align === "right" ? "flex-end" :
        "flex-start";

      const className = ["block-inner", extraClass, block.cssClass || ""].filter(Boolean).join(" ");
      const htmlId = block.htmlId ? `id="${escapeHtml(block.htmlId)}"` : "";

      return `
        <section class="block-shell" style="justify-content:${justify}">
          <div
            ${htmlId}
            class="${className}"
            style="
              max-width:${Number(block.maxWidth || 100)}%;
              background:${block.background || "#ffffff"};
              color:${block.color || "#0f172a"};
              padding:${Number(block.padding || 24)}px;
              border-radius:${Number(block.radius || 18)}px;
              text-align:${align};
            "
          >
            ${innerHtml}
          </div>
        </section>
      `;
    }

    function renderHero(block) {
      return blockWrapper(block, `
        <div class="hero">
          <h1>${escapeHtml(block.title)}</h1>
          <p>${escapeHtml(block.text)}</p>
          <div class="actions">
            ${block.primaryText ? `<a class="btn primary" href="${block.primaryLink || "#"}">${escapeHtml(block.primaryText)}</a>` : ""}
            ${block.secondaryText ? `<a class="btn" href="${block.secondaryLink || "#"}">${escapeHtml(block.secondaryText)}</a>` : ""}
          </div>
        </div>
      `);
    }

    function renderText(block) {
      return blockWrapper(block, `
        <div class="text-block">
          ${block.title ? `<h2>${escapeHtml(block.title)}</h2>` : ""}
          <p>${escapeHtml(block.text)}</p>
        </div>
      `);
    }

    function renderImage(block) {
      const imageHtml = block.src
        ? `<img src="${block.src}" alt="${escapeHtml(block.alt || "")}" style="width:${block.width || "100%"};">`
        : `<p>Görsel URL girilmedi.</p>`;

      return blockWrapper(block, `
        <div class="image-block">
          ${block.link ? `<a href="${block.link}">${imageHtml}</a>` : imageHtml}
        </div>
      `);
    }

    function renderButton(block) {
      const cls = block.style === "primary" ? "btn primary" : "btn";
      return blockWrapper(block, `
        <div class="button-block ${block.align || "left"}">
          <a class="${cls}" href="${block.link || "#"}">${escapeHtml(block.text)}</a>
        </div>
      `);
    }

    function renderHtml(block) {
      return blockWrapper(block, `
        <div class="html-block">${block.html || ""}</div>
      `);
    }

    function renderSpacer(block) {
      return blockWrapper(
        block,
        "",
        "spacer-block"
      ).replace(
        /padding:[^;]+;/,
        `padding:0;height:${Number(block.height || 32)}px;`
      );
    }

    function renderBlock(block) {
      if (block.visible === false) return "";
      if (block.type === "hero") return renderHero(block);
      if (block.type === "image") return renderImage(block);
      if (block.type === "button") return renderButton(block);
      if (block.type === "html") return renderHtml(block);
      if (block.type === "spacer") return renderSpacer(block);
      return renderText(block);
    }

    function runCustomJs(code) {
      if (!code || !code.trim()) return;
      try {
        new Function(code)();
      } catch (err) {
        console.error("Custom JS error:", err);
      }
    }

    function renderMenuItems(items) {
      if (!Array.isArray(items)) return "";
      return items
        .filter((item) => item && item.text)
        .map((item) => `<a href="${item.link || "#"}">${escapeHtml(item.text)}</a>`)
        .join("");
    }

    function applySiteSettings(settings = {}, pageOptions = {}) {
      const showHeader = settings.showHeader !== false && pageOptions.showHeader !== false;
      const showFooter = settings.showFooter !== false && pageOptions.showFooter !== false;

      const header = document.getElementById("siteHeader");
      const footer = document.getElementById("siteFooter");
      const brand = document.getElementById("siteBrand");
      const nav = document.getElementById("siteNav");
      const cta = document.getElementById("topCta");

      header.style.display = showHeader ? "block" : "none";
      footer.style.display = showFooter ? "block" : "none";

      brand.textContent = settings.logoText || settings.siteName || "Vera";
      brand.href = settings.logoLink || "/";
      nav.innerHTML = renderMenuItems(settings.menuItems || []);

      if (settings.showTopCta && settings.topCtaText) {
        cta.style.display = "inline-flex";
        cta.textContent = settings.topCtaText;
        cta.href = settings.topCtaLink || "#";
      } else {
        cta.style.display = "none";
      }

      document.getElementById("footerText").textContent = settings.footerText || "";

      const contactParts = [settings.contactEmail, settings.contactPhone].filter(Boolean);
      document.getElementById("footerContact").textContent = contactParts.join(" • ");

      document.body.className = pageOptions.customBodyClass || "";
    }

    async function loadContent() {
      try {
        const [contentRes, settingsRes] = await Promise.all([
          fetch("/api/site-content", {
            method: "GET",
            headers: { "Accept": "application/json" }
          }),
          fetch("/api/site-settings", {
            method: "GET",
            headers: { "Accept": "application/json" }
          })
        ]);

        const contentData = await contentRes.json();
        const settingsData = await settingsRes.json();

        const content = contentData.content || {};
        const settings = settingsData.settings || {};
        const blocks = Array.isArray(content.blocks) ? content.blocks : [];
        const overrides = content.overrides || {};
        const pageOptions = content.pageOptions || {};

        document.title = content.pageTitle || settings.siteName || "Vera";
        document.querySelector('meta[name="description"]').setAttribute(
          "content",
          content.metaDescription || "Hoş geldiniz."
        );

        applyTheme(content.theme || {});
        applySiteSettings(settings, pageOptions);

        document.getElementById("content").innerHTML =
          blocks.map(renderBlock).join("") + (overrides.html || "");

        document.getElementById("customCss").textContent = overrides.css || "";
        document.getElementById("beforeBodyHtml").innerHTML = settings.custom?.beforeBodyHtml || "";
        document.getElementById("afterBodyHtml").innerHTML = settings.custom?.afterBodyHtml || "";

        if (settings.custom?.headHtml) {
          const temp = document.createElement("div");
          temp.innerHTML = settings.custom.headHtml;
          temp.querySelectorAll("style").forEach((styleEl) => document.head.appendChild(styleEl));
        }

        runCustomJs(overrides.js || "");
      } catch (err) {
        document.getElementById("content").innerHTML = `
          <section class="block-shell">
            <div class="block-inner" style="max-width:100%;background:#fff;padding:24px;border-radius:18px;">
              <h2>İçerik yüklenemedi</h2>
            </div>
          </section>
        `;
      }
    }

    loadContent();
  </script>
</body>
</html>

<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoşgeldiniz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #0f172a; color: #e5e7eb; min-height: 100vh; }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,.08);
      background: #111827;
      position: sticky; top: 0;
    }
    .logo { font-size: 20px; font-weight: 700; }
    .login-btn {
      background: #2563eb; color: white; border: 0; border-radius: 10px;
      padding: 10px 14px; cursor: pointer; font-weight: 600;
    }
    .hero {
      min-height: calc(100vh - 73px);
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .box {
      width: 100%; max-width: 760px; background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 40px 24px;
    }
    h1 { font-size: 42px; margin-bottom: 14px; }
    p { color: #cbd5e1; font-size: 18px; line-height: 1.6; }
  </style>
</head>
<body>
  <header>
    <div class="logo">Özel Panel</div>
    <button class="login-btn" onclick="window.location.href='/login'">Giriş</button>
  </header>

  <main class="hero">
    <div class="box">
      <h1>Hoşgeldiniz</h1>
      <p>Bu sayfa genel görünüm alanıdır. Yönetim paneline yalnızca yetkili giriş ile erişilir.</p>
    </div>
  </main>
</body>
</html>

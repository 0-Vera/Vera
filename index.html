<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Site Login</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background: #f0f2f5; }
    .container { max-width: 400px; margin: 100px auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h2 { text-align:center; margin-bottom: 20px; }
    input[type=text], input[type=password], input[type=number] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #4CAF50; color:#fff; border:none; border-radius:4px; cursor:pointer; font-size: 16px; }
    button:hover { background: #45a049; }
    .error { color: #d00; margin-top:10px; }
    #success-section { text-align: center; }
  </style>
</head>
<body>
<div class="container">
  <h2>Login</h2>
  <div id="login-section">
    <input id="username" type="text" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div id="login-error" class="error"></div>
  </div>
  <div id="totp-section" style="display:none;">
    <p>Enter the 6-digit code from your Authenticator app:</p>
    <input id="totp-code" type="number" placeholder="123456">
    <button onclick="verifyCode()">Verify Code</button>
    <div id="totp-error" class="error"></div>
  </div>
  <div id="success-section" style="display:none;">
    <h3>Access Granted</h3>
    <p>Welcome! You have successfully logged in.</p>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>

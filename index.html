<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera</title>
  <meta name="description" content="Hoş geldiniz." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Vera" />
  <meta property="og:description" content="Hoş geldiniz." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" id="canonicalLink" href="/" />
  <style id="runtimeStyles">
    *{box-sizing:border-box}
    :root{
      --body-bg:#f8fafc;
      --body-text:#0f172a;
      --border-color:#e2e8f0;
      --primary-color:#2563eb;
      --container-width:1200px;
      --header-bg:#ffffff;
      --header-text:#0f172a;
      --footer-bg:#0f172a;
      --footer-text:#e2e8f0;
      --page-padding-x:24px;
      --page-gap:18px;
      --grid-columns:12;
    }
    html{scroll-behavior:smooth}
    body{margin:0;font-family:Arial,sans-serif;background:var(--body-bg);color:var(--body-text)}
    a{color:inherit}
    img{max-width:100%;display:block}
    .site-header{
      background:var(--header-bg);
      color:var(--header-text);
      border-bottom:1px solid var(--border-color);
      position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);
    }
    .site-header-inner,.site-footer-inner,.wrap{
      max-width:var(--container-width);
      margin:0 auto;
      padding-left:var(--page-padding-x);
      padding-right:var(--page-padding-x);
    }
    .site-header-inner{
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }
    .site-brand{text-decoration:none;font-size:24px;font-weight:800}
    .site-nav{display:flex;flex-wrap:wrap;gap:16px;align-items:center}
    .site-nav a{text-decoration:none;color:var(--header-text);opacity:.8}
    .site-nav a.active,.site-nav a:hover{opacity:1}
    .top-cta{
      display:none;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      padding:11px 16px;
      border-radius:12px;
      background:var(--primary-color);
      color:#fff;
      font-weight:700;
    }
    .wrap{padding-top:24px;padding-bottom:24px}
    .page-grid{
      display:grid;
      grid-template-columns:repeat(var(--grid-columns), minmax(0, 1fr));
      gap:var(--page-gap);
      grid-auto-flow:dense;
      align-items:start;
    }
    .block-shell{
      grid-column:span var(--col-span-d);
      grid-row:span var(--row-span);
      min-width:0;
      display:flex;
    }
    .block-inner{
      width:100%;
      min-width:0;
      border:1px solid var(--border-color);
      overflow:hidden;
    }
    .hero-block h1,.text-block h2{margin:0 0 12px}
    .hero-block p,.text-block p,.caption{margin:0;color:#475569;line-height:1.7}
    .actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      padding:11px 16px;
      border-radius:12px;
      border:1px solid var(--border-color);
      background:#fff;
      color:#0f172a;
      font-weight:700;
    }
    .btn.primary{background:var(--primary-color);color:#fff;border-color:var(--primary-color)}
    .empty-box{
      border:1px dashed var(--border-color);
      border-radius:14px;
      padding:24px;
      text-align:center;
      color:#64748b;
      background:#f8fafc;
    }
    .site-footer{
      margin-top:32px;
      background:var(--footer-bg);
      color:var(--footer-text);
      border-top:1px solid rgba(255,255,255,.08);
    }
    .site-footer-inner{
      padding-top:24px;
      padding-bottom:24px;
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      gap:12px;
    }
    .footer-muted{opacity:.86}
    .error-box{
      max-width:720px;
      margin:48px auto;
      background:#fff;
      border:1px solid var(--border-color);
      border-radius:18px;
      padding:28px;
    }
    @media (max-width:1024px){ .block-shell{grid-column:span var(--col-span-t)} }
    @media (max-width:768px){
      .site-header-inner{flex-wrap:wrap;padding-top:16px;padding-bottom:16px}
      .site-nav{width:100%;justify-content:flex-start}
      .block-shell{grid-column:span var(--col-span-m)}
      .site-footer-inner{flex-direction:column}
    }
  </style>
  <style id="pageCss"></style>
</head>
<body>
  <div id="beforeBodyHtml"></div>
  <header class="site-header" id="siteHeader">
    <div class="site-header-inner">
      <a class="site-brand" id="siteBrand" href="/">Vera</a>
      <nav class="site-nav" id="siteNav" aria-label="Site menüsü"></nav>
      <a class="top-cta" id="topCta" href="#">İletişim</a>
    </div>
  </header>
  <main class="wrap">
    <div class="page-grid" id="content"></div>
    <div id="pageHtml"></div>
  </main>
  <footer class="site-footer" id="siteFooter">
    <div class="site-footer-inner">
      <div class="footer-muted" id="footerText"></div>
      <div class="footer-muted" id="footerContact"></div>
    </div>
  </footer>
  <div id="afterBodyHtml"></div>

  <script>
    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    function normalizeText(value, fallback = "") {
      const v = String(value || "").trim();
      return v || fallback;
    }
    function normalizeBool(value, fallback = false) {
      if (typeof value === "boolean") return value;
      if (value === "true") return true;
      if (value === "false") return false;
      return fallback;
    }
    function normalizeLink(value, fallback = "#") {
      const raw = String(value || "").trim();
      if (!raw) return fallback;
      if (raw.startsWith("#")) return raw;
      if (raw.startsWith("/")) return raw;
      if (raw.startsWith("./") || raw.startsWith("../")) return raw;
      if (/^(https?:\/\/|mailto:|tel:)/i.test(raw)) return raw;
      return fallback;
    }
    function normalizeImageSrc(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      if (raw.startsWith("/")) return raw;
      if (raw.startsWith("./") || raw.startsWith("../")) return raw;
      if (/^https?:\/\//i.test(raw)) return raw;
      if (/^data:image\//i.test(raw)) return raw;
      return "";
    }
    function isExternalLink(href) {
      return /^(https?:\/\/)/i.test(String(href || ""));
    }
    function clampNumber(value, min, max, fallback) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return Math.min(max, Math.max(min, n));
    }
    function normalizeAction(action = {}, legacyLink = "") {
      const legacyHref = normalizeText(legacyLink);
      const type = ["none", "url", "page", "anchor", "email", "phone"].includes(action.type)
        ? action.type
        : (legacyHref ? "url" : "none");
      return {
        type,
        url: normalizeText(action.url, legacyHref),
        pageId: normalizeText(action.pageId),
        pageSlug: normalizeText(action.pageSlug),
        anchorId: normalizeText(action.anchorId),
        email: normalizeText(action.email),
        phone: normalizeText(action.phone),
        newTab: normalizeBool(action.newTab, false)
      };
    }
    function resolveActionHref(action = {}, pages = []) {
      const safe = normalizeAction(action);
      if (safe.type === "url") return normalizeLink(safe.url, "#");
      if (safe.type === "page") {
        const pageById = safe.pageId ? pages.find((item) => item.id === safe.pageId) : null;
        const pageBySlug = !pageById && safe.pageSlug ? pages.find((item) => item.slug === safe.pageSlug) : null;
        const page = pageById || pageBySlug;
        if (!page) return "#";
        return page.isHome ? "/" : `/${page.slug}`;
      }
      if (safe.type === "anchor") return safe.anchorId ? `#${safe.anchorId.replace(/^#/, "")}` : "#";
      if (safe.type === "email") return safe.email ? `mailto:${safe.email}` : "#";
      if (safe.type === "phone") return safe.phone ? `tel:${safe.phone}` : "#";
      return "#";
    }
    function actionAttrs(action = {}, pages = []) {
      const safe = normalizeAction(action);
      const href = resolveActionHref(safe, pages);
      const external = isExternalLink(href);
      const blank = safe.newTab || external;
      return {
        href,
        extra: blank ? ' target="_blank" rel="noopener noreferrer"' : ""
      };
    }
    function normalizeSiteSettings(raw = {}) {
      return {
        siteName: normalizeText(raw.siteName, "Vera"),
        logoText: normalizeText(raw.logoText, raw.siteName || "Vera"),
        logoLink: normalizeText(raw.logoLink, "/"),
        contactEmail: normalizeText(raw.contactEmail),
        contactPhone: normalizeText(raw.contactPhone),
        footerText: normalizeText(raw.footerText, "© Vera"),
        showHeader: normalizeBool(raw.showHeader, true),
        showFooter: normalizeBool(raw.showFooter, true),
        showTopCta: normalizeBool(raw.showTopCta, false),
        headerSticky: normalizeBool(raw.headerSticky, true),
        headerTransparent: normalizeBool(raw.headerTransparent, false),
        headerBackground: normalizeText(raw.headerBackground, "#ffffff"),
        headerTextColor: normalizeText(raw.headerTextColor, "#0f172a"),
        footerBackground: normalizeText(raw.footerBackground, "#0f172a"),
        footerTextColor: normalizeText(raw.footerTextColor, "#e2e8f0"),
        topCtaText: normalizeText(raw.topCtaText),
        topCtaAction: normalizeAction(raw.topCtaAction || {}, raw.topCtaLink || ""),
        menuItems: Array.isArray(raw.menuItems) ? raw.menuItems : [],
        custom: {
          headHtml: String(raw.custom?.headHtml || ""),
          beforeBodyHtml: String(raw.custom?.beforeBodyHtml || ""),
          afterBodyHtml: String(raw.custom?.afterBodyHtml || "")
        }
      };
    }
    function normalizeBlock(block = {}, index = 0) {
      return {
        ...block,
        id: normalizeText(block.id, `block-${index + 1}`),
        type: normalizeText(block.type, "text"),
        visible: normalizeBool(block.visible, true),
        background: normalizeText(block.background, "#ffffff"),
        color: normalizeText(block.color, "#0f172a"),
        padding: clampNumber(block.padding, 0, 240, 24),
        radius: clampNumber(block.radius, 0, 80, 18),
        align: ["left", "center", "right"].includes(block.align) ? block.align : "left",
        maxWidth: clampNumber(block.maxWidth, 20, 100, 100),
        cssClass: normalizeText(block.cssClass),
        htmlId: normalizeText(block.htmlId),
        fullWidth: normalizeBool(block.fullWidth, false),
        surface: normalizeBool(block.surface, true),
        colSpanDesktop: clampNumber(block.colSpanDesktop, 1, 12, 12),
        colSpanTablet: clampNumber(block.colSpanTablet, 1, 12, 12),
        colSpanMobile: clampNumber(block.colSpanMobile, 1, 12, 12),
        rowSpan: clampNumber(block.rowSpan, 1, 12, 1),
        minHeight: clampNumber(block.minHeight, 0, 2000, 0),
        contentWidthMode: block.contentWidthMode === "boxed" ? "boxed" : "full",
        innerMaxWidth: clampNumber(block.innerMaxWidth, 20, 100, 100),
        title: normalizeText(block.title),
        text: normalizeText(block.text),
        html: String(block.html || ""),
        src: normalizeText(block.src),
        alt: normalizeText(block.alt),
        width: normalizeText(block.width, "100%"),
        style: ["primary", "secondary"].includes(block.style) ? block.style : "primary",
        height: clampNumber(block.height, 0, 800, 40),
        caption: normalizeText(block.caption),
        buttonText: normalizeText(block.buttonText || block.text || "Buton"),
        primaryText: normalizeText(block.primaryText),
        secondaryText: normalizeText(block.secondaryText),
        action: normalizeAction(block.action || {}, block.link || ""),
        primaryAction: normalizeAction(block.primaryAction || {}, block.primaryLink || ""),
        secondaryAction: normalizeAction(block.secondaryAction || {}, block.secondaryLink || "")
      };
    }
    function blockOuterStyle(block) {
      const justify = block.align === "center" ? "center" : block.align === "right" ? "flex-end" : "flex-start";
      return `--col-span-d:${block.fullWidth ? 12 : block.colSpanDesktop};--col-span-t:${block.fullWidth ? 12 : block.colSpanTablet};--col-span-m:${block.fullWidth ? 12 : block.colSpanMobile};--row-span:${block.rowSpan};justify-content:${justify};`;
    }
    function blockInnerStyle(block) {
      return `max-width:${Number(block.maxWidth || 100)}%;background:${block.surface ? block.background : "transparent"};color:${block.color || "#0f172a"};padding:${Number(block.padding || 24)}px;border-radius:${Number(block.radius || 18)}px;text-align:${block.align || "left"};min-height:${Number(block.minHeight || 0)}px;margin:${block.align === "center" ? "0 auto" : block.align === "right" ? "0 0 0 auto" : "0"};width:${block.contentWidthMode === "boxed" ? `${Number(block.innerMaxWidth || 100)}%` : "100%"};`;
    }
    function renderActionButton(text, action, pages, variant) {
      if (!text) return "";
      const attrs = actionAttrs(action, pages);
      return `<a class="btn ${variant === "primary" ? "primary" : ""}" href="${escapeHtml(attrs.href)}"${attrs.extra}>${escapeHtml(text)}</a>`;
    }
    function renderBlock(block, pages) {
      if (!block || block.visible === false) return "";
      const safe = normalizeBlock(block);
      if (safe.type === "hero") {
        return `<section class="block-shell ${escapeHtml(safe.cssClass || "")}" ${safe.htmlId ? `id="${escapeHtml(safe.htmlId)}"` : ""} style="${blockOuterStyle(safe)}"><div class="block-inner hero-block" style="${blockInnerStyle(safe)}">${safe.title ? `<h1>${escapeHtml(safe.title)}</h1>` : ""}${safe.text ? `<p>${escapeHtml(safe.text)}</p>` : ""}<div class="actions">${renderActionButton(safe.primaryText, safe.primaryAction, pages, "primary")}${renderActionButton(safe.secondaryText, safe.secondaryAction, pages, "secondary")}</div></div></section>`;
      }
      if (safe.type === "button") {
        const attrs = actionAttrs(safe.action, pages);
        return `<section class="block-shell ${escapeHtml(safe.cssClass || "")}" ${safe.htmlId ? `id="${escapeHtml(safe.htmlId)}"` : ""} style="${blockOuterStyle(safe)}"><div class="block-inner button-block" style="${blockInnerStyle(safe)}"><a class="btn ${safe.style === "primary" ? "primary" : ""}" href="${escapeHtml(attrs.href)}"${attrs.extra}>${escapeHtml(safe.buttonText || "Buton")}</a></div></section>`;
      }
      if (safe.type === "image") {
        const attrs = actionAttrs(safe.action, pages);
        const src = normalizeImageSrc(safe.src);
        const imageHtml = src ? `<img src="${escapeHtml(src)}" alt="${escapeHtml(safe.alt || "")}" loading="lazy" decoding="async" style="width:${escapeHtml(safe.width || "100%")}">` : `<div class="empty-box">Görsel eklenmedi</div>`;
        const wrapped = attrs.href && attrs.href !== "#" ? `<a href="${escapeHtml(attrs.href)}"${attrs.extra}>${imageHtml}</a>` : imageHtml;
        return `<section class="block-shell ${escapeHtml(safe.cssClass || "")}" ${safe.htmlId ? `id="${escapeHtml(safe.htmlId)}"` : ""} style="${blockOuterStyle(safe)}"><div class="block-inner image-block" style="${blockInnerStyle(safe)}">${wrapped}${safe.caption ? `<p class="caption">${escapeHtml(safe.caption)}</p>` : ""}</div></section>`;
      }
      if (safe.type === "html") {
        return `<section class="block-shell ${escapeHtml(safe.cssClass || "")}" ${safe.htmlId ? `id="${escapeHtml(safe.htmlId)}"` : ""} style="${blockOuterStyle(safe)}"><div class="block-inner html-block" style="${blockInnerStyle(safe)}">${safe.html || ""}</div></section>`;
      }
      if (safe.type === "spacer") {
        return `<section class="block-shell ${escapeHtml(safe.cssClass || "")}" ${safe.htmlId ? `id="${escapeHtml(safe.htmlId)}"` : ""} style="${blockOuterStyle(safe)}"><div class="block-inner spacer-block" style="${blockInnerStyle(safe)}padding:0;min-height:${Number(safe.height || 40)}px;"></div></section>`;
      }
      return `<section class="block-shell ${escapeHtml(safe.cssClass || "")}" ${safe.htmlId ? `id="${escapeHtml(safe.htmlId)}"` : ""} style="${blockOuterStyle(safe)}"><div class="block-inner text-block" style="${blockInnerStyle(safe)}">${safe.title ? `<h2>${escapeHtml(safe.title)}</h2>` : ""}${safe.text ? `<p>${escapeHtml(safe.text)}</p>` : ""}</div></section>`;
    }
    function renderMenu(items, pages) {
      return (Array.isArray(items) ? items : []).filter(item => item && item.text).map((item) => {
        const action = normalizeAction(item.action || {}, item.link || "");
        const attrs = actionAttrs(action, pages);
        const current = location.pathname.replace(/\/+$/, "") || "/";
        const target = attrs.href.replace(/\/+$/, "") || "/";
        const activeClass = !isExternalLink(attrs.href) && !/^mailto:|^tel:/i.test(attrs.href) && current === target ? "active" : "";
        return `<a class="${activeClass}" href="${escapeHtml(attrs.href)}"${attrs.extra}>${escapeHtml(item.text)}</a>`;
      }).join("");
    }
    function applyMeta(page, settings) {
      const title = page.metaTitle || page.title || settings.siteName || "Vera";
      const description = page.metaDescription || "Hoş geldiniz.";
      document.title = title;
      document.querySelector('meta[name="description"]').setAttribute("content", description);
      document.querySelector('meta[property="og:title"]').setAttribute("content", title);
      document.querySelector('meta[property="og:description"]').setAttribute("content", description);
      document.getElementById("canonicalLink").setAttribute("href", location.origin + location.pathname);
    }
    function applyTheme(page, settings) {
      const theme = page.theme || {};
      const options = page.pageOptions || {};
      document.documentElement.style.setProperty("--body-bg", theme.bodyBg || "#f8fafc");
      document.documentElement.style.setProperty("--body-text", theme.bodyText || "#0f172a");
      document.documentElement.style.setProperty("--border-color", theme.borderColor || "#e2e8f0");
      document.documentElement.style.setProperty("--primary-color", theme.primaryColor || "#2563eb");
      document.documentElement.style.setProperty("--container-width", (theme.containerWidth || 1200) + "px");
      document.documentElement.style.setProperty("--header-bg", settings.headerTransparent ? "rgba(255,255,255,.82)" : (settings.headerBackground || "#ffffff"));
      document.documentElement.style.setProperty("--header-text", settings.headerTextColor || "#0f172a");
      document.documentElement.style.setProperty("--footer-bg", settings.footerBackground || "#0f172a");
      document.documentElement.style.setProperty("--footer-text", settings.footerTextColor || "#e2e8f0");
      document.documentElement.style.setProperty("--page-padding-x", (options.pagePaddingX || 24) + "px");
      document.documentElement.style.setProperty("--page-gap", (options.sectionGap || 18) + "px");
      document.documentElement.style.setProperty("--grid-columns", String(options.gridColumns || 12));
    }
    function applyChrome(settings, page, pages) {
      document.getElementById("siteHeader").style.display = settings.showHeader && page.pageOptions?.showHeader !== false ? "" : "none";
      document.getElementById("siteFooter").style.display = settings.showFooter && page.pageOptions?.showFooter !== false ? "" : "none";
      document.getElementById("siteBrand").textContent = settings.logoText || settings.siteName || "Vera";
      document.getElementById("siteBrand").href = normalizeLink(settings.logoLink, "/");
      document.getElementById("siteNav").innerHTML = renderMenu(settings.menuItems, pages);
      const cta = document.getElementById("topCta");
      if (settings.showTopCta && settings.topCtaText) {
        const attrs = actionAttrs(settings.topCtaAction, pages);
        cta.style.display = "inline-flex";
        cta.textContent = settings.topCtaText;
        cta.href = attrs.href;
        if (attrs.extra) {
          cta.setAttribute("target", "_blank");
          cta.setAttribute("rel", "noopener noreferrer");
        } else {
          cta.removeAttribute("target");
          cta.removeAttribute("rel");
        }
      } else {
        cta.style.display = "none";
      }
      document.getElementById("footerText").textContent = settings.footerText || "";
      document.getElementById("footerContact").textContent = [settings.contactEmail, settings.contactPhone].filter(Boolean).join(" • ");
      document.body.className = page.pageOptions?.customBodyClass || "";
      document.getElementById("beforeBodyHtml").innerHTML = settings.custom.beforeBodyHtml || "";
      document.getElementById("afterBodyHtml").innerHTML = settings.custom.afterBodyHtml || "";
      document.getElementById("pageCss").textContent = page.overrides?.css || "";
      document.getElementById("pageHtml").innerHTML = page.overrides?.html || "";
      if (settings.custom.headHtml) {
        const wrap = document.createElement("div");
        wrap.innerHTML = settings.custom.headHtml;
        wrap.querySelectorAll("style").forEach((styleEl) => document.head.appendChild(styleEl));
      }
    }
    function runPageJs(page) {
      try {
        const code = (page.overrides?.js || "") + "\n" + (page.editorMode === "code" ? (page.code?.js || "") : "");
        if (code.trim()) new Function(code)();
      } catch (err) {
        console.error(err);
      }
    }
    async function loadHome() {
      try {
        const [pagesRes, settingsRes] = await Promise.all([
          fetch("/api/pages?slug=", { headers: { Accept: "application/json" } }),
          fetch("/api/site-settings", { headers: { Accept: "application/json" } })
        ]);
        if (!pagesRes.ok || !settingsRes.ok) throw new Error("API");
        const [pageData, settingsData, allPagesData] = await Promise.all([
          pagesRes.json(),
          settingsRes.json(),
          fetch("/api/pages", { headers: { Accept: "application/json" } }).then(r => r.ok ? r.json() : { pages: [] })
        ]);

        const page = pageData.page || {};
        const settings = normalizeSiteSettings(settingsData.settings || {});
        const pages = Array.isArray(allPagesData.pages) ? allPagesData.pages : [];
        page.blocks = Array.isArray(page.blocks) ? page.blocks : [];
        page.pageOptions = page.pageOptions || {};
        page.overrides = page.overrides || {};
        page.theme = page.theme || {};

        applyMeta(page, settings);
        applyTheme(page, settings);
        applyChrome(settings, page, pages);

        const html = (page.editorMode === "code" ? (page.code?.html || "") : page.blocks.map((block, index) => renderBlock(normalizeBlock(block, index), pages)).join(""));
        document.getElementById("content").innerHTML = html || `<div class="error-box"><h2>İçerik bulunamadı</h2><p>Bu sayfada henüz blok yok.</p></div>`;
        runPageJs(page);
      } catch (err) {
        document.getElementById("content").innerHTML = `<div class="error-box"><h2>İçerik yüklenemedi</h2><p>Veriler alınırken bir hata oluştu.</p></div>`;
      }
    }
    loadHome();
  </script>
</body>
</html>

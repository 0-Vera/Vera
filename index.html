<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 960px;
      margin: auto;
      padding: 20px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    header h1 {
      font-size: 24px;
      margin: 0;
      color: #38bdf8;
    }
    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      gap: 15px;
      margin: 0 0 20px 0;
    }
    nav li {
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    nav li:hover {
      background: rgba(59, 130, 246, 0.3);
    }
    nav li.active {
      background: #2563eb;
    }
    main {
      background: #111827;
      padding: 20px;
      border-radius: 10px;
      min-height: 300px;
    }
    .admin-link {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Site Başlığı</h1>
      <a href="/login.html" class="admin-link">Yönetici Girişi</a>
    </header>
    <nav>
      <ul id="menuList"></ul>
    </nav>
    <main id="content">Yükleniyor...</main>
  </div>
  <script>
    async function loadMenu() {
      try {
        const res = await fetch('/api/menu');
        const data = await res.json();
        const list = document.getElementById('menuList');
        const content = document.getElementById('content');
        function renderContent(item) {
          content.innerHTML = '<h2>' + item.title + '</h2>' + '<div>' + item.content + '</div>';
        }
        data.menus.forEach((item, index) => {
          const li = document.createElement('li');
          li.textContent = item.title;
          li.onclick = () => {
            document.querySelectorAll('nav li').forEach(l => l.classList.remove('active'));
            li.classList.add('active');
            renderContent(item);
          };
          if (index === 0) {
            li.classList.add('active');
            renderContent(item);
          }
          list.appendChild(li);
        });
      } catch (err) {
        document.getElementById('content').textContent = 'Menü yüklenemedi: ' + err.message;
      }
    }
    loadMenu();
  </script>
</body>
</html>

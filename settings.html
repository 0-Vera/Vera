
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sayfalar</title>
</head>
<body>
<h1>Sayfa Yönetimi</h1>
<input id="title" placeholder="Başlık">
<input id="slug" placeholder="slug">
<textarea id="html" placeholder="html"></textarea>
<button onclick="save()">Kaydet</button>
<script>
async function save(){
 const page={title:title.value,slug:slug.value,html:html.value};
 const res=await fetch("/api/pages",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(page)});
 const data=await res.json();
 alert(JSON.stringify(data));
}
</script>
</body>
</html>

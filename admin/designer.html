<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera Admin - Tasarım Düzenleyici</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#eef3f8;color:#0f172a}
    .loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#64748b}

    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:250px 1fr;
    }

    .side{
      background:#ffffff;
      border-right:1px solid #e2e8f0;
      display:grid;
      grid-template-rows:auto auto auto 1fr auto;
      min-height:100vh;
      position:sticky;
      top:0;
    }

    .side-top{padding:12px;border-bottom:1px solid #eef2f7}
    .side-top h1{margin:0 0 4px;font-size:16px}
    .side-top p{margin:0;font-size:12px;color:#64748b}

    .add-toolbar,.mini-toolbar{
      padding:10px;
      border-bottom:1px solid #eef2f7;
      display:grid;
      gap:6px;
    }
    .add-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
    .mini-grid-toolbar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}

    .tiny-btn{
      border:0;
      border-radius:8px;
      padding:8px 0;
      font-size:10px;
      font-weight:700;
      background:#e2e8f0;
      color:#0f172a;
      cursor:pointer;
      min-width:0;
    }

    .inspector{padding:10px;border-bottom:1px solid #eef2f7}
    .mini-card{border:1px solid #e2e8f0;border-radius:10px;padding:8px;background:#fff}
    .mini-card-title{font-size:11px;font-weight:700;margin-bottom:8px;color:#334155}
    .mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
    .mini-grid label{display:block;margin-bottom:3px;font-size:10px;color:#475569}
    .mini-grid input{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:7px 8px;font-size:11px;background:#fff}

    .block-list{min-height:0;overflow:auto;padding:8px}
    .block-item{border:1px solid #e2e8f0;border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff}
    .block-item.selected{border-color:#2563eb;box-shadow:0 0 0 1px rgba(37,99,235,.10)}
    .block-head{display:grid;grid-template-columns:18px 1fr auto;gap:6px;align-items:center;padding:6px}
    .block-arrow,.block-name,.block-mini{border:0;background:transparent;cursor:pointer;padding:0}
    .block-arrow{font-size:11px;color:#475569;width:18px;height:18px}
    .block-name{text-align:left;font-size:11px;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .block-actions{display:flex;gap:4px}
    .block-mini{width:18px;height:18px;border-radius:6px;background:#e2e8f0;font-size:10px;font-weight:700;color:#0f172a}
    .block-mini.danger{background:#fee2e2;color:#991b1b}
    .block-body{padding:6px;border-top:1px solid #eef2f7;background:#fafcff}
    .block-body label{display:block;margin-bottom:3px;font-size:10px;color:#475569}
    .block-body input,.block-body select,.block-body textarea{
      width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:7px 8px;font-size:11px;background:#fff;margin-bottom:7px
    }
    .block-body textarea{min-height:64px;resize:vertical}

    .side-bottom{padding:10px;border-top:1px solid #eef2f7;display:grid;gap:8px}
    .btn{border:0;border-radius:10px;padding:10px 12px;font-size:12px;font-weight:700;cursor:pointer}
    .btn-primary{background:#2563eb;color:#fff}
    .btn-secondary{background:#e2e8f0;color:#0f172a}
    .btn-danger{background:#dc2626;color:#fff}

    .stage-wrap{min-width:0;overflow:auto;padding:18px}
    .stage-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .chip{display:inline-flex;align-items:center;padding:8px 10px;border-radius:999px;background:#fff;border:1px solid #dbe3ee;font-size:12px;font-weight:700;color:#334155}

    .iframe-shell{
      width:min(100%, 1800px);
      margin:0 auto;
      border:1px solid #d7e0ec;
      border-radius:16px;
      overflow:hidden;
      background:#fff;
      box-shadow:0 16px 40px rgba(15,23,42,.07);
    }

    .preview-frame{
      width:100%;
      border:0;
      display:block;
      background:#fff;
      min-height:900px;
    }

    @media(max-width:1200px){
      .app{grid-template-columns:1fr}
      .side{position:relative;min-height:auto}
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">Tasarım düzenleyici yükleniyor...</div>

  <div id="app" class="app" style="display:none">
    <aside class="side">
      <div class="side-top">
        <h1 id="designerTitle">Tasarım Düzenleyici</h1>
        <p id="designerSub">Sayfa yükleniyor...</p>
      </div>

      <div class="add-toolbar">
        <div class="add-grid">
          <button class="tiny-btn" data-add="hero" type="button">Hero</button>
          <button class="tiny-btn" data-add="text" type="button">Metin</button>
          <button class="tiny-btn" data-add="button" type="button">Buton</button>
          <button class="tiny-btn" data-add="image" type="button">Görsel</button>
          <button class="tiny-btn" data-add="html" type="button">HTML</button>
          <button class="tiny-btn" data-add="spacer" type="button">Boşluk</button>
          <button class="tiny-btn" data-add="table" type="button">Tablo</button>
        </div>
      </div>

      <div id="miniToolbar" class="mini-toolbar"></div>
      <div id="inspector" class="inspector"></div>
      <div id="blockList" class="block-list"></div>

      <div class="side-bottom">
        <button id="saveBtn" class="btn btn-primary" type="button">Kaydet</button>
        <button id="reloadPreviewBtn" class="btn btn-secondary" type="button">Önizlemeyi Yenile</button>
        <button id="openLiveBtn" class="btn btn-secondary" type="button">Canlı Sayfayı Aç</button>
        <button id="backBtn" class="btn btn-danger" type="button">Sayfalara Dön</button>
      </div>
    </aside>

    <main class="stage-wrap">
      <div class="stage-toolbar">
        <span class="chip" id="pagePathChip">/</span>
        <span class="chip" id="pageModeChip">blocks</span>
      </div>

      <div class="iframe-shell">
        <iframe id="previewFrame" class="preview-frame" title="Sayfa önizleme"></iframe>
      </div>
    </main>
  </div>

  <script>
    const url = new URL(location.href);
    const pageId = url.searchParams.get("id") || "";

    let pageData = null;
    let selectedId = null;
    let expandedIds = new Set();
    let previewReady = false;

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function clamp(value, min, max, fallback) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return Math.max(min, Math.min(max, n));
    }

    function normalizeStartSpan(start, span, maxCols) {
      let safeSpan = clamp(span, 1, maxCols, maxCols);
      let safeStart = clamp(start, 1, maxCols, 1);
      if (safeStart + safeSpan - 1 > maxCols) {
        safeStart = Math.max(1, maxCols - safeSpan + 1);
      }
      return { start: safeStart, span: safeSpan };
    }

  function newBlock(type, order = 0) {
  const base = {
    id: "b-" + Math.random().toString(36).slice(2) + Date.now(),
    order,
    type,
    visible: true,
    background: "#ffffff",
    color: "#0f172a",
    padding: 24,
    radius: 18,
    align: "left",
    maxWidth: 100,
    cssClass: "",
    htmlId: "",
    layoutMode: "grid",
    fullWidth: false,
    surface: true,
    colStartDesktop: 1,
    colSpanDesktop: 12,
    colStartTablet: 1,
    colSpanTablet: 12,
    colStartMobile: 1,
    colSpanMobile: 12,
    rowStartDesktop: 1,
    rowSpan: 1,
    minHeight: 0,
    contentWidthMode: "full",
    innerMaxWidth: 100,
    tableHeaders: "",
    tableRows: ""
  };

  if (type === "hero") return { ...base, title: "Başlık", text: "Açıklama", primaryText: "Buton", primaryLink: "#", secondaryText: "", secondaryLink: "", align: "center", padding: 32, radius: 20, fullWidth: true };
  if (type === "text") return { ...base, title: "", text: "Metin", colStartDesktop: 1, colSpanDesktop: 6 };
  if (type === "button") return { ...base, text: "Buton", link: "#", style: "primary", surface: false, colStartDesktop: 1, colSpanDesktop: 4 };
  if (type === "image") return { ...base, src: "", alt: "", width: "100%", link: "", align: "center", colStartDesktop: 7, colSpanDesktop: 6 };
  if (type === "html") return { ...base, html: "<div>Özel HTML</div>" };
  if (type === "spacer") return { ...base, height: 32, background: "transparent", padding: 0, radius: 0, fullWidth: true, surface: false };
  if (type === "table") return { ...base, tableHeaders: "Sütun 1,Sütun 2", tableRows: "Değer 1|Değer 2\nDeğer 3|Değer 4", colStartDesktop: 1, colSpanDesktop: 12 };
  return base;
}
   function normalizeBlock(block = {}, index = 0) {
  const desktop = normalizeStartSpan(block.colStartDesktop, block.colSpanDesktop, 12);
  const tablet = normalizeStartSpan(block.colStartTablet, block.colSpanTablet, 12);
  const mobile = normalizeStartSpan(block.colStartMobile, block.colSpanMobile, 12);

  const normalized = {
    ...block,
    order: Number.isFinite(Number(block.order)) ? Number(block.order) : index,
    visible: block.visible !== false,
    background: String(block.background || "#ffffff"),
    color: String(block.color || "#0f172a"),
    padding: clamp(block.padding, 0, 240, 24),
    radius: clamp(block.radius, 0, 80, 18),
    align: ["left", "center", "right"].includes(block.align) ? block.align : "left",
    maxWidth: clamp(block.maxWidth, 30, 100, 100),
    cssClass: String(block.cssClass || ""),
    htmlId: String(block.htmlId || ""),
    fullWidth: !!block.fullWidth,
    surface: block.surface !== false,
    colStartDesktop: desktop.start,
    colSpanDesktop: desktop.span,
    colStartTablet: tablet.start,
    colSpanTablet: tablet.span,
    colStartMobile: mobile.start,
    colSpanMobile: mobile.span,
    rowStartDesktop: clamp(block.rowStartDesktop, 1, 500, 1),
    rowSpan: clamp(block.rowSpan, 1, 12, 1),
    minHeight: clamp(block.minHeight, 0, 2000, 0),
    contentWidthMode: block.contentWidthMode === "boxed" ? "boxed" : "full",
    innerMaxWidth: clamp(block.innerMaxWidth, 20, 100, 100),
    tableHeaders: String(block.tableHeaders || ""),
    tableRows: String(block.tableRows || "")
  };

  if (normalized.fullWidth) {
    normalized.colStartDesktop = 1;
    normalized.colSpanDesktop = 12;
    normalized.colStartTablet = 1;
    normalized.colSpanTablet = 12;
    normalized.colStartMobile = 1;
    normalized.colSpanMobile = 12;
  }

  return normalized;
}

    function getSelectedIndex() {
      return (pageData?.blocks || []).findIndex((block) => block.id === selectedId);
    }

    function setSelected(id) {
      selectedId = id || null;
      renderLocalUi();
      sendSelectToPreview();
    }

    function updateSelected(patch = {}) {
      const index = getSelectedIndex();
      if (index < 0) return;
      pageData.blocks[index] = normalizeBlock({ ...pageData.blocks[index], ...patch }, index);
      renderLocalUi();
    }

    function toggleExpanded(id) {
      if (expandedIds.has(id)) expandedIds.delete(id);
      else expandedIds.add(id);
      renderBlockList();
    }

    function moveSelected(delta) {
      const index = getSelectedIndex();
      if (index < 0) return;
      const block = pageData.blocks[index];
      if (block.fullWidth) return;
      updateSelected({ colStartDesktop: Number(block.colStartDesktop || 1) + delta });
    }

    function resizeSelected(delta) {
      const index = getSelectedIndex();
      if (index < 0) return;
      const block = pageData.blocks[index];
      if (block.fullWidth) return;
      updateSelected({ colSpanDesktop: Number(block.colSpanDesktop || 12) + delta });
    }

    function changeSelectedRow(delta) {
      const index = getSelectedIndex();
      if (index < 0) return;
      const block = pageData.blocks[index];
      updateSelected({ rowSpan: Number(block.rowSpan || 1) + delta });
    }

    function toggleSelectedFullWidth() {
      const index = getSelectedIndex();
      if (index < 0) return;
      const block = pageData.blocks[index];
      updateSelected({ fullWidth: !block.fullWidth });
    }

    function addBlock(type) {
      if (!pageData) return;
      const block = normalizeBlock(newBlock(type, pageData.blocks.length), pageData.blocks.length);
      pageData.blocks.push(block);
      selectedId = block.id;
      expandedIds.add(block.id);
      renderLocalUi();
    }

 function renderToolbar() {
  miniToolbar.innerHTML = `
    <div class="mini-grid-toolbar">
      <button class="tiny-btn" data-action="left" type="button">←</button>
      <button class="tiny-btn" data-action="right" type="button">→</button>
      <button class="tiny-btn" data-action="up" type="button">↑</button>
      <button class="tiny-btn" data-action="down" type="button">↓</button>
      <button class="tiny-btn" data-action="shrink" type="button">－</button>
      <button class="tiny-btn" data-action="grow" type="button">＋</button>
      <button class="tiny-btn" data-action="rowless" type="button">▭－</button>
      <button class="tiny-btn" data-action="rowmore" type="button">▭＋</button>
      <button class="tiny-btn" data-action="full" type="button">□</button>
    </div>
  `;

  miniToolbar.querySelectorAll("[data-action]").forEach((btn) => {
    btn.addEventListener("click", () => {
      const action = btn.getAttribute("data-action");
      if (action === "left") moveSelected(-1);
      if (action === "right") moveSelected(1);
      if (action === "up") updateSelected({ rowStartDesktop: Number(pageData.blocks[getSelectedIndex()]?.rowStartDesktop || 1) - 1 });
      if (action === "down") updateSelected({ rowStartDesktop: Number(pageData.blocks[getSelectedIndex()]?.rowStartDesktop || 1) + 1 });
      if (action === "shrink") resizeSelected(-1);
      if (action === "grow") resizeSelected(1);
      if (action === "rowless") changeSelectedRow(-1);
      if (action === "rowmore") changeSelectedRow(1);
      if (action === "full") toggleSelectedFullWidth();
    });
  });
}
function renderInspector() {
  const index = getSelectedIndex();
  if (index < 0) {
    inspector.innerHTML = `<div class="mini-card"><div class="mini-card-title">Blok seç</div></div>`;
    return;
  }

  const block = pageData.blocks[index];

  inspector.innerHTML = `
    <div class="mini-card">
      <div class="mini-card-title">${escapeHtml(block.type.toUpperCase())}</div>
      <div class="mini-grid">
        <div>
          <label>D Baş.</label>
          <input id="iColStart" type="number" min="1" max="12" value="${Number(block.colStartDesktop || 1)}" ${block.fullWidth ? "disabled" : ""}>
        </div>
        <div>
          <label>D Kol.</label>
          <input id="iColSpan" type="number" min="1" max="12" value="${Number(block.colSpanDesktop || 12)}" ${block.fullWidth ? "disabled" : ""}>
        </div>
        <div>
          <label>Satır Baş.</label>
          <input id="iRowStart" type="number" min="1" max="500" value="${Number(block.rowStartDesktop || 1)}">
        </div>
        <div>
          <label>Satır Span</label>
          <input id="iRowSpan" type="number" min="1" max="12" value="${Number(block.rowSpan || 1)}">
        </div>
        <div>
          <label>Min Y.</label>
          <input id="iMinHeight" type="number" min="0" max="2000" value="${Number(block.minHeight || 0)}">
        </div>
        <div>
          <label>Kutulu</label>
          <input id="iSurface" type="number" min="0" max="1" value="${block.surface === false ? 0 : 1}">
        </div>
      </div>
    </div>
  `;

  const bind = (id, key) => {
    const input = document.getElementById(id);
    if (!input) return;
    const apply = () => updateSelected({ [key]: Number(input.value || 0) });
    input.addEventListener("input", apply);
    input.addEventListener("change", apply);
  };

  bind("iColStart", "colStartDesktop");
  bind("iColSpan", "colSpanDesktop");
  bind("iRowStart", "rowStartDesktop");
  bind("iRowSpan", "rowSpan");
  bind("iMinHeight", "minHeight");

  const iSurface = document.getElementById("iSurface");
  if (iSurface) {
    const applySurface = () => updateSelected({ surface: Number(iSurface.value || 0) === 1 });
    iSurface.addEventListener("input", applySurface);
    iSurface.addEventListener("change", applySurface);
  }
}
    function renderBlockFields(block, index) {
      if (block.type === "hero") {
        return `
          <label>Başlık</label>
          <input data-index="${index}" data-key="title" value="${escapeHtml(block.title)}">
          <label>Açıklama</label>
          <textarea data-index="${index}" data-key="text">${escapeHtml(block.text)}</textarea>
        `;
      }

      if (block.type === "text") {
        return `
          <label>Başlık</label>
          <input data-index="${index}" data-key="title" value="${escapeHtml(block.title || "")}">
          <label>Metin</label>
          <textarea data-index="${index}" data-key="text">${escapeHtml(block.text || "")}</textarea>
        `;
      }

      if (block.type === "button") {
        return `
          <label>Buton</label>
          <input data-index="${index}" data-key="text" value="${escapeHtml(block.text || "")}">
          <label>Link</label>
          <input data-index="${index}" data-key="link" value="${escapeHtml(block.link || "")}">
        `;
      }

      if (block.type === "image") {
        return `
          <label>Görsel URL</label>
          <input data-index="${index}" data-key="src" value="${escapeHtml(block.src || "")}">
          <label>Alt</label>
          <input data-index="${index}" data-key="alt" value="${escapeHtml(block.alt || "")}">
        `;
      }

      if (block.type === "html") {
        return `
          <label>HTML</label>
          <textarea data-index="${index}" data-key="html">${escapeHtml(block.html || "")}</textarea>
        `;
      }

      if (block.type === "spacer") {
        return `
          <label>Yükseklik</label>
          <input data-index="${index}" data-key="height" type="number" value="${Number(block.height || 32)}">
        `;
      }

      if (block.type === "table") {
  return `
    <label>Başlıklar</label>
    <input data-index="${index}" data-key="tableHeaders" value="${escapeHtml(block.tableHeaders || "")}">
    <label>Satırlar</label>
    <textarea data-index="${index}" data-key="tableRows">${escapeHtml(block.tableRows || "")}</textarea>
  `;
}

      return "";
    }

    function renderBlockList() {
      if (!pageData?.blocks?.length) {
        blockList.innerHTML = `<p style="color:#64748b;margin:0">Henüz blok yok.</p>`;
        return;
      }

      blockList.innerHTML = pageData.blocks.map((block, index) => {
        const selected = block.id === selectedId ? " selected" : "";
        const expanded = expandedIds.has(block.id);

        return `
          <div class="block-item${selected}">
            <div class="block-head">
              <button class="block-arrow" type="button" data-expand="${escapeHtml(block.id)}">${expanded ? "▾" : "▸"}</button>
              <button class="block-name" type="button" data-select="${escapeHtml(block.id)}">${escapeHtml(block.type.toUpperCase())}</button>
              <div class="block-actions">
                <button class="block-mini" type="button" data-up="${index}">↑</button>
                <button class="block-mini" type="button" data-down="${index}">↓</button>
                <button class="block-mini danger" type="button" data-remove="${index}">×</button>
              </div>
            </div>
            ${expanded ? `<div class="block-body">${renderBlockFields(block, index)}</div>` : ""}
          </div>
        `;
      }).join("");

      blockList.querySelectorAll("[data-select]").forEach((btn) => {
        btn.addEventListener("click", () => setSelected(btn.getAttribute("data-select")));
      });

      blockList.querySelectorAll("[data-expand]").forEach((btn) => {
        btn.addEventListener("click", () => toggleExpanded(btn.getAttribute("data-expand")));
      });

      blockList.querySelectorAll("[data-up]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.getAttribute("data-up"));
          const target = index - 1;
          if (target < 0) return;
          const tmp = pageData.blocks[index];
          pageData.blocks[index] = pageData.blocks[target];
          pageData.blocks[target] = tmp;
          renderLocalUi();
        });
      });

      blockList.querySelectorAll("[data-down]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.getAttribute("data-down"));
          const target = index + 1;
          if (target >= pageData.blocks.length) return;
          const tmp = pageData.blocks[index];
          pageData.blocks[index] = pageData.blocks[target];
          pageData.blocks[target] = tmp;
          renderLocalUi();
        });
      });

      blockList.querySelectorAll("[data-remove]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.getAttribute("data-remove"));
          const removingId = pageData.blocks[index]?.id;
          pageData.blocks.splice(index, 1);
          if (selectedId === removingId) selectedId = pageData.blocks[0]?.id || null;
          renderLocalUi();
        });
      });

      blockList.querySelectorAll("[data-index][data-key]").forEach((field) => {
        const apply = () => {
          const index = Number(field.getAttribute("data-index"));
          const key = field.getAttribute("data-key");
          let value = field.value;
          if (["height"].includes(key)) value = Number(value || 0);
          pageData.blocks[index] = normalizeBlock({ ...pageData.blocks[index], [key]: value }, index);
          renderLocalUi();
        };
        field.addEventListener("input", apply);
        field.addEventListener("change", apply);
      });
    }

  function renderLocalUi() {
  if (!pageData) return;
  renderToolbar();
  renderInspector();
  renderBlockList();
  designerTitle.textContent = pageData.title || "Tasarım Düzenleyici";
  designerSub.textContent = (pageData.isHome ? "/" : "/" + (pageData.slug || "")) || "/";
  pagePathChip.textContent = (pageData.isHome ? "/" : "/" + (pageData.slug || "")) || "/";
  pageModeChip.textContent = pageData.editorMode || "blocks";
  sendSelectToPreview();
  sendLiveUpdateToPreview();
}

    function buildPreviewUrl() {
      const path = pageData?.isHome ? "/" : "/" + (pageData?.slug || "");
      const u = new URL(path || "/", location.origin);
      u.searchParams.set("vera_designer", "1");
      u.searchParams.set("_ts", String(Date.now()));
      return u.toString();
    }

    function loadPreview() {
      previewReady = false;
      previewFrame.src = buildPreviewUrl();
    }

    function requestPreviewSnapshot() {
      if (!previewReady || !previewFrame.contentWindow) return;
      previewFrame.contentWindow.postMessage({ type: "vera:requestSnapshot" }, "*");
    }

    function sendSelectToPreview() {
      if (!previewReady || !previewFrame.contentWindow || !selectedId) return;
      previewFrame.contentWindow.postMessage({ type: "vera:selectBlock", blockId: selectedId }, "*");
    }
    function sendLiveUpdateToPreview() {
  if (!previewReady || !previewFrame.contentWindow || !pageData) return;
  previewFrame.contentWindow.postMessage({ type: "vera:updatePage", page: pageData }, "*");
}

    async function loadPageOnly() {
      if (!pageId) {
        loading.textContent = "Sayfa id bulunamadı.";
        return false;
      }

      try {
        const res = await fetch(`/api/pages?id=${encodeURIComponent(pageId)}`, { headers: { Accept: "application/json" } });
        const data = await res.json();
        if (!data.ok || !data.page) {
          loading.textContent = "Sayfa bulunamadı.";
          return false;
        }

        pageData = {
          ...data.page,
          blocks: Array.isArray(data.page.blocks) ? data.page.blocks.map((block, index) => normalizeBlock(block, index)) : []
        };

        selectedId = pageData.blocks?.[0]?.id || null;
        if (selectedId) expandedIds.add(selectedId);
        return true;
      } catch {
        loading.textContent = "Tasarım düzenleyici yüklenemedi.";
        return false;
      }
    }

    async function saveDesigner() {
      try {
        const res = await fetch("/api/pages", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ action: "save", page: pageData })
        });

        const data = await res.json();
        if (!data.ok) {
          alert(data.error || "Kaydetme başarısız.");
          return;
        }

        if (data.page) {
          pageData = {
            ...data.page,
            blocks: Array.isArray(data.page.blocks) ? data.page.blocks.map((block, index) => normalizeBlock(block, index)) : []
          };
        }

        renderLocalUi();
        loadPreview();
        alert("Kaydedildi.");
      } catch {
        alert("İstek sırasında hata oluştu.");
      }
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type === "vera:ready") {
        previewReady = true;
        sendSelectToPreview();
        requestPreviewSnapshot();
      }

      if (data.type === "vera:blockSelected" && data.blockId) {
        selectedId = data.blockId;
        renderLocalUi();
      }

      if (data.type === "vera:snapshot" && data.height) {
        previewFrame.style.height = Math.max(900, Number(data.height || 900)) + "px";
      }
    });

    document.querySelectorAll("[data-add]").forEach((btn) => {
      btn.addEventListener("click", () => addBlock(btn.getAttribute("data-add")));
    });

    saveBtn.addEventListener("click", saveDesigner);
    reloadPreviewBtn.addEventListener("click", loadPreview);

    openLiveBtn.addEventListener("click", () => {
      if (!pageData) return;
      const path = pageData.isHome ? "/" : "/" + (pageData.slug || "");
      window.open(path || "/", "_blank");
    });

    backBtn.addEventListener("click", () => {
      location.href = "/admin/pages.html";
    });

    (async function init() {
      const ok = await loadPageOnly();
      if (!ok) return;
      loading.style.display = "none";
      app.style.display = "grid";
      renderLocalUi();
      loadPreview();
    })();
  </script>
</body>
</html>

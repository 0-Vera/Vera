<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera Admin - Tasarım Düzenleyici</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#eef3f8;color:#0f172a}
    .loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#64748b}

    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:250px 1fr;
    }

    .side{
      background:#ffffff;
      border-right:1px solid #e2e8f0;
      display:grid;
      grid-template-rows:auto auto auto 1fr auto;
      min-height:100vh;
      position:sticky;
      top:0;
    }

    .side-top{padding:12px;border-bottom:1px solid #eef2f7}
    .side-top h1{margin:0 0 4px;font-size:16px}
    .side-top p{margin:0;font-size:12px;color:#64748b}

    .add-toolbar,.mini-toolbar{
      padding:10px;
      border-bottom:1px solid #eef2f7;
      display:grid;
      gap:6px;
    }
    .add-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
    .mini-grid-toolbar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}

    .tiny-btn{
      border:0;
      border-radius:8px;
      padding:8px 0;
      font-size:10px;
      font-weight:700;
      background:#e2e8f0;
      color:#0f172a;
      cursor:pointer;
      min-width:0;
    }

    .inspector{padding:10px;border-bottom:1px solid #eef2f7}
    .mini-card{border:1px solid #e2e8f0;border-radius:10px;padding:8px;background:#fff}
    .mini-card-title{font-size:11px;font-weight:700;margin-bottom:8px;color:#334155}
    .mini-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}
    .mini-grid label{display:block;margin-bottom:3px;font-size:10px;color:#475569}
    .mini-grid input{width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:7px 8px;font-size:11px;background:#fff}

    .block-list{min-height:0;overflow:auto;padding:8px}
    .block-item{border:1px solid #e2e8f0;border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff}
    .block-item.selected{border-color:#2563eb;box-shadow:0 0 0 1px rgba(37,99,235,.10)}
    .block-head{display:grid;grid-template-columns:18px 1fr auto;gap:6px;align-items:center;padding:6px}
    .block-arrow,.block-name,.block-mini{border:0;background:transparent;cursor:pointer;padding:0}
    .block-arrow{font-size:11px;color:#475569;width:18px;height:18px}
    .block-name{text-align:left;font-size:11px;font-weight:700;color:#0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .block-actions{display:flex;gap:4px}
    .block-mini{width:18px;height:18px;border-radius:6px;background:#e2e8f0;font-size:10px;font-weight:700;color:#0f172a}
    .block-mini.danger{background:#fee2e2;color:#991b1b}
    .block-body{padding:6px;border-top:1px solid #eef2f7;background:#fafcff}
    .block-body label{display:block;margin-bottom:3px;font-size:10px;color:#475569}
    .block-body input,.block-body select,.block-body textarea{
      width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:7px 8px;font-size:11px;background:#fff;margin-bottom:7px
    }
    .block-body textarea{min-height:64px;resize:vertical}

    .side-bottom{padding:10px;border-top:1px solid #eef2f7;display:grid;gap:8px}
    .btn{border:0;border-radius:10px;padding:10px 12px;font-size:12px;font-weight:700;cursor:pointer}
    .btn-primary{background:#2563eb;color:#fff}
    .btn-secondary{background:#e2e8f0;color:#0f172a}
    .btn-danger{background:#dc2626;color:#fff}

    .stage-wrap{min-width:0;overflow:auto;padding:18px}
    .stage-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .chip{display:inline-flex;align-items:center;padding:8px 10px;border-radius:999px;background:#fff;border:1px solid #dbe3ee;font-size:12px;font-weight:700;color:#334155}

    .iframe-shell{
      width:min(100%, 1800px);
      margin:0 auto;
      border:1px solid #d7e0ec;
      border-radius:16px;
      overflow:hidden;
      background:#fff;
      box-shadow:0 16px 40px rgba(15,23,42,.07);
    }

    .preview-frame{
      width:100%;
      border:0;
      display:block;
      background:#fff;
      min-height:900px;
    }

    @media(max-width:1200px){
      .app{grid-template-columns:1fr}
      .side{position:relative;min-height:auto}
    }
    .side-tabs{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:6px;
  padding:10px;
  border-bottom:1px solid #eef2f7;
  background:#f8fafc;
}

.side-tab{
  border:1px solid #dbe3ee;
  background:#fff;
  color:#334155;
  border-radius:10px;
  padding:9px 8px;
  font-size:11px;
  font-weight:700;
  cursor:pointer;
}

.side-tab.active{
  background:#2563eb;
  color:#fff;
  border-color:#2563eb;
}

.side-panels{
  min-height:0;
  overflow:hidden;
}

.side-panel{
  display:none;
  min-height:0;
}

.side-panel.active{
  display:block;
}

.template-panel{
  padding:12px;
  border-bottom:1px solid #eef2f7;
  display:grid;
  gap:10px;
  background:#fbfdff;
}

.template-panel h3{
  margin:0;
  font-size:13px;
  color:#0f172a;
}

.template-note{
  margin:0;
  font-size:11px;
  line-height:1.5;
  color:#64748b;
}

.template-list{
  display:grid;
  gap:10px;
}

.template-item{
  border:1px solid #dbe3ee;
  border-radius:14px;
  padding:12px;
  background:linear-gradient(180deg,#ffffff 0%, #f8fafc 100%);
  display:grid;
  gap:10px;
  box-shadow:0 4px 14px rgba(15,23,42,.04);
}

.template-title{
  font-size:12px;
  font-weight:700;
  color:#0f172a;
}

.template-meta{
  font-size:11px;
  color:#64748b;
  line-height:1.5;
}

.template-actions{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:6px;
}

.tiny-btn.alt{
  background:#dbeafe;
  color:#1d4ed8;
}
  </style>
</head>
<body>
  <div id="loading" class="loading">Tasarım düzenleyici yükleniyor...</div>

  <div id="app" class="app" style="display:none">
    <aside class="side">
      <div class="side-top">
        <h1 id="designerTitle">Tasarım Düzenleyici</h1>
        <p id="designerSub">Sayfa yükleniyor...</p>
      </div>

<div class="side-tabs">
  <button class="side-tab active" type="button" data-tab="add">Ekle</button>
  <button class="side-tab" type="button" data-tab="templates">Bölümler</button>
  <button class="side-tab" type="button" data-tab="inspector">Ayarlar</button>
  <button class="side-tab" type="button" data-tab="blocks">Bloklar</button>
</div>

<div class="side-panels">
  <div class="side-panel active" data-panel="add">
    <div class="add-toolbar">
      <div class="add-grid">
        <button class="tiny-btn" data-add="hero" type="button">Hero</button>
        <button class="tiny-btn" data-add="text" type="button">Metin</button>
        <button class="tiny-btn" data-add="button" type="button">Buton</button>
        <button class="tiny-btn" data-add="image" type="button">Görsel</button>
        <button class="tiny-btn" data-add="html" type="button">HTML</button>
        <button class="tiny-btn" data-add="spacer" type="button">Boşluk</button>
        <button class="tiny-btn" data-add="table" type="button">Tablo</button>
        <button class="tiny-btn" data-add="section" type="button">Bölüm</button>
        <button class="tiny-btn" data-add="features" type="button">Özellik</button>
        <button class="tiny-btn" data-add="cards" type="button">Kartlar</button>
        <button class="tiny-btn" data-add="stats" type="button">İstatistik</button>
        <button class="tiny-btn" data-add="faq" type="button">SSS</button>
      </div>
    </div>

    <div id="miniToolbar" class="mini-toolbar"></div>
  </div>

  <div class="side-panel" data-panel="templates">
    <div class="template-panel">
      <h3>Hazır Bölümler</h3>
      <p class="template-note">Hazır şablon ekle veya seçili bloğu bu tarayıcıda tekrar kullanılmak üzere kaydet.</p>
      <div id="templateList" class="template-list"></div>
    </div>
  </div>

  <div class="side-panel" data-panel="inspector">
    <div id="inspector" class="inspector"></div>
  </div>

  <div class="side-panel" data-panel="blocks">
    <div id="blockList" class="block-list"></div>
  </div>
</div>
      <div class="side-bottom">
        <button id="saveBtn" class="btn btn-primary" type="button">Kaydet</button>
        <button id="reloadPreviewBtn" class="btn btn-secondary" type="button">Önizlemeyi Yenile</button>
        <button id="openLiveBtn" class="btn btn-secondary" type="button">Canlı Sayfayı Aç</button>
        <button id="backBtn" class="btn btn-danger" type="button">Sayfalara Dön</button>
      </div>
    </aside>

    <main class="stage-wrap">
      <div class="stage-toolbar">
        <span class="chip" id="pagePathChip">/</span>
        <span class="chip" id="pageModeChip">blocks</span>
      </div>

      <div class="iframe-shell">
        <iframe id="previewFrame" class="preview-frame" title="Sayfa önizleme"></iframe>
      </div>
    </main>
  </div>

  <script>
    const url = new URL(location.href);
    const pageId = url.searchParams.get("id") || "";

    let pageData = null;
    let allPages = [];
    let selectedId = null;
    let expandedIds = new Set();
    let previewReady = false;

    const TEMPLATE_STORAGE_KEY = "veraReusableSectionsV1";

    const BUILTIN_TEMPLATES = [
      {
        id: "preset-hero-cta",
        name: "Hero + CTA",
        builtIn: true,
        blocks: [
          {
            type: "hero",
            title: "Güçlü üretim altyapısı",
            text: "Kurumsal web sitesinde öne çıkan ilk mesaj için hazır hero bölümü.",
            primaryText: "Teklif Al",
            primaryActionType: "anchor",
            primaryActionValue: "#iletisim",
            secondaryText: "Ürünler",
            secondaryActionType: "anchor",
            secondaryActionValue: "#urunler",
            align: "center",
            fullWidth: true,
            padding: 40,
            radius: 24
          }
        ]
      },
      {
        id: "preset-feature-grid",
        name: "3'lü Özellik Alanı",
        builtIn: true,
        blocks: [
          {
            type: "section",
            title: "Neden bizi tercih etmelisiniz?",
            text: "Öne çıkan güçlü yönleri anlatan hazır alan.",
            fullWidth: true,
            padding: 28,
            radius: 22
          },
          {
            type: "cards",
            title: "Avantajlar",
            text: "Kartları kendi başlık ve açıklamalarına göre düzenleyebilirsin.",
            items: "Hızlı Üretim|Termin yönetimi güçlü\nEsnek Tasarım|Markaya uygun özelleştirme\nKurumsal Destek|Süreç odaklı iletişim",
            colStartDesktop: 1,
            colSpanDesktop: 12
          }
        ]
      },
      {
        id: "preset-faq",
        name: "SSS Bölümü",
        builtIn: true,
        blocks: [
          {
            type: "faq",
            title: "Sık Sorulan Sorular",
            text: "Müşterilerin en çok sorduğu soruları burada toplayabilirsin.",
            items: "Minimum sipariş var mı?|Ürüne göre değişebilir, teklif formu ile netleşir.\nÖzel üretim yapılıyor mu?|Evet, proje bazlı uyarlama yapılabilir.\nTeslim süresi nedir?|Ürün ve miktara göre planlanır."
          }
        ]
      },
      {
        id: "preset-stats",
        name: "İstatistik Şeridi",
        builtIn: true,
        blocks: [
          {
            type: "stats",
            title: "Rakamlarla Güçlü Profil",
            text: "Kısa metrik alanı",
            items: "1200+|Teslim edilen sipariş\n98%|Müşteri memnuniyeti\n7/24|Operasyon desteği\n16 Yıl|Sektör deneyimi",
            fullWidth: true,
            padding: 24,
            radius: 22
          }
        ]
      }
    ];


    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function clamp(value, min, max, fallback) {
      const n = Number(value);
      if (!Number.isFinite(n)) return fallback;
      return Math.max(min, Math.min(max, n));
    }

    function normalizeStartSpan(start, span, maxCols) {
      let safeSpan = clamp(span, 1, maxCols, maxCols);
      let safeStart = clamp(start, 1, maxCols, 1);
      if (safeStart + safeSpan - 1 > maxCols) {
        safeStart = Math.max(1, maxCols - safeSpan + 1);
      }
      return { start: safeStart, span: safeSpan };
    }

  function newBlock(type, order = 0) {
  const base = {
    id: "b-" + Math.random().toString(36).slice(2) + Date.now(),
    order,
    type,
    visible: true,
    background: "#ffffff",
    color: "#0f172a",
    padding: 24,
    radius: 18,
    align: "left",
    maxWidth: 100,
    cssClass: "",
    htmlId: "",
    layoutMode: "grid",
    fullWidth: false,
    surface: true,
    colStartDesktop: 1,
    colSpanDesktop: 12,
    colStartTablet: 1,
    colSpanTablet: 12,
    colStartMobile: 1,
    colSpanMobile: 12,
    rowStartDesktop: 1,
    rowSpan: 1,
    minHeight: 0,
    contentWidthMode: "full",
    innerMaxWidth: 100,
    tableHeaders: "",
    tableRows: "",
    items: ""
  };

  if (type === "hero") return { ...base, title: "Başlık", text: "Açıklama", primaryText: "Buton", primaryLink: "#", primaryActionType: "url", primaryActionValue: "#", primaryActionPageId: "", primaryActionNewTab: false, secondaryText: "", secondaryLink: "", secondaryActionType: "url", secondaryActionValue: "", secondaryActionPageId: "", secondaryActionNewTab: false, align: "center", padding: 32, radius: 20, fullWidth: true };
  if (type === "text") return { ...base, title: "", text: "Metin", colStartDesktop: 1, colSpanDesktop: 6 };
  if (type === "button") return { ...base, text: "Buton", link: "#", actionType: "url", actionValue: "#", actionPageId: "", actionNewTab: false, style: "primary", surface: false, colStartDesktop: 1, colSpanDesktop: 4 };
  if (type === "image") return { ...base, src: "", alt: "", width: "100%", link: "", align: "center", colStartDesktop: 7, colSpanDesktop: 6 };
  if (type === "html") return { ...base, html: "<div>Özel HTML</div>" };
  if (type === "spacer") return { ...base, height: 32, background: "transparent", padding: 0, radius: 0, fullWidth: true, surface: false };
  if (type === "table") return { ...base, tableHeaders: "Sütun 1,Sütun 2", tableRows: "Değer 1|Değer 2\nDeğer 3|Değer 4", colStartDesktop: 1, colSpanDesktop: 12 };
  if (type === "section") return { ...base, title: "Bölüm Başlığı", text: "Bölüm açıklaması", fullWidth: true, padding: 28, radius: 22, contentWidthMode: "boxed", innerMaxWidth: 86 };
  if (type === "features") return { ...base, title: "Özellikler", text: "Öne çıkan maddeler", items: "Hızlı teslimat\nEsnek üretim\nKurumsal destek", colStartDesktop: 1, colSpanDesktop: 6 };
  if (type === "cards") return { ...base, title: "Kart Alanı", text: "Kart açıklaması", items: "Başlık 1|Açıklama 1\nBaşlık 2|Açıklama 2\nBaşlık 3|Açıklama 3", colStartDesktop: 1, colSpanDesktop: 12 };
  if (type === "stats") return { ...base, title: "İstatistikler", text: "Rakamlarla özet alanı", items: "1200+|Teslimat\n98%|Memnuniyet\n16 Yıl|Deneyim\n7/24|Destek", fullWidth: true, padding: 20, radius: 22 };
  if (type === "faq") return { ...base, title: "Sık Sorulan Sorular", text: "Soru ve cevapları satır satır gir.", items: "Soru 1?|Cevap 1\nSoru 2?|Cevap 2", colStartDesktop: 1, colSpanDesktop: 12 };
  return base;
}
function normalizeBlock(block = {}, index = 0) {
  const gridCols = clamp(pageData?.pageOptions?.gridColumns, 1, 24, 12);
  const desktop = normalizeStartSpan(block.colStartDesktop, block.colSpanDesktop, gridCols);
  const tablet = normalizeStartSpan(block.colStartTablet, block.colSpanTablet, gridCols);
  const mobile = normalizeStartSpan(block.colStartMobile, block.colSpanMobile, gridCols);

  const normalized = {
    ...block,
    order: Number.isFinite(Number(block.order)) ? Number(block.order) : index,
    visible: block.visible !== false,
    background: String(block.background || "#ffffff"),
    color: String(block.color || "#0f172a"),
    padding: clamp(block.padding, 0, 240, 24),
    radius: clamp(block.radius, 0, 80, 18),
    align: ["left", "center", "right"].includes(block.align) ? block.align : "left",
    maxWidth: clamp(block.maxWidth, 30, 100, 100),
    cssClass: String(block.cssClass || ""),
    htmlId: String(block.htmlId || ""),
    fullWidth: !!block.fullWidth,
    surface: block.surface !== false,
    colStartDesktop: desktop.start,
    colSpanDesktop: desktop.span,
    colStartTablet: tablet.start,
    colSpanTablet: tablet.span,
    colStartMobile: mobile.start,
    colSpanMobile: mobile.span,
    rowStartDesktop: clamp(block.rowStartDesktop, 1, 500, 1),
    rowSpan: clamp(block.rowSpan, 1, 12, 1),
    minHeight: clamp(block.minHeight, 0, 2000, 0),
    contentWidthMode: block.contentWidthMode === "boxed" ? "boxed" : "full",
    innerMaxWidth: clamp(block.innerMaxWidth, 20, 100, 100),
    tableHeaders: String(block.tableHeaders || ""),
    tableRows: String(block.tableRows || ""),
    actionType: ["none","url","page","anchor","email","phone","whatsapp","download"].includes(block.actionType) ? block.actionType : "url",
    actionValue: String(block.actionValue || block.link || ""),
    actionPageId: String(block.actionPageId || block.action?.pageId || ""),
    actionNewTab: !!block.actionNewTab,
    primaryActionType: ["none","url","page","anchor","email","phone","whatsapp","download"].includes(block.primaryActionType) ? block.primaryActionType : "url",
    primaryActionValue: String(block.primaryActionValue || block.primaryLink || ""),
    primaryActionPageId: String(block.primaryActionPageId || block.primaryAction?.pageId || ""),
    primaryActionNewTab: !!block.primaryActionNewTab,
    secondaryActionType: ["none","url","page","anchor","email","phone","whatsapp","download"].includes(block.secondaryActionType) ? block.secondaryActionType : "url",
    secondaryActionValue: String(block.secondaryActionValue || block.secondaryLink || ""),
    secondaryActionPageId: String(block.secondaryActionPageId || block.secondaryAction?.pageId || ""),
    secondaryActionNewTab: !!block.secondaryActionNewTab,
    items: String(block.items || "")
  };

  normalized.action = {
    type: normalized.actionType,
    url: normalized.actionType === "url" ? normalized.actionValue : "#",
    anchor: normalized.actionType === "anchor" ? normalized.actionValue : "",
    email: normalized.actionType === "email" ? normalized.actionValue : "",
    phone: normalized.actionType === "phone" ? normalized.actionValue : "",
    whatsapp: normalized.actionType === "whatsapp" ? normalized.actionValue : "",
    downloadUrl: normalized.actionType === "download" ? normalized.actionValue : "",
    pageId: normalized.actionType === "page" ? normalized.actionPageId : "",
    newTab: normalized.actionNewTab
  };

  normalized.primaryAction = {
    type: normalized.primaryActionType,
    url: normalized.primaryActionType === "url" ? normalized.primaryActionValue : "#",
    anchor: normalized.primaryActionType === "anchor" ? normalized.primaryActionValue : "",
    email: normalized.primaryActionType === "email" ? normalized.primaryActionValue : "",
    phone: normalized.primaryActionType === "phone" ? normalized.primaryActionValue : "",
    whatsapp: normalized.primaryActionType === "whatsapp" ? normalized.primaryActionValue : "",
    downloadUrl: normalized.primaryActionType === "download" ? normalized.primaryActionValue : "",
    pageId: normalized.primaryActionType === "page" ? normalized.primaryActionPageId : "",
    newTab: normalized.primaryActionNewTab
  };

  normalized.secondaryAction = {
    type: normalized.secondaryActionType,
    url: normalized.secondaryActionType === "url" ? normalized.secondaryActionValue : "#",
    anchor: normalized.secondaryActionType === "anchor" ? normalized.secondaryActionValue : "",
    email: normalized.secondaryActionType === "email" ? normalized.secondaryActionValue : "",
    phone: normalized.secondaryActionType === "phone" ? normalized.secondaryActionValue : "",
    whatsapp: normalized.secondaryActionType === "whatsapp" ? normalized.secondaryActionValue : "",
    downloadUrl: normalized.secondaryActionType === "download" ? normalized.secondaryActionValue : "",
    pageId: normalized.secondaryActionType === "page" ? normalized.secondaryActionPageId : "",
    newTab: normalized.secondaryActionNewTab
  };

  if (normalized.fullWidth) {
    normalized.colStartDesktop = 1;
    normalized.colSpanDesktop = gridCols;
    normalized.colStartTablet = 1;
    normalized.colSpanTablet = gridCols;
    normalized.colStartMobile = 1;
    normalized.colSpanMobile = gridCols;
  }

  return normalized;
}

function pageOptionsHtml(selectedId) {
  if (!allPages.length) return `<option value="">Sayfa yok</option>`;
  return allPages.map((page) => {
    const value = String(page.id || "");
    const label = page.isHome ? "Ana Sayfa (/)" : `${page.title || page.slug || "Sayfa"} (${page.slug ? "/" + page.slug : "/"})`;
    return `<option value="${escapeHtml(value)}"${value === String(selectedId || "") ? " selected" : ""}>${escapeHtml(label)}</option>`;
  }).join("");
}

function renderActionEditor(prefix, block, index, label = "Eylem") {
  const typeKey = prefix ? `${prefix}ActionType` : "actionType";
  const valueKey = prefix ? `${prefix}ActionValue` : "actionValue";
  const pageKey = prefix ? `${prefix}ActionPageId` : "actionPageId";
  const newTabKey = prefix ? `${prefix}ActionNewTab` : "actionNewTab";
  const currentType = block[typeKey] || "url";
  const currentValue = block[valueKey] || "";
  const currentPageId = block[pageKey] || "";
  const showValue = currentType !== "none" && currentType !== "page";
  const valueLabelMap = {
    url: "URL",
    anchor: "Anchor",
    email: "E-posta",
    phone: "Telefon",
    whatsapp: "WhatsApp",
    download: "Dosya URL"
  };
  const valueLabel = valueLabelMap[currentType] || "Değer";
  return `
    <label>${label}</label>
    <select data-index="${index}" data-key="${typeKey}">
      <option value="url"${currentType === "url" ? " selected" : ""}>URL</option>
      <option value="page"${currentType === "page" ? " selected" : ""}>Sayfa</option>
      <option value="anchor"${currentType === "anchor" ? " selected" : ""}>Anchor</option>
      <option value="email"${currentType === "email" ? " selected" : ""}>E-posta</option>

function loadSavedTemplates() {
  try {
    const parsed = JSON.parse(localStorage.getItem(TEMPLATE_STORAGE_KEY) || "[]");
    return Array.isArray(parsed) ? parsed : [];
  } catch (err) {
    return [];
  }
}

function saveSavedTemplates(list) {
  localStorage.setItem(TEMPLATE_STORAGE_KEY, JSON.stringify(Array.isArray(list) ? list : []));
}

function getAllTemplates() {
  return [...BUILTIN_TEMPLATES, ...loadSavedTemplates()];
}

function instantiateTemplateBlocks(template) {
  const sourceBlocks = Array.isArray(template?.blocks) ? template.blocks : [];
  return sourceBlocks.map((block, index) => normalizeBlock({
    ...JSON.parse(JSON.stringify(block)),
    id: "b-" + Math.random().toString(36).slice(2) + Date.now() + "-" + index
  }, (pageData?.blocks?.length || 0) + index));
}

function insertTemplate(templateId) {
  const template = getAllTemplates().find((item) => item.id === templateId);
  if (!template || !pageData) return;
  const blocks = instantiateTemplateBlocks(template);
  if (!blocks.length) return;
  pageData.blocks = Array.isArray(pageData.blocks) ? pageData.blocks : [];
  pageData.blocks.push(...blocks);
  selectedId = blocks[0].id;
  blocks.forEach((block) => expandedIds.add(block.id));
  autoArrangeBlocks();
}

function saveSelectedAsTemplate() {
  const index = getSelectedIndex();
  if (index < 0 || !pageData?.blocks?.[index]) {
    alert("Önce kaydetmek istediğin bloğu seç.");
    return;
  }
  const defaultName = (pageData.blocks[index].title || pageData.blocks[index].text || pageData.blocks[index].type || "Yeni Şablon").slice(0, 40);
  const name = prompt("Şablon adı", defaultName);
  if (!name) return;
  const saved = loadSavedTemplates();
  saved.unshift({
    id: "saved-" + Date.now(),
    name: String(name).trim(),
    builtIn: false,
    blocks: [JSON.parse(JSON.stringify(pageData.blocks[index]))]
  });
  saveSavedTemplates(saved.slice(0, 30));
  renderTemplateLibrary();
}

function deleteTemplate(templateId) {
  const saved = loadSavedTemplates().filter((item) => item.id !== templateId);
  saveSavedTemplates(saved);
  renderTemplateLibrary();
}

  const wrap = document.getElementById("templateList");

function autoArrangeBlocks() {
  if (!pageData || !Array.isArray(pageData.blocks)) return;

  const gridCols = clamp(pageData?.pageOptions?.gridColumns, 1, 24, 12);
  let currentRow = 1;
  let currentCol = 1;

  pageData.blocks = pageData.blocks.map((block, index) => {
    const normalized = normalizeBlock(block, index);

    if (normalized.fullWidth || normalized.type === "section" || normalized.type === "spacer") {
      currentCol = 1;
      const fullBlock = normalizeBlock({
        ...normalized,
        colStartDesktop: 1,
        colSpanDesktop: gridCols,
        rowStartDesktop: currentRow
      }, index);
      currentRow += Number(fullBlock.rowSpan || 1);
      return fullBlock;
    }

    const span = Number(normalized.colSpanDesktop || gridCols);

    if (currentCol + span - 1 > gridCols) {
      currentRow += 1;
      currentCol = 1;
    }

    const arranged = normalizeBlock({
      ...normalized,
      colStartDesktop: currentCol,
      rowStartDesktop: currentRow
    }, index);

    currentCol += span;

    if (currentCol > gridCols) {
      currentCol = 1;
      currentRow += Math.max(1, Number(arranged.rowSpan || 1));
    }

    return arranged;
  });

  renderLocalUi();
}
    function getSelectedIndex() {

      sendSelectToPreview();

    function updateSelected(patch = {}) {
      const index = getSelectedIndex();
      if (index < 0) return;
      pageData.blocks[index] = normalizeBlock({ ...pageData.blocks[index], ...patch }, index);
      renderLocalUi();
    }

    function toggleExpanded(id) {
      if (expandedIds.has(id)) expandedIds.delete(id);
      else expandedIds.add(id);
      renderBlockList();
    }

    function moveSelected(delta) {
      const index = getSelectedIndex();
      if (index < 0) return;
      const block = pageData.blocks[index];
      if (block.fullWidth) return;
      updateSelected({ colStartDesktop: Number(block.colStartDesktop || 1) + delta });
    }

    function resizeSelected(delta) {
      const index = getSelectedIndex();
      if (index < 0) return;
      const block = pageData.blocks[index];
      if (block.fullWidth) return;
      updateSelected({ colSpanDesktop: Number(block.colSpanDesktop || 12) + delta });
    }

    function changeSelectedRow(delta) {
      const index = getSelectedIndex();
      if (index < 0) return;
      const block = pageData.blocks[index];
      updateSelected({ rowSpan: Number(block.rowSpan || 1) + delta });
    }

    function toggleSelectedFullWidth() {
      const index = getSelectedIndex();
      if (index < 0) return;
      const block = pageData.blocks[index];
      updateSelected({ fullWidth: !block.fullWidth });
    }

    function addBlock(type) {
      if (!pageData) return;
      const block = normalizeBlock(newBlock(type, pageData.blocks.length), pageData.blocks.length);
      pageData.blocks.push(block);
      selectedId = block.id;
      expandedIds.add(block.id);
      renderLocalUi();
    }

    function renderBlockList() {

        return `
          <div class="block-item${selected}">

              <button class="block-arrow" type="button" data-expand="${escapeHtml(block.id)}">${expanded ? "▾" : "▸"}</button>

                <button class="block-mini" type="button" data-up="${index}">↑</button>
                <button class="block-mini" type="button" data-down="${index}">↓</button>
                <button class="block-mini" type="button" data-copy="${index}">⎘</button>
                <button class="block-mini danger" type="button" data-remove="${index}">×</button>
              </div>
            </div>
            ${expanded ? `<div class="block-body">${renderBlockFields(block, index)}</div>` : ""}
          </div>
        `;
      }).join("");

      blockList.querySelectorAll("[data-select]").forEach((btn) => {
        btn.addEventListener("click", () => setSelected(btn.getAttribute("data-select")));
      });

      blockList.querySelectorAll("[data-expand]").forEach((btn) => {
        btn.addEventListener("click", () => toggleExpanded(btn.getAttribute("data-expand")));
      });

      blockList.querySelectorAll("[data-up]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.getAttribute("data-up"));
          const target = index - 1;
          if (target < 0) return;
          const tmp = pageData.blocks[index];
          pageData.blocks[index] = pageData.blocks[target];
          pageData.blocks[target] = tmp;
          renderLocalUi();
        });
      });

      blockList.querySelectorAll("[data-down]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.getAttribute("data-down"));
          const target = index + 1;
          if (target >= pageData.blocks.length) return;
          const tmp = pageData.blocks[index];
          pageData.blocks[index] = pageData.blocks[target];
          pageData.blocks[target] = tmp;
          renderLocalUi();
        });
      });

      blockList.querySelectorAll("[data-copy]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.getAttribute("data-copy"));
          const source = pageData.blocks[index];
          if (!source) return;
          const clone = normalizeBlock({ ...JSON.parse(JSON.stringify(source)), id: "b-" + Math.random().toString(36).slice(2) + Date.now() }, index + 1);
          pageData.blocks.splice(index + 1, 0, clone);
          selectedId = clone.id;
          expandedIds.add(clone.id);
          renderLocalUi();
        });
      });

      blockList.querySelectorAll("[data-remove]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const index = Number(btn.getAttribute("data-remove"));
          const removingId = pageData.blocks[index]?.id;
          pageData.blocks.splice(index, 1);
          if (selectedId === removingId) selectedId = pageData.blocks[0]?.id || null;
          renderLocalUi();
        });
      });

      blockList.querySelectorAll("[data-index][data-key]").forEach((field) => {
        const apply = () => {
          const index = Number(field.getAttribute("data-index"));
          const key = field.getAttribute("data-key");
          let value = field.hasAttribute("data-bool") ? field.checked : field.value;
          if (["height","padding","radius","maxWidth","colStartDesktop","colSpanDesktop","rowStartDesktop","rowSpan","minHeight","innerMaxWidth"].includes(key)) value = Number(value || 0);
          pageData.blocks[index] = normalizeBlock({ ...pageData.blocks[index], [key]: value }, index);
          renderLocalUi();
        };
        field.addEventListener("input", apply);
        field.addEventListener("change", apply);
      });
    }

    function buildPreviewUrl() {

      const u = new URL(path || "/", location.origin);
      u.searchParams.set("vera_designer", "1");
      u.searchParams.set("_ts", String(Date.now()));
      return u.toString();
    }

    function loadPreview() {
      previewReady = false;
      previewFrame.src = buildPreviewUrl();

    function requestPreviewSnapshot() {
      if (!previewReady || !previewFrame.contentWindow) return;
      previewFrame.contentWindow.postMessage({ type: "vera:requestSnapshot" }, "*");
    }

    function sendSelectToPreview() {
      if (!previewReady || !previewFrame.contentWindow || !selectedId) return;
      previewFrame.contentWindow.postMessage({ type: "vera:selectBlock", blockId: selectedId }, "*");
    }
    function sendLiveUpdateToPreview() {
  if (!previewReady || !previewFrame.contentWindow || !pageData) return;
  previewFrame.contentWindow.postMessage({ type: "vera:updatePage", page: pageData }, "*");
}


    async function loadPagesForActions() {
      try {
        const res = await fetch("/api/pages", { headers: { Accept: "application/json" }, credentials: "same-origin" });
        const data = await res.json();
        allPages = Array.isArray(data.pages) ? data.pages.map((page) => ({
          id: String(page.id || ""),
          title: String(page.title || ""),
          slug: String(page.slug || ""),
          isHome: !!page.isHome
        })) : [];
      } catch {
        allPages = [];
      }
    }

    async function loadPageOnly() {
      if (!pageId) {
        loading.textContent = "Sayfa id bulunamadı.";
        return false;
      }

      try {
        const res = await fetch(`/api/pages?id=${encodeURIComponent(pageId)}`, { headers: { Accept: "application/json" } });
        const data = await res.json();
        if (!data.ok || !data.page) {
          loading.textContent = "Sayfa bulunamadı.";
          return false;
        }

        pageData = {
          ...data.page,
          blocks: Array.isArray(data.page.blocks) ? data.page.blocks.map((block, index) => normalizeBlock(block, index)) : []
        };

        selectedId = pageData.blocks?.[0]?.id || null;
        if (selectedId) expandedIds.add(selectedId);
        return true;
      } catch {
        loading.textContent = "Tasarım düzenleyici yüklenemedi.";
        return false;
      }
    }

    async function saveDesigner() {
      try {
        const res = await fetch("/api/pages", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ action: "save", page: pageData })
        });

        const data = await res.json();
        if (!data.ok) {
          alert(data.error || "Kaydetme başarısız.");
          return;
        }

        if (data.page) {
          pageData = {
            ...data.page,
            blocks: Array.isArray(data.page.blocks) ? data.page.blocks.map((block, index) => normalizeBlock(block, index)) : []
          };
        }

        renderLocalUi();
        loadPreview();
        alert("Kaydedildi.");
      } catch {
        alert("İstek sırasında hata oluştu.");
      }
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type === "vera:ready") {
        previewReady = true;
        sendSelectToPreview();
        requestPreviewSnapshot();
      }

      if (data.type === "vera:blockSelected" && data.blockId) {
        selectedId = data.blockId;
        renderLocalUi();
      }

      if (data.type === "vera:snapshot" && data.height) {
        previewFrame.style.height = Math.max(900, Number(data.height || 900)) + "px";
      }
    });

    document.querySelectorAll("[data-add]").forEach((btn) => {
      btn.addEventListener("click", () => addBlock(btn.getAttribute("data-add")));
    });

    saveBtn.addEventListener("click", saveDesigner);
    reloadPreviewBtn.addEventListener("click", loadPreview);

    openLiveBtn.addEventListener("click", () => {
      if (!pageData) return;
      const path = pageData.isHome ? "/" : "/" + (pageData.slug || "");
      window.open(path || "/", "_blank");
    });

    backBtn.addEventListener("click", () => {
      location.href = "/admin/pages.html";
    });
document.querySelectorAll(".side-tab").forEach((tab) => {
  tab.addEventListener("click", () => {
    const target = tab.getAttribute("data-tab");
    document.querySelectorAll(".side-tab").forEach((btn) => btn.classList.remove("active"));
    document.querySelectorAll(".side-panel").forEach((panel) => panel.classList.remove("active"));
    tab.classList.add("active");
    const panel = document.querySelector(`.side-panel[data-panel="${target}"]`);
    if (panel) panel.classList.add("active");
  });
});
    (async function init() {
      await loadPagesForActions();
      const ok = await loadPageOnly();
      if (!ok) return;
      loading.style.display = "none";
      app.style.display = "grid";
      renderLocalUi();
      loadPreview();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vera CMS - Sayfa Yönetimi</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --danger: #dc2626;
  }
  body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
  .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .sidebar { background: #fff; border-right: 1px solid var(--border); padding: 24px; position: sticky; top: 0; height: 100vh; overflow: auto; }
  .brand h1 { margin: 0 0 6px; font-size: 24px; }
  .brand p { margin: 0 0 24px; color: var(--muted); font-size: 13px; }
  .nav a, .nav button { display: block; width: 100%; text-align: left; text-decoration: none; color: #334155; background: transparent; border: 0; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; font-size: 14px; cursor: pointer; }
  .nav a:hover, .nav button:hover, .nav .active { background: var(--accent-soft); color: #0f172a; }
  .main { padding: 24px; }
  .hero-card, .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 1px 2px rgba(15,23,42,.04); }
  .hero-card { padding: 22px; margin-bottom: 18px; }
  .editor-layout { display: grid; grid-template-columns: 360px 1fr; gap: 18px; }
  .card { padding: 18px; }
  .list-item { border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .list-item:hover, .list-item.active { border-color: #93c5fd; background: #eff6ff; }
  .muted { color: var(--muted); }
  label { display: block; margin: 0 0 6px; font-size: 14px; color: #475569; }
  input, select, textarea { width: 100%; border: 1px solid #cbd5e1; background: #fff; border-radius: 12px; padding: 11px 12px; color: var(--text); }
  textarea { min-height: 120px; resize: vertical; }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .tab-btn { border: 1px solid var(--border); background: #fff; color: #334155; border-radius: 999px; padding: 10px 14px; cursor: pointer; font-weight: 700; }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
  button.btn { border: 0; border-radius: 12px; padding: 11px 16px; font-weight: 700; cursor: pointer; }
  .primary { background: var(--accent); color: #fff; }
  .secondary { background: #e2e8f0; color: var(--text); }
  .danger { background: var(--danger); color: #fff; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .section-card { border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 12px; background: #fff; }
  .status { display: none; margin-top: 12px; padding: 12px; border-radius: 12px; font-size: 14px; }
  .status.ok { display: block; background: #dcfce7; color: #166534; }
  .status.error { display: block; background: #fee2e2; color: #991b1b; }
  .preview-shell { width: 100%; min-height: 760px; border: 1px solid var(--border); border-radius: 14px; background: #fff; }
  .code-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
  .code-grid textarea { min-height: 220px; font-family: Consolas, Monaco, monospace; background: #0f172a; color: #e2e8f0; border-color: #1e293b; }
  @media (max-width: 1300px) { .editor-layout { grid-template-columns: 1fr; } }
  @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } .sidebar { height: auto; position: static; border-right: 0; border-bottom: 1px solid var(--border); } .row-2, .row-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>Vera CMS</h1>
      <p>Gelişmiş sayfa editörü</p>
    </div>
    <nav class="nav">
      <a href="/admin/">Dashboard</a>
      <a href="/admin/pages.html" class="active">Sayfa Yönetimi</a>
      <a href="/admin/settings.html">Site Ayarları</a>
      <a href="/" target="_blank">Siteyi Aç</a>
      <button id="logoutBtn">Çıkış Yap</button>
    </nav>
  </aside>

  <main class="main">
    <section class="hero-card">
      <h1 style="margin:0 0 8px;">Sayfa Yönetimi</h1>
      <p class="muted" style="margin:0;">Standart içerik modu, section sistemi ve tam HTML/CSS/JS kod modu tek panelde.</p>
      <div id="status" class="status"></div>
    </section>

    <div class="editor-layout">
      <aside class="card">
        <h2 style="margin-top:0;">Kayıtlı Sayfalar</h2>
        <div id="pageList"></div>
      </aside>

      <section class="card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="general">Genel</button>
          <button class="tab-btn" data-tab="layout">Yerleşim</button>
          <button class="tab-btn" data-tab="sections">Section</button>
          <button class="tab-btn" data-tab="code">Kod</button>
          <button class="tab-btn" data-tab="preview">Önizleme</button>
        </div>

        <div class="tab-pane active" data-pane="general">
          <div class="row-2">
            <div><label for="title">Başlık</label><input id="title" type="text" placeholder="Örn: Hakkımızda" /></div>
            <div><label for="slug">Slug</label><input id="slug" type="text" placeholder="hakkimizda" /></div>
          </div>
          <div class="row-2" style="margin-top:12px;">
            <div><label for="statusField">Durum</label><select id="statusField"><option value="draft">Taslak</option><option value="published">Yayında</option></select></div>
            <div><label for="mode">İçerik Modu</label><select id="mode"><option value="standard">Standart</option><option value="code">Tam Kod</option></select></div>
          </div>
          <div style="margin-top:12px;"><label for="template">Şablon</label><select id="template"><option value="default">Varsayılan</option><option value="landing">Landing Page</option><option value="content">İçerik Sayfası</option><option value="contact">İletişim</option></select></div>
          <div style="margin-top:12px;"><label for="excerpt">Kısa Açıklama</label><textarea id="excerpt" style="min-height:90px;" placeholder="Sayfa özeti"></textarea></div>
          <div style="margin-top:12px;"><label for="seoTitle">SEO Başlık</label><input id="seoTitle" type="text" placeholder="Google başlığı" /></div>
          <div style="margin-top:12px;"><label for="seoDescription">SEO Açıklama</label><textarea id="seoDescription" style="min-height:100px;" placeholder="Google açıklaması"></textarea></div>
          <div style="margin-top:12px;"><label for="content">Standart İçerik</label><textarea id="content" placeholder="Standart mod için temel içerik"></textarea></div>
        </div>

        <div class="tab-pane" data-pane="layout">
          <div class="row-3">
            <div><label for="pageBg">Sayfa Arka Plan</label><input id="pageBg" type="color" /></div>
            <div><label for="contentBg">İçerik Arka Plan</label><input id="contentBg" type="color" /></div>
            <div><label for="textColor">Metin Rengi</label><input id="textColor" type="color" /></div>
          </div>
          <div class="row-3" style="margin-top:12px;">
            <div><label for="mutedColor">İkincil Metin</label><input id="mutedColor" type="color" /></div>
            <div><label for="accentColor">Vurgu Rengi</label><input id="accentColor" type="color" /></div>
            <div><label for="buttonColor">Buton Rengi</label><input id="buttonColor" type="color" /></div>
          </div>
          <div class="row-3" style="margin-top:12px;">
            <div><label for="buttonTextColor">Buton Yazı Rengi</label><input id="buttonTextColor" type="color" /></div>
            <div><label for="maxWidth">Maks. Genişlik (px)</label><input id="maxWidth" type="number" min="640" max="2400" /></div>
            <div><label for="contentWidth">İçerik Genişliği (%)</label><input id="contentWidth" type="number" min="30" max="100" /></div>
          </div>
          <div class="row-3" style="margin-top:12px;">
            <div><label for="textAlign">Metin Hizası</label><select id="textAlign"><option value="left">Sol</option><option value="center">Orta</option><option value="right">Sağ</option></select></div>
            <div><label for="borderRadius">Kart Yuvarlaklığı</label><input id="borderRadius" type="number" min="0" max="60" /></div>
            <div><label for="containerPadding">İç Boşluk</label><input id="containerPadding" type="number" min="0" max="120" /></div>
          </div>
          <div class="row-3" style="margin-top:12px;">
            <div><label for="sectionGap">Section Boşluğu</label><input id="sectionGap" type="number" min="0" max="120" /></div>
            <div><label for="titleSize">Başlık Boyutu</label><input id="titleSize" type="number" min="16" max="120" /></div>
            <div><label for="bodySize">Gövde Boyutu</label><input id="bodySize" type="number" min="12" max="40" /></div>
          </div>
          <div class="row-2" style="margin-top:12px;">
            <div><label for="fullWidth">Tam Genişlik</label><select id="fullWidth"><option value="false">Hayır</option><option value="true">Evet</option></select></div>
            <div><label for="fullPageCode">Kod Modunda Tüm Sayfa</label><select id="fullPageCode"><option value="false">Hayır</option><option value="true">Evet</option></select></div>
          </div>
        </div>

        <div class="tab-pane" data-pane="sections">
          <div class="actions" style="margin-top:0;margin-bottom:12px;">
            <button class="btn primary" id="addSectionBtn">Section Ekle</button>
            <button class="btn secondary" id="loadTemplateBtn">Şablon Section Yükle</button>
          </div>
          <div id="sectionsWrap"></div>
        </div>

        <div class="tab-pane" data-pane="code">
          <div class="code-grid">
            <div><label for="htmlCode">HTML</label><textarea id="htmlCode" placeholder="<section>...</section>"></textarea></div>
            <div><label for="cssCode">CSS</label><textarea id="cssCode" placeholder="body { ... }"></textarea></div>
            <div><label for="jsCode">JavaScript</label><textarea id="jsCode" placeholder="console.log('merhaba')"></textarea></div>
          </div>
        </div>

        <div class="tab-pane" data-pane="preview">
          <iframe id="previewFrame" class="preview-shell"></iframe>
        </div>

        <div class="actions">
          <button class="btn primary" id="saveBtn">Kaydet</button>
          <button class="btn secondary" id="newBtn">Yeni Sayfa</button>
          <button class="btn secondary" id="previewBtn">Önizlemeyi Yenile</button>
          <button class="btn danger" id="deleteBtn">Sil</button>
        </div>
      </section>
    </div>
  </main>
</div>

<script>
let pages = [];
let currentSlug = "";
let sections = [];
const defaultSettings = { pageBg:"#f8fafc", contentBg:"#ffffff", textColor:"#0f172a", mutedColor:"#475569", accentColor:"#2563eb", buttonColor:"#2563eb", buttonTextColor:"#ffffff", maxWidth:1280, contentWidth:100, fullWidth:false, textAlign:"left", borderRadius:18, containerPadding:24, sectionGap:18, titleSize:40, bodySize:17, fullPageCode:false };
function showStatus(message, type){ const box=document.getElementById('status'); box.className='status '+type; box.textContent=message; }
function clearStatus(){ const box=document.getElementById('status'); box.className='status'; box.textContent=''; }
function slugify(text){ return String(text||'').toLowerCase().trim().replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c').replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-'); }
function uid(prefix){ return prefix+'-'+Date.now()+'-'+Math.random().toString(36).slice(2,8); }
function getPageSettings(){ return { pageBg:pageBg.value, contentBg:contentBg.value, textColor:textColor.value, mutedColor:mutedColor.value, accentColor:accentColor.value, buttonColor:buttonColor.value, buttonTextColor:buttonTextColor.value, maxWidth:Number(maxWidth.value||1280), contentWidth:Number(contentWidth.value||100), fullWidth:fullWidth.value==='true', textAlign:textAlign.value, borderRadius:Number(borderRadius.value||18), containerPadding:Number(containerPadding.value||24), sectionGap:Number(sectionGap.value||18), titleSize:Number(titleSize.value||40), bodySize:Number(bodySize.value||17), fullPageCode:fullPageCode.value==='true' }; }
function setPageSettings(settings={}){ const s={...defaultSettings,...(settings||{})}; pageBg.value=s.pageBg; contentBg.value=s.contentBg; textColor.value=s.textColor; mutedColor.value=s.mutedColor; accentColor.value=s.accentColor; buttonColor.value=s.buttonColor; buttonTextColor.value=s.buttonTextColor; maxWidth.value=s.maxWidth; contentWidth.value=s.contentWidth; fullWidth.value=String(!!s.fullWidth); textAlign.value=s.textAlign; borderRadius.value=s.borderRadius; containerPadding.value=s.containerPadding; sectionGap.value=s.sectionGap; titleSize.value=s.titleSize; bodySize.value=s.bodySize; fullPageCode.value=String(!!s.fullPageCode); }
function createEmptySection(){ return { id:uid('section'), type:'content', title:'', content:'', width:100, background:'#ffffff', textColor:'#0f172a', padding:24, radius:18 }; }
function escapeAttr(value){ return String(value||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeText(value){ return String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderSections(){ const wrap=document.getElementById('sectionsWrap'); wrap.innerHTML=''; if(!sections.length){ wrap.innerHTML='<div class="muted">Henüz section yok.</div>'; return; } sections.forEach((section,index)=>{ const card=document.createElement('div'); card.className='section-card'; card.innerHTML=`<div class="row-2"><div><label>Tip</label><select data-field="type"><option value="content" ${section.type==='content'?'selected':''}>Content</option><option value="hero" ${section.type==='hero'?'selected':''}>Hero</option><option value="html" ${section.type==='html'?'selected':''}>HTML</option></select></div><div><label>Başlık</label><input data-field="title" value="${escapeAttr(section.title)}" /></div></div><div style="margin-top:12px;"><label>İçerik</label><textarea data-field="content" style="min-height:120px;">${escapeText(section.content)}</textarea></div><div class="row-3" style="margin-top:12px;"><div><label>Genişlik (%)</label><input data-field="width" type="number" min="30" max="100" value="${Number(section.width||100)}" /></div><div><label>Padding</label><input data-field="padding" type="number" min="0" max="120" value="${Number(section.padding||24)}" /></div><div><label>Radius</label><input data-field="radius" type="number" min="0" max="60" value="${Number(section.radius||18)}" /></div></div><div class="row-2" style="margin-top:12px;"><div><label>Arka Plan</label><input data-field="background" type="color" value="${section.background||'#ffffff'}" /></div><div><label>Metin</label><input data-field="textColor" type="color" value="${section.textColor||'#0f172a'}" /></div></div><div class="actions"><button type="button" class="btn secondary move-up">Yukarı</button><button type="button" class="btn secondary move-down">Aşağı</button><button type="button" class="btn danger remove-section">Sil</button></div>`; card.querySelectorAll('[data-field]').forEach(field=>{ const handler=(e)=>{ const name=e.target.getAttribute('data-field'); sections[index][name]=['width','padding','radius'].includes(name)?Number(e.target.value||0):e.target.value; }; field.addEventListener('input',handler); field.addEventListener('change',handler); }); card.querySelector('.remove-section').addEventListener('click',()=>{ sections.splice(index,1); renderSections(); }); card.querySelector('.move-up').addEventListener('click',()=>{ if(index===0) return; const t=sections[index-1]; sections[index-1]=sections[index]; sections[index]=t; renderSections(); }); card.querySelector('.move-down').addEventListener('click',()=>{ if(index>=sections.length-1) return; const t=sections[index+1]; sections[index+1]=sections[index]; sections[index]=t; renderSections(); }); wrap.appendChild(card); }); }
function fillForm(page){ title.value=page.title||''; slug.value=page.slug||''; statusField.value=page.status||'draft'; mode.value=page.mode||'standard'; template.value=page.template||'default'; excerpt.value=page.excerpt||''; seoTitle.value=page.seoTitle||''; seoDescription.value=page.seoDescription||''; content.value=page.content||''; htmlCode.value=page.html||''; cssCode.value=page.css||''; jsCode.value=page.js||''; sections=Array.isArray(page.sections)?page.sections:[]; setPageSettings(page.settings||{}); currentSlug=page.slug||''; renderSections(); refreshPreview(); }
function clearForm(){ currentSlug=''; title.value=''; slug.value=''; statusField.value='draft'; mode.value='standard'; template.value='default'; excerpt.value=''; seoTitle.value=''; seoDescription.value=''; content.value=''; htmlCode.value=''; cssCode.value=''; jsCode.value=''; sections=[]; setPageSettings(defaultSettings); renderSections(); refreshPreview(); }
function renderPageList(){ const list=document.getElementById('pageList'); list.innerHTML=''; if(!pages.length){ list.innerHTML='<div class="muted">Henüz sayfa yok.</div>'; return; } pages.forEach(page=>{ const item=document.createElement('div'); item.className='list-item'+(page.slug===currentSlug?' active':''); item.innerHTML=`<strong>${page.title||'-'}</strong><div class="muted">/${page.slug||''}</div><div class="muted">durum: ${page.status||'draft'} · mod: ${page.mode||'standard'}</div>`; item.addEventListener('click',()=>{ fillForm(page); renderPageList(); }); list.appendChild(item); }); }
function collectPayload(){ let s=slug.value.trim(); const t=title.value.trim(); s=slugify(s||t); slug.value=s; return { title:t, slug:s, status:statusField.value, mode:mode.value, template:template.value, excerpt:excerpt.value.trim(), seoTitle:seoTitle.value.trim(), seoDescription:seoDescription.value.trim(), content:content.value, html:htmlCode.value, css:cssCode.value, js:jsCode.value, sections, settings:getPageSettings() }; }
function buildStandardPreview(page){ const s=page.settings||defaultSettings; const sectionsHtml=(page.sections||[]).map(section=>`<section style="width:${Number(section.width||100)}%;margin:0 auto;background:${section.background};color:${section.textColor};padding:${Number(section.padding||24)}px;border-radius:${Number(section.radius||18)}px;max-width:100%;">${section.title?`<h2 style="margin:0 0 12px;">${section.title}</h2>`:''}<div>${section.content||''}</div></section>`).join(''); return `<!doctype html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${escapeAttr(page.title||'Önizleme')}</title><style>body{margin:0;font-family:Arial,sans-serif;background:${s.pageBg};color:${s.textColor};padding:24px}.shell{max-width:${s.fullWidth?2400:s.maxWidth}px;margin:0 auto}.main{width:${s.fullWidth?100:s.contentWidth}%;margin:0 auto;background:${s.contentBg};border-radius:${s.borderRadius}px;padding:${s.containerPadding}px;text-align:${s.textAlign};font-size:${s.bodySize}px;line-height:1.75;color:${s.textColor}}a{color:${s.accentColor}}.btn,button{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:999px;padding:12px 18px;background:${s.buttonColor};color:${s.buttonTextColor};font-weight:700;text-decoration:none}</style></head><body><div class="shell"><div class="main"><h1 style="margin-top:0;font-size:${s.titleSize}px;line-height:1.1;">${page.title||''}</h1>${page.excerpt?`<p style="color:${s.mutedColor};margin-bottom:${s.sectionGap}px;">${page.excerpt}</p>`:''}${page.content?`<div style="margin-bottom:${s.sectionGap}px;">${page.content}</div>`:''}<div style="display:flex;flex-direction:column;gap:${s.sectionGap}px;">${sectionsHtml}</div></div></div></body></html>`; }
function buildCodePreview(page){ return `<!doctype html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${escapeAttr(page.title||'Kod Önizleme')}</title><style>html,body{margin:0;padding:0;font-family:Arial,sans-serif}${page.css||''}</style></head><body>${page.html||''}<script>${String(page.js||'').replace(/<\\/script>/gi,'<\\\\/script>')}<\\/script></body></html>`; }
function refreshPreview(){ const payload=collectPayload(); previewFrame.srcdoc=payload.mode==='code'?buildCodePreview(payload):buildStandardPreview(payload); }
async function loadPages(){ const res=await fetch('/api/pages'); const data=await res.json(); pages=data.pages||[]; renderPageList(); }
async function savePage(){ clearStatus(); const payload=collectPayload(); if(!payload.title||!payload.slug){ showStatus('Başlık ve slug zorunludur.','error'); return; } try{ const res=await fetch('/api/pages',{ method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify(payload) }); const data=await res.json(); if(!data.ok){ showStatus(data.error||'Kaydetme sırasında hata oluştu.','error'); return; } pages=data.pages||[]; currentSlug=payload.slug; renderPageList(); refreshPreview(); showStatus('Sayfa kaydedildi.','ok'); } catch(err){ showStatus('Kaydetme sırasında hata oluştu.','error'); } }
async function deletePage(){ clearStatus(); const s=slug.value.trim(); if(!s){ showStatus('Silmek için önce sayfa seç.','error'); return; } if(!confirm('"'+s+'" sayfası silinsin mi?')) return; try{ const res=await fetch('/api/pages?slug='+encodeURIComponent(s),{ method:'DELETE' }); const data=await res.json(); if(!data.ok){ showStatus(data.error||'Silme sırasında hata oluştu.','error'); return; } pages=data.pages||[]; clearForm(); renderPageList(); showStatus('Sayfa silindi.','ok'); } catch(err){ showStatus('Silme sırasında hata oluştu.','error'); } }
function loadSectionTemplate(){ const t=template.value; if(t==='landing'){ sections=[{id:uid('section'),type:'hero',title:'Güçlü Başlık',content:'Buraya landing page giriş alanı gelir.',width:100,background:'#eff6ff',textColor:'#0f172a',padding:32,radius:22},{id:uid('section'),type:'content',title:'Avantajlar',content:'Avantajlarını burada blok blok anlat.',width:100,background:'#ffffff',textColor:'#0f172a',padding:24,radius:18}]; } else if(t==='contact'){ sections=[{id:uid('section'),type:'content',title:'İletişim Bilgileri',content:'Adres, telefon, e-posta',width:100,background:'#ffffff',textColor:'#0f172a',padding:24,radius:18},{id:uid('section'),type:'html',title:'Harita / Form',content:'<div>Harita veya form kodu</div>',width:100,background:'#f8fafc',textColor:'#0f172a',padding:24,radius:18}]; } else { sections=[createEmptySection()]; } renderSections(); }
document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const tab=btn.getAttribute('data-tab'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active')); btn.classList.add('active'); document.querySelector(`.tab-pane[data-pane="${tab}"]`).classList.add('active'); if(tab==='preview') refreshPreview(); }); });
title.addEventListener('input',()=>{ const slugInput=document.getElementById('slug'); if(!currentSlug&&!slugInput.value.trim()){ slugInput.value=slugify(document.getElementById('title').value); } });
document.getElementById('addSectionBtn').addEventListener('click',()=>{ sections.push(createEmptySection()); renderSections(); });
document.getElementById('loadTemplateBtn').addEventListener('click',loadSectionTemplate);
document.getElementById('saveBtn').addEventListener('click',savePage);
document.getElementById('newBtn').addEventListener('click',()=>{ clearStatus(); clearForm(); renderPageList(); });
document.getElementById('previewBtn').addEventListener('click',refreshPreview);
document.getElementById('deleteBtn').addEventListener('click',deletePage);
document.getElementById('logoutBtn').addEventListener('click',async()=>{ try{ await fetch('/api/logout',{ method:'POST' }); }catch(err){} window.location.href='/login.html'; });

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera Admin - Sayfalar</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a}
    .loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#64748b}
    .hidden{display:none!important}

    .layout{min-height:100vh;display:grid;grid-template-columns:240px 1fr}
    .sidebar{background:#0f172a;color:#e2e8f0;padding:18px 14px;border-right:1px solid rgba(255,255,255,.06)}
    .brand h1{margin:0 0 6px;font-size:22px}
    .brand p{margin:0;color:#94a3b8;font-size:12px}
    .nav-title{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin:20px 0 10px}
    .nav-link,.nav-btn{display:block;width:100%;text-align:left;text-decoration:none;border:0;background:transparent;color:#e2e8f0;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:13px;margin-bottom:6px}
    .nav-link:hover,.nav-btn:hover,.nav-link.active{background:rgba(255,255,255,.08)}

    .main{display:flex;flex-direction:column;min-width:0}
    .topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .topbar-left h2{margin:0 0 4px;font-size:18px}
    .topbar-left p{margin:0;color:#64748b;font-size:12px}

    .btn{border:0;border-radius:10px;padding:9px 12px;font-weight:700;cursor:pointer;font-size:12px}
    .btn-primary{background:#2563eb;color:#fff}
    .btn-secondary{background:#e2e8f0;color:#0f172a}
    .btn-danger{background:#dc2626;color:#fff}

    .content{padding:16px;display:grid;gap:14px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .card h3{margin:0 0 10px;font-size:16px}
    .card p{margin:0 0 12px;color:#64748b;line-height:1.6;font-size:13px}

    label{display:block;margin-bottom:5px;font-size:12px;color:#475569}
    input,textarea,select{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:13px;color:#0f172a;background:#fff}
    textarea{min-height:90px;resize:vertical}
    .code-area{font-family:Consolas,monospace;min-height:160px}

    .toolbar{display:flex;gap:8px;flex-wrap:wrap}
    .status{display:none;margin-top:8px;padding:10px;border-radius:10px;font-size:13px}
    .status.show{display:block}
    .status.ok{background:#dcfce7;color:#166534}
    .status.error{background:#fee2e2;color:#991b1b}

    .page-tabs-card{padding:12px 12px 10px}
    .page-tabs-toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-bottom:10px}
    .page-tabs-list{display:flex;gap:8px;flex-wrap:wrap}
    .page-chip{
      border:1px solid #dbe3ee;
      background:#fff;
      color:#334155;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }
    .page-chip.active{
      border-color:#2563eb;
      color:#1d4ed8;
      background:#eff6ff;
    }

    .edit-panel{min-width:0}

    .toggle-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
    .mode-wrap{display:none}
    .mode-wrap.show{display:block}

    .minimal-section{margin-top:10px;padding-top:10px;border-top:1px solid #eef2f7}
    .minimal-section-title{font-size:12px;font-weight:700;margin:0 0 8px;color:#334155}

    @media(max-width:1100px){
      .layout{grid-template-columns:1fr}
      .sidebar{border-right:0;border-bottom:1px solid rgba(255,255,255,.06)}
      .toggle-grid{grid-template-columns:1fr}
      .page-tabs-toolbar{align-items:flex-start}
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">Oturum kontrol ediliyor...</div>

  <div id="app" class="layout hidden">
    <aside class="sidebar">
      <div class="brand"><h1>Vera Admin</h1><p>Sayfa yönetimi</p></div>
      <div class="nav-title">Editör</div>
      <a class="nav-link" href="/admin/index.html">Dashboard</a>
      <a class="nav-link active" href="/admin/pages.html">Sayfalar</a>
      <a class="nav-link" href="/admin/settings.html">Site Ayarları</a>
      <div class="nav-title">Oturum</div>
      <button id="logoutBtnSide" class="nav-btn" type="button">Çıkış Yap</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h2>Sayfalar</h2>
          <p>Sayfa ayarları ve ayrı tasarım ekranı</p>
        </div>
        <button id="logoutBtnTop" class="btn btn-danger" type="button">Çıkış Yap</button>
      </header>

      <section class="content">
        <div class="card page-tabs-card">
          <div class="page-tabs-toolbar">
            <div class="toolbar">
              <button id="newPageBtn" class="btn btn-primary" type="button">Yeni Sayfa</button>
              <button id="refreshBtn" class="btn btn-secondary" type="button">Yenile</button>
              <button id="openDesignerBtn" class="btn btn-primary" type="button">Tasarım Ekranını Aç</button>
            </div>
            <div id="pageTabs" class="page-tabs-list"></div>
          </div>
        </div>

        <div class="card edit-panel">
          <h3>Sayfayı Düzenle</h3>

          <label for="pageTitle">Başlık</label>
          <input id="pageTitle" type="text">

          <label for="pageSlug">Slug</label>
          <input id="pageSlug" type="text" placeholder="ornek-sayfa">

          <div class="toggle-grid">
            <div>
              <label for="pageStatus">Durum</label>
              <select id="pageStatus"><option value="draft">Taslak</option><option value="published">Yayında</option></select>
            </div>
            <div>
              <label for="pageIsHome">Ana Sayfa</label>
              <select id="pageIsHome"><option value="false">Hayır</option><option value="true">Evet</option></select>
            </div>
            <div>
              <label for="editorMode">Editör</label>
              <select id="editorMode"><option value="blocks">Blok</option><option value="code">Kod</option></select>
            </div>
            <div>
              <label for="showHeader">Header</label>
              <select id="showHeader"><option value="true">Göster</option><option value="false">Gizle</option></select>
            </div>
            <div>
              <label for="showFooter">Footer</label>
              <select id="showFooter"><option value="true">Göster</option><option value="false">Gizle</option></select>
            </div>
          </div>

          <div class="minimal-section">
            <div class="minimal-section-title">SEO</div>
            <label for="metaTitle">Meta Title</label>
            <input id="metaTitle" type="text">
            <label for="metaDescription">Meta Description</label>
            <textarea id="metaDescription"></textarea>
          </div>

          <div class="minimal-section">
            <div class="minimal-section-title">Yerleşim</div>
            <div class="toggle-grid">
              <div>
                <label for="contentWidth">İçerik Genişliği</label>
                <input id="contentWidth" type="number" min="480" max="2400">
              </div>
              <div>
                <label for="pagePaddingX">Yan Boşluk</label>
                <input id="pagePaddingX" type="number" min="0" max="120">
              </div>
              <div>
                <label for="sectionGap">Blok Aralığı</label>
                <input id="sectionGap" type="number" min="0" max="120">
              </div>
              <div>
                <label for="gridColumns">Grid Kolon</label>
                <input id="gridColumns" type="number" min="1" max="12">
              </div>
            </div>
          </div>

          <div class="minimal-section">
            <div class="minimal-section-title">Gelişmiş</div>
            <label for="customBodyClass">Body Class</label>
            <input id="customBodyClass" type="text">
          </div>

          <div id="codeModeWrap" class="mode-wrap">
            <div class="minimal-section">
              <div class="minimal-section-title">Kod Editörü</div>
              <label for="codeHtml">HTML</label>
              <textarea id="codeHtml" class="code-area"></textarea>
              <label for="codeCss">CSS</label>
              <textarea id="codeCss" class="code-area"></textarea>
              <label for="codeJs">JS</label>
              <textarea id="codeJs" class="code-area"></textarea>
            </div>
          </div>

          <div class="toolbar" style="margin-top:12px">
            <button id="saveBtn" class="btn btn-primary" type="button">Kaydet</button>
            <button id="deleteBtn" class="btn btn-danger" type="button">Sil</button>
            <button id="openBtn" class="btn btn-secondary" type="button">Aç</button>
          </div>

          <div id="statusBox" class="status"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    let pages = [];
    let currentId = "";

    function uid() {
      return "p-" + Math.random().toString(36).slice(2) + Date.now();
    }

    function slugify(value) {
      const map = { ç: "c", ğ: "g", ı: "i", ö: "o", ş: "s", ü: "u" };
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/[çğıöşü]/g, (m) => map[m] || m)
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function showStatus(message, type) {
      statusBox.className = "status show " + type;
      statusBox.textContent = message;
    }

    function emptyPage() {
      return {
        id: uid(),
        title: "Yeni Sayfa",
        slug: "yeni-sayfa",
        status: "draft",
        isHome: false,
        metaTitle: "Yeni Sayfa",
        metaDescription: "",
        editorMode: "blocks",
        pageOptions: {
          showHeader: true,
          showFooter: true,
          customBodyClass: "",
          contentWidth: 1200,
          pagePaddingX: 24,
          sectionGap: 18,
          gridColumns: 12
        },
        blocks: [],
        overrides: { html: "", css: "", js: "" },
        code: { html: "", css: "", js: "" }
      };
    }

    function toggleMode() {
      const isCode = editorMode.value === "code";
      codeModeWrap.classList.toggle("show", isCode);
    }

    function collectForm() {
      return {
        id: currentId || uid(),
        title: pageTitle.value.trim() || "Yeni Sayfa",
        slug: slugify(pageSlug.value || pageTitle.value) || "",
        status: pageStatus.value === "published" ? "published" : "draft",
        isHome: pageIsHome.value === "true",
        metaTitle: metaTitle.value.trim() || pageTitle.value.trim() || "Yeni Sayfa",
        metaDescription: metaDescription.value.trim(),
        editorMode: editorMode.value === "code" ? "code" : "blocks",
        pageOptions: {
          showHeader: showHeader.value === "true",
          showFooter: showFooter.value === "true",
          customBodyClass: customBodyClass.value.trim(),
          contentWidth: Number(contentWidth.value || 1200),
          pagePaddingX: Number(pagePaddingX.value || 24),
          sectionGap: Number(sectionGap.value || 18),
          gridColumns: Number(gridColumns.value || 12)
        },
        blocks: [],
        overrides: { html: "", css: "", js: "" },
        code: {
          html: codeHtml.value,
          css: codeCss.value,
          js: codeJs.value
        }
      };
    }

    function fillForm(page) {
      const safe = page || emptyPage();
      currentId = safe.id || "";
      pageTitle.value = safe.title || "";
      pageSlug.value = safe.slug || "";
      pageSlug.dataset.touched = safe.slug ? "1" : "";
      pageStatus.value = safe.status === "published" ? "published" : "draft";
      pageIsHome.value = String(safe.isHome === true);
      metaTitle.value = safe.metaTitle || "";
      metaDescription.value = safe.metaDescription || "";
      editorMode.value = safe.editorMode === "code" ? "code" : "blocks";
      showHeader.value = String(safe.pageOptions?.showHeader !== false);
      showFooter.value = String(safe.pageOptions?.showFooter !== false);
      customBodyClass.value = safe.pageOptions?.customBodyClass || "";
      contentWidth.value = safe.pageOptions?.contentWidth ?? 1200;
      pagePaddingX.value = safe.pageOptions?.pagePaddingX ?? 24;
      sectionGap.value = safe.pageOptions?.sectionGap ?? 18;
      gridColumns.value = safe.pageOptions?.gridColumns ?? 12;
      codeHtml.value = safe.code?.html || "";
      codeCss.value = safe.code?.css || "";
      codeJs.value = safe.code?.js || "";
      toggleMode();
      renderTabs();
    }

    function renderTabs() {
      pageTabs.innerHTML = "";

      if (!pages.length) {
        pageTabs.innerHTML = `<span style="font-size:12px;color:#64748b">Henüz sayfa yok.</span>`;
        return;
      }

      pages.forEach((page) => {
        const btn = document.createElement("button");
        btn.className = "page-chip" + (page.id === currentId ? " active" : "");
        btn.type = "button";
        btn.textContent = page.title || "İsimsiz Sayfa";
        btn.addEventListener("click", () => fillForm(page));
        pageTabs.appendChild(btn);
      });
    }

    async function checkSession() {
      try {
        const res = await fetch("/api/verify", {
          method: "GET",
          credentials: "same-origin",
          headers: { "Accept": "application/json" }
        });
        const data = await res.json();
        if (!data.ok || !data.authenticated) return location.replace("/login/index.html");
        loading.classList.add("hidden");
        app.classList.remove("hidden");
      } catch {
        location.replace("/login/index.html");
      }
    }

    async function loadPages() {
      try {
        const res = await fetch("/api/pages", {
          headers: { "Accept": "application/json" }
        });
        const data = await res.json();
        pages = Array.isArray(data.pages) ? data.pages : [];
        renderTabs();

        if (pages.length) {
          const page = pages.find((item) => item.id === currentId) || pages[0];
          fillForm(page);
        } else {
          fillForm(emptyPage());
        }
      } catch {
        showStatus("Sayfalar yüklenemedi.", "error");
      }
    }

    async function savePage() {
      const existing = pages.find((item) => item.id === currentId);
      const payload = { action: "save", page: { ...(existing || emptyPage()), ...collectForm() } };

      try {
        const res = await fetch("/api/pages", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!data.ok) return showStatus(data.error || "Kayıt başarısız.", "error");

        pages = Array.isArray(data.pages) ? data.pages : [];
        const current = pages.find((item) => item.id === payload.page.id) || pages[0];
        if (current) fillForm(current);
        renderTabs();
        showStatus("Sayfa kaydedildi.", "ok");
      } catch {
        showStatus("İstek sırasında hata oluştu.", "error");
      }
    }

    async function deletePage() {
      if (!currentId) return;

      try {
        const res = await fetch("/api/pages", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ action: "delete", id: currentId })
        });

        const data = await res.json();
        if (!data.ok) return showStatus(data.error || "Silme başarısız.", "error");

        pages = Array.isArray(data.pages) ? data.pages : [];
        renderTabs();
        if (pages.length) fillForm(pages[0]);
        else fillForm(emptyPage());
        showStatus("Sayfa silindi.", "ok");
      } catch {
        showStatus("İstek sırasında hata oluştu.", "error");
      }
    }

    async function logout() {
      try {
        await fetch("/api/logout", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Accept": "application/json" }
        });
      } catch {}
      location.replace("/login/index.html");
    }

    newPageBtn.addEventListener("click", () => fillForm(emptyPage()));
    refreshBtn.addEventListener("click", loadPages);
    saveBtn.addEventListener("click", savePage);
    deleteBtn.addEventListener("click", deletePage);
    logoutBtnTop.addEventListener("click", logout);
    logoutBtnSide.addEventListener("click", logout);

    pageTitle.addEventListener("input", () => {
      if (!pageSlug.dataset.touched) pageSlug.value = slugify(pageTitle.value);
    });

    pageSlug.addEventListener("input", () => {
      pageSlug.dataset.touched = "1";
      pageSlug.value = slugify(pageSlug.value);
    });

    editorMode.addEventListener("change", toggleMode);

    openBtn.addEventListener("click", () => {
      const slug = slugify(pageSlug.value || pageTitle.value);
      const path = slug ? `/${slug}` : "/";
      window.open(path, "_blank");
    });

    openDesignerBtn.addEventListener("click", () => {
      if (!currentId) return;
      window.open(`/admin/designer.html?id=${encodeURIComponent(currentId)}`, "_blank");
    });

    (async function init() {
      await checkSession();
      await loadPages();
      toggleMode();
    })();
  </script>
</body>
</html>

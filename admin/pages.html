<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera Admin - Sayfalar</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a}
    .loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#64748b}.hidden{display:none!important}
    .layout{min-height:100vh;display:grid;grid-template-columns:260px 1fr}.sidebar{background:#0f172a;color:#e2e8f0;padding:22px 18px;border-right:1px solid rgba(255,255,255,.06)}
    .brand h1{margin:0 0 6px;font-size:24px}.brand p{margin:0;color:#94a3b8;font-size:13px}.nav-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin:22px 0 10px}
    .nav-link,.nav-btn{display:block;width:100%;text-align:left;text-decoration:none;border:0;background:transparent;color:#e2e8f0;padding:12px 14px;border-radius:12px;cursor:pointer;font-size:14px;margin-bottom:8px}.nav-link:hover,.nav-btn:hover,.nav-link.active{background:rgba(255,255,255,.08)}
    .main{display:flex;flex-direction:column}.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .topbar-left h2{margin:0 0 4px;font-size:20px}.topbar-left p{margin:0;color:#64748b;font-size:13px}.btn{border:0;border-radius:12px;padding:11px 16px;font-weight:700;cursor:pointer;font-size:14px}.btn-primary{background:#2563eb;color:#fff}.btn-secondary{background:#e2e8f0;color:#0f172a}.btn-danger{background:#dc2626;color:#fff}
    .content{padding:22px;display:grid;grid-template-columns:380px 1fr;gap:18px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:22px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .card h3{margin:0 0 12px}.card p{margin:0 0 18px;color:#64748b;line-height:1.7}label{display:block;margin-bottom:6px;font-size:14px;color:#475569}
    input,textarea,select{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:14px;color:#0f172a;background:#fff}textarea{min-height:100px;resize:vertical}.code-area{font-family:Consolas,monospace;min-height:180px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap}.page-list{display:grid;gap:12px}.page-item{border:1px solid #e2e8f0;border-radius:14px;padding:14px;background:#fff;cursor:pointer}.page-item.active{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.08)}
    .meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.chip{display:inline-flex;padding:6px 10px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700}.status{display:none;margin-top:8px;padding:12px;border-radius:12px;font-size:14px}.status.show{display:block}.status.ok{background:#dcfce7;color:#166534}.status.error{background:#fee2e2;color:#991b1b}
    .toggle-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    @media(max-width:1100px){.layout{grid-template-columns:1fr}.sidebar{border-right:0;border-bottom:1px solid rgba(255,255,255,.06)}.content{grid-template-columns:1fr}.toggle-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="loading" class="loading">Oturum kontrol ediliyor...</div>
  <div id="app" class="layout hidden">
    <aside class="sidebar">
      <div class="brand">
        <h1>Vera Admin</h1>
        <p>Sayfa yönetimi</p>
      </div>
      <div class="nav-title">Editör</div>
      <a class="nav-link" href="/admin">Ana Sayfa Editörü</a>
      <a class="nav-link active" href="/admin/pages.html">Sayfalar</a>
      <div class="nav-title">Oturum</div>
      <button id="logoutBtnSide" class="nav-btn" type="button">Çıkış Yap</button>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h2>Sayfa Yönetimi</h2>
          <p>Slug, yayın durumu ve kod/blok editörü seçimi</p>
        </div>
        <button id="logoutBtnTop" class="btn btn-danger" type="button">Çıkış Yap</button>
      </header>
      <section class="content">
        <div class="card">
          <h3>Sayfa Listesi</h3>
          <div class="toolbar">
            <button id="newPageBtn" class="btn btn-primary" type="button">Yeni Sayfa</button>
            <button id="refreshBtn" class="btn btn-secondary" type="button">Yenile</button>
          </div>
          <div id="pageList" class="page-list" style="margin-top:16px"></div>
        </div>
        <div class="card">
          <h3>Sayfa Düzenle</h3>
          <label for="pageTitle">Başlık</label>
          <input id="pageTitle" type="text">

          <label for="pageSlug">Slug</label>
          <input id="pageSlug" type="text" placeholder="ornek-sayfa">

          <div class="toggle-grid">
            <div>
              <label for="pageStatus">Durum</label>
              <select id="pageStatus">
                <option value="draft">Taslak</option>
                <option value="published">Yayında</option>
              </select>
            </div>
            <div>
              <label for="pageIsHome">Ana Sayfa</label>
              <select id="pageIsHome">
                <option value="false">Hayır</option>
                <option value="true">Evet</option>
              </select>
            </div>
            <div>
              <label for="editorMode">Editör Modu</label>
              <select id="editorMode">
                <option value="blocks">Blok</option>
                <option value="code">Kod</option>
              </select>
            </div>
            <div>
              <label for="showHeader">Header</label>
              <select id="showHeader">
                <option value="true">Göster</option>
                <option value="false">Gizle</option>
              </select>
            </div>
            <div>
              <label for="showFooter">Footer</label>
              <select id="showFooter">
                <option value="true">Göster</option>
                <option value="false">Gizle</option>
              </select>
            </div>
          </div>

          <label for="metaTitle">Meta Title</label>
          <input id="metaTitle" type="text">

          <label for="metaDescription">Meta Description</label>
          <textarea id="metaDescription"></textarea>

          <label for="customBodyClass">Body Class</label>
          <input id="customBodyClass" type="text">

          <label for="codeHtml">HTML</label>
          <textarea id="codeHtml" class="code-area"></textarea>

          <label for="codeCss">CSS</label>
          <textarea id="codeCss" class="code-area"></textarea>

          <label for="codeJs">JS</label>
          <textarea id="codeJs" class="code-area"></textarea>

          <div class="toolbar">
            <button id="saveBtn" class="btn btn-primary" type="button">Kaydet</button>
            <button id="deleteBtn" class="btn btn-danger" type="button">Sil</button>
            <button id="openBtn" class="btn btn-secondary" type="button">Sayfayı Aç</button>
          </div>

          <div id="statusBox" class="status"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    let pages = [];
    let currentId = "";

    function uid() {
      return "p-" + Math.random().toString(36).slice(2) + Date.now();
    }

    function slugify(value) {
      const map = { ç: "c", ğ: "g", ı: "i", ö: "o", ş: "s", ü: "u" };
      return String(value || "")
        .toLowerCase()
        .trim()
        .replace(/[çğıöşü]/g, (m) => map[m] || m)
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function showStatus(message, type) {
      statusBox.className = "status show " + type;
      statusBox.textContent = message;
    }

    function emptyPage() {
      return {
        id: uid(),
        title: "Yeni Sayfa",
        slug: "yeni-sayfa",
        status: "draft",
        isHome: false,
        metaTitle: "Yeni Sayfa",
        metaDescription: "",
        editorMode: "code",
        pageOptions: {
          showHeader: true,
          showFooter: true,
          customBodyClass: ""
        },
        blocks: [],
        overrides: {
          html: "",
          css: "",
          js: ""
        },
        code: {
          html: "",
          css: "",
          js: ""
        }
      };
    }

    function fillForm(page) {
      currentId = page.id;
      pageTitle.value = page.title || "";
      pageSlug.value = page.slug || "";
      pageStatus.value = page.status || "draft";
      pageIsHome.value = String(!!page.isHome);
      editorMode.value = page.editorMode || "code";
      showHeader.value = String(page.pageOptions?.showHeader !== false);
      showFooter.value = String(page.pageOptions?.showFooter !== false);
      metaTitle.value = page.metaTitle || "";
      metaDescription.value = page.metaDescription || "";
      customBodyClass.value = page.pageOptions?.customBodyClass || "";
      codeHtml.value = page.code?.html || "";
      codeCss.value = page.code?.css || "";
      codeJs.value = page.code?.js || "";
      renderList();
    }

    function collectForm() {
      return {
        id: currentId || uid(),
        title: pageTitle.value.trim() || "Yeni Sayfa",
        slug: slugify(pageSlug.value || pageTitle.value),
        status: pageStatus.value,
        isHome: pageIsHome.value === "true",
        metaTitle: metaTitle.value.trim() || pageTitle.value.trim() || "Yeni Sayfa",
        metaDescription: metaDescription.value.trim(),
        editorMode: editorMode.value,
        pageOptions: {
          showHeader: showHeader.value === "true",
          showFooter: showFooter.value === "true",
          customBodyClass: customBodyClass.value.trim()
        },
        blocks: [],
        overrides: {
          html: "",
          css: "",
          js: ""
        },
        code: {
          html: codeHtml.value,
          css: codeCss.value,
          js: codeJs.value
        }
      };
    }

    function renderList() {
      pageList.innerHTML = "";

      if (!pages.length) {
        pageList.innerHTML = "<p style='color:#64748b'>Henüz sayfa yok.</p>";
        return;
      }

      pages.forEach((page) => {
        const el = document.createElement("div");
        el.className = "page-item" + (page.id === currentId ? " active" : "");
        el.innerHTML = `
          <strong>${page.title || "-"}</strong>
          <div style="margin-top:6px;color:#64748b">${page.slug ? "/" + page.slug : "/"}</div>
          <div class="meta-row">
            <span class="chip">${page.status || "draft"}</span>
            ${page.isHome ? `<span class="chip">home</span>` : ""}
            <span class="chip">${page.editorMode || "blocks"}</span>
          </div>
        `;
        el.addEventListener("click", () => fillForm(page));
        pageList.appendChild(el);
      });
    }

    async function checkSession() {
      try {
        const res = await fetch("/api/verify", {
          method: "GET",
          credentials: "same-origin",
          headers: { "Accept": "application/json" }
        });
        const data = await res.json();
        if (!data.ok || !data.authenticated) return location.replace("/login");
        loading.classList.add("hidden");
        app.classList.remove("hidden");
      } catch {
        location.replace("/login");
      }
    }

    async function loadPages() {
      try {
        const res = await fetch("/api/pages", { headers: { "Accept": "application/json" } });
        const data = await res.json();
        pages = Array.isArray(data.pages) ? data.pages : [];
        renderList();

        if (pages.length) {
          const page = pages.find((item) => item.id === currentId) || pages[0];
          fillForm(page);
        } else {
          fillForm(emptyPage());
        }
      } catch {
        showStatus("Sayfalar yüklenemedi.", "error");
      }
    }

    async function savePage() {
      const payload = {
        action: "save",
        page: collectForm()
      };

      try {
        const res = await fetch("/api/pages", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!data.ok) return showStatus(data.error || "Kayıt başarısız.", "error");

        pages = Array.isArray(data.pages) ? data.pages : [];
        const current = pages.find((item) => item.id === payload.page.id) || pages[0];
        if (current) fillForm(current);
        renderList();
        showStatus("Sayfa kaydedildi.", "ok");
      } catch {
        showStatus("İstek sırasında hata oluştu.", "error");
      }
    }

    async function deletePage() {
      if (!currentId) return;

      try {
        const res = await fetch("/api/pages", {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "Accept": "application/json"
          },
          body: JSON.stringify({ action: "delete", id: currentId })
        });

        const data = await res.json();
        if (!data.ok) return showStatus(data.error || "Silme başarısız.", "error");

        pages = Array.isArray(data.pages) ? data.pages : [];
        renderList();
        if (pages.length) fillForm(pages[0]);
        else fillForm(emptyPage());
        showStatus("Sayfa silindi.", "ok");
      } catch {
        showStatus("İstek sırasında hata oluştu.", "error");
      }
    }

    async function logout() {
      try {
        await fetch("/api/logout", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Accept": "application/json" }
        });
      } catch {}
      location.replace("/login");
    }

    newPageBtn.addEventListener("click", () => fillForm(emptyPage()));
    refreshBtn.addEventListener("click", loadPages);
    saveBtn.addEventListener("click", savePage);
    deleteBtn.addEventListener("click", deletePage);
    logoutBtnTop.addEventListener("click", logout);
    logoutBtnSide.addEventListener("click", logout);

    pageTitle.addEventListener("input", () => {
      if (!pageSlug.dataset.touched) pageSlug.value = slugify(pageTitle.value);
    });

    pageSlug.addEventListener("input", () => {
      pageSlug.dataset.touched = "1";
      pageSlug.value = slugify(pageSlug.value);
    });

    openBtn.addEventListener("click", () => {
      const slug = slugify(pageSlug.value || pageTitle.value);
      const path = slug ? `/${slug}` : "/";
      window.open(path, "_blank");
    });

    (async function init() {
      await checkSession();
      await loadPages();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sayfa Yönetimi</title>
<style>
  * { box-sizing: border-box; font-family: Arial, sans-serif; }
  body { margin: 0; background: #f9fafb; color: #1f2937; }
  .layout { display: flex; min-height: 100vh; }
  .sidebar {
    width: 260px;
    background: #ffffff;
    border-right: 1px solid #e5e7eb;
    padding: 20px;
  }
  .sidebar h2 { margin: 0 0 20px; font-size: 22px; }
  .sidebar a, .sidebar button.link-btn {
    display: block;
    width: 100%;
    text-align: left;
    text-decoration: none;
    color: #374151;
    background: transparent;
    border: 0;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  .sidebar a:hover, .sidebar button.link-btn:hover, .sidebar .active {
    background: #e0f2fe;
    color: #111827;
  }
  .content { flex: 1; padding: 24px; }
  .card {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 1px 2px rgba(0,0,0,.05);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .full { grid-column: 1 / -1; }
  label {
    display: block;
    font-size: 14px;
    color: #4b5563;
    margin-bottom: 6px;
  }
  input, textarea {
    width: 100%;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    padding: 10px 12px;
    background: #f9fafb;
    color: #111827;
  }
  textarea { min-height: 220px; resize: vertical; }
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  button {
    border: 0;
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    font-weight: 700;
  }
  .primary { background: #2563eb; color: #fff; }
  .danger { background: #dc2626; color: #fff; }
  .secondary { background: #e5e7eb; color: #111827; }
  .list-item {
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .list-item:hover, .list-item.active {
    background: #eff6ff;
    border-color: #93c5fd;
  }
  .muted { color: #6b7280; font-size: 13px; }
  .status {
    display: none;
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
  }
  .status.ok { display: block; background: #dcfce7; color: #166534; }
  .status.error { display: block; background: #fee2e2; color: #991b1b; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h2>CMS Panel</h2>
    <a href="/admin/">Menü Yönetimi</a>
    <a href="/admin/pages.html" class="active">Sayfa Yönetimi</a>
    <a href="/" target="_blank">Siteyi Aç</a>
    <button class="link-btn" id="logoutBtn">Çıkış Yap</button>
  </aside>

  <main class="content">
    <div class="card">
      <h1>Sayfa Yönetimi</h1>
      <p class="muted">İçerik burada tutulur. Menüleri bu sayfalara bağlayacaksın.</p>
      <div id="status" class="status"></div>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <label for="title">Başlık</label>
          <input id="title" type="text" placeholder="Örn: Hakkımızda" />
        </div>

        <div>
          <label for="slug">Slug</label>
          <input id="slug" type="text" placeholder="hakkimizda" />
        </div>

        <div class="full">
          <label for="seoTitle">SEO Başlık</label>
          <input id="seoTitle" type="text" placeholder="Google başlığı" />
        </div>

        <div class="full">
          <label for="seoDescription">SEO Açıklama</label>
          <textarea id="seoDescription" style="min-height:90px;" placeholder="Google açıklaması"></textarea>
        </div>

        <div class="full">
          <label for="content">İçerik</label>
          <textarea id="content" placeholder="Sayfa içeriği"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="saveBtn">Kaydet</button>
        <button class="secondary" id="newBtn">Yeni Sayfa</button>
        <button class="danger" id="deleteBtn">Sil</button>
      </div>
    </div>

    <div class="card">
      <h2>Kayıtlı Sayfalar</h2>
      <div id="pageList"></div>
    </div>
  </main>
</div>

<script>
  let pages = [];
  let currentSlug = "";

  function showStatus(message, type) {
    const box = document.getElementById("status");
    box.className = "status " + type;
    box.textContent = message;
  }

  function clearStatus() {
    const box = document.getElementById("status");
    box.className = "status";
    box.textContent = "";
  }

  function slugify(text) {
    return text
      .toString()
      .toLowerCase()
      .trim()
      .replace(/ğ/g, "g")
      .replace(/ü/g, "u")
      .replace(/ş/g, "s")
      .replace(/ı/g, "i")
      .replace(/ö/g, "o")
      .replace(/ç/g, "c")
      .replace(/[^a-z0-9\\s-]/g, "")
      .replace(/\\s+/g, "-")
      .replace(/-+/g, "-");
  }

  function fillForm(page) {
    document.getElementById("title").value = page.title || "";
    document.getElementById("slug").value = page.slug || "";
    document.getElementById("seoTitle").value = page.seoTitle || "";
    document.getElementById("seoDescription").value = page.seoDescription || "";
    document.getElementById("content").value = page.content || "";
    currentSlug = page.slug || "";
  }

  function clearForm() {
    document.getElementById("title").value = "";
    document.getElementById("slug").value = "";
    document.getElementById("seoTitle").value = "";
    document.getElementById("seoDescription").value = "";
    document.getElementById("content").value = "";
    currentSlug = "";
  }

  function renderList() {
    const list = document.getElementById("pageList");
    list.innerHTML = "";

    if (!pages.length) {
      list.innerHTML = '<div class="muted">Henüz kayıtlı sayfa yok.</div>';
      return;
    }

    pages.forEach((page) => {
      const item = document.createElement("div");
      item.className = "list-item" + (page.slug === currentSlug ? " active" : "");
      item.innerHTML = `
        <strong>${page.title || "-"}</strong>
        <div class="muted">/${page.slug || ""}</div>
      `;
      item.addEventListener("click", () => {
        fillForm(page);
        renderList();
      });
      list.appendChild(item);
    });
  }

  async function loadPages() {
    clearStatus();
    try {
      const res = await fetch("/api/pages");
      const data = await res.json();
      pages = data.pages || [];
      renderList();
    } catch (err) {
      showStatus("Sayfalar yüklenemedi.", "error");
    }
  }

  async function savePage() {
    clearStatus();

    const title = document.getElementById("title").value.trim();
    let slug = document.getElementById("slug").value.trim();
    const seoTitle = document.getElementById("seoTitle").value.trim();
    const seoDescription = document.getElementById("seoDescription").value.trim();
    const content = document.getElementById("content").value;

    if (!title) {
      showStatus("Başlık zorunludur.", "error");
      return;
    }

    if (!slug) {
      slug = slugify(title);
      document.getElementById("slug").value = slug;
    } else {
      slug = slugify(slug);
      document.getElementById("slug").value = slug;
    }

    try {
      const res = await fetch("/api/pages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title,
          slug,
          seoTitle,
          seoDescription,
          content
        })
      });

      const data = await res.json();

      if (!data.ok) {
        showStatus(data.error || "Kayıt sırasında hata oluştu.", "error");
        return;
      }

      pages = data.pages || [];
      currentSlug = slug;
      renderList();
      showStatus("Sayfa kaydedildi.", "ok");
    } catch (err) {
      showStatus("Kayıt sırasında hata oluştu.", "error");
    }
  }

  async function deletePage() {
    clearStatus();

    const slug = document.getElementById("slug").value.trim();

    if (!slug) {
      showStatus("Silmek için önce bir sayfa seç.", "error");
      return;
    }

    const confirmed = confirm(`"${slug}" sayfası silinsin mi?`);
    if (!confirmed) return;

    try {
      const res = await fetch("/api/pages?slug=" + encodeURIComponent(slug), {
        method: "DELETE"
      });

      const data = await res.json();

      if (!data.ok) {
        showStatus(data.error || "Silme sırasında hata oluştu.", "error");
        return;
      }

      pages = data.pages || [];
      clearForm();
      renderList();
      showStatus("Sayfa silindi.", "ok");
    } catch (err) {
      showStatus("Silme sırasında hata oluştu.", "error");
    }
  }

  document.getElementById("title").addEventListener("input", () => {
    const slugInput = document.getElementById("slug");
    if (!currentSlug && !slugInput.value.trim()) {
      slugInput.value = slugify(document.getElementById("title").value);
    }
  });

  document.getElementById("saveBtn").addEventListener("click", savePage);
  document.getElementById("newBtn").addEventListener("click", () => {
    clearForm();
    clearStatus();
    renderList();
  });
  document.getElementById("deleteBtn").addEventListener("click", deletePage);

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    try {
      await fetch("/api/logout", { method: "POST" });
    } catch (err) {}
    window.location.href = "/login.html";
  });

  loadPages();
</script>
</body>
</html>

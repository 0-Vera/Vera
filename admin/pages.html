<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Vera CMS - Sayfalar</title>

<style>

body{
font-family:system-ui;
margin:0;
background:#f4f6f8;
}

header{
background:#111;
color:white;
padding:14px 20px;
}

.wrapper{
display:flex;
height:calc(100vh - 50px);
}

.sidebar{
width:260px;
background:white;
border-right:1px solid #ddd;
overflow:auto;
}

.sidebar h2{
font-size:16px;
padding:15px;
margin:0;
border-bottom:1px solid #eee;
}

.page-item{
padding:12px 15px;
cursor:pointer;
border-bottom:1px solid #f2f2f2;
}

.page-item:hover{
background:#f7f7f7;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.toolbar{
padding:10px;
background:white;
border-bottom:1px solid #ddd;
display:flex;
gap:10px;
}

button{
background:#0b6cff;
color:white;
border:none;
padding:8px 14px;
border-radius:5px;
cursor:pointer;
}

button.secondary{
background:#555;
}

button.danger{
background:#cc2a2a;
}

.editor{
flex:1;
display:flex;
overflow:hidden;
}

.editor-left{
width:50%;
border-right:1px solid #ddd;
display:flex;
flex-direction:column;
}

.editor-right{
flex:1;
background:white;
}

.section{
padding:10px;
border-bottom:1px solid #eee;
background:white;
}

input,textarea,select{
width:100%;
padding:6px;
margin-top:4px;
}

textarea{
font-family:monospace;
height:150px;
}

.tabs{
display:flex;
gap:10px;
padding:8px;
border-bottom:1px solid #ddd;
background:#fafafa;
}

.tab{
padding:6px 12px;
cursor:pointer;
border-radius:4px;
}

.tab.active{
background:#0b6cff;
color:white;
}

.code-area{
flex:1;
display:flex;
flex-direction:column;
}

.code-area textarea{
flex:1;
height:auto;
border:none;
border-top:1px solid #eee;
}

.preview-frame{
width:100%;
height:100%;
border:none;
}

.meta{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

</style>
</head>

<body>

<header>
Vera CMS – Sayfa Yönetimi
</header>

<div class="wrapper">

<div class="sidebar">

<h2>Sayfalar</h2>

<div id="pagesList"></div>

<div style="padding:10px">
<button onclick="createPage()">+ Yeni Sayfa</button>
</div>

</div>

<div class="main">

<div class="toolbar">

<button onclick="savePage()">Kaydet</button>
<button class="secondary" onclick="previewPage()">Önizleme</button>
<button class="danger" onclick="deletePage()">Sil</button>

</div>

<div class="editor">

<div class="editor-left">

<div class="section">

<div class="meta">

<div>
Başlık
<input id="title">
</div>

<div>
Slug
<input id="slug">
</div>

</div>

</div>

<div class="section">

<div class="meta">

<div>
SEO Title
<input id="seoTitle">
</div>

<div>
SEO Description
<input id="seoDesc">
</div>

</div>

</div>

<div class="section">

İçerik Modu

<select id="mode" onchange="toggleMode()">
<option value="sections">Section</option>
<option value="code">Full Code</option>
</select>

</div>

<div id="sectionsEditor" class="section">

<textarea id="sectionsArea" placeholder="JSON section yapısı"></textarea>

</div>

<div id="codeEditor" style="display:none">

<div class="tabs">

<div class="tab active" onclick="openTab('html')">HTML</div>
<div class="tab" onclick="openTab('css')">CSS</div>
<div class="tab" onclick="openTab('js')">JS</div>

</div>

<div class="code-area">

<textarea id="html"></textarea>
<textarea id="css" style="display:none"></textarea>
<textarea id="js" style="display:none"></textarea>

</div>

</div>

</div>

<div class="editor-right">

<iframe id="preview" class="preview-frame"></iframe>

</div>

</div>

</div>

</div>

<script>

let pages=[]
let current=null

async function loadPages(){

const res=await fetch("/api/pages")
const data=await res.json()

pages=data.pages||[]

renderPages()

}

function renderPages(){

const list=document.getElementById("pagesList")

list.innerHTML=""

pages.forEach(p=>{

const div=document.createElement("div")

div.className="page-item"
div.innerText=p.title||p.slug

div.onclick=()=>openPage(p)

list.appendChild(div)

})

}

function openPage(p){

current=p

title.value=p.title||""
slug.value=p.slug||""
seoTitle.value=p.seoTitle||""
seoDesc.value=p.seoDesc||""

mode.value=p.mode||"sections"

html.value=p.html||""
css.value=p.css||""
js.value=p.js||""

sectionsArea.value=JSON.stringify(p.sections||[],null,2)

toggleMode()

}

function createPage(){

current={
slug:"yeni-sayfa",
title:"Yeni Sayfa",
mode:"sections",
sections:[]
}

openPage(current)

}

function toggleMode(){

if(mode.value==="code"){

codeEditor.style.display="block"
sectionsEditor.style.display="none"

}else{

codeEditor.style.display="none"
sectionsEditor.style.display="block"

}

}

function openTab(t){

document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"))

event.target.classList.add("active")

html.style.display="none"
css.style.display="none"
js.style.display="none"

if(t==="html")html.style.display="block"
if(t==="css")css.style.display="block"
if(t==="js")js.style.display="block"

}

async function savePage(){

const page={

slug:slug.value.trim(),
title:title.value.trim(),
seoTitle:seoTitle.value,
seoDesc:seoDesc.value,
mode:mode.value,

html:html.value,
css:css.value,
js:js.value

}

try{
page.sections=JSON.parse(sectionsArea.value||"[]")
}catch{
alert("Section JSON hatalı")
return
}

const res=await fetch("/api/pages",{
method:"POST",
headers:{'content-type':'application/json'},
body:JSON.stringify(page)
})

const data=await res.json()

if(data.ok){

pages=data.pages
renderPages()

alert("Kaydedildi")

}else{

alert("Hata")

}

}

async function deletePage(){

if(!current)return

if(!confirm("Sayfa silinsin mi?"))return

await fetch("/api/pages?slug="+current.slug,{
method:"DELETE"
})

loadPages()

}

function previewPage(){

const frame=document.getElementById("preview")

const doc=frame.contentWindow.document

doc.open()

doc.write(`

<html>
<head>

<style>

${css.value}

</style>

</head>

<body>

${html.value}

<script>
${js.value}
<\/script>

</body>

</html>

`)

doc.close()

}

loadPages()

</script>

</body>
</html>

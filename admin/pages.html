<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vera CMS - Sayfa Yönetimi</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --danger: #dc2626;
  }
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  .sidebar {
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: auto;
  }
  .brand h1 { margin: 0 0 6px; font-size: 24px; }
  .brand p { margin: 0 0 24px; color: var(--muted); font-size: 13px; }
  .nav a, .nav button {
    display: block;
    width: 100%;
    text-align: left;
    text-decoration: none;
    color: #334155;
    background: transparent;
    border: 0;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  .nav a:hover, .nav button:hover, .nav .active {
    background: var(--accent-soft);
    color: #0f172a;
  }
  .main { padding: 24px; }
  .hero-card,
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: 0 1px 2px rgba(15,23,42,.04);
  }
  .hero-card { padding: 22px; margin-bottom: 18px; }
  .editor-layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 18px;
  }
  .card { padding: 18px; }
  .list-item {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .list-item:hover,
  .list-item.active {
    border-color: #93c5fd;
    background: #eff6ff;
  }
  .muted { color: var(--muted); }
  label {
    display: block;
    margin: 0 0 6px;
    font-size: 14px;
    color: #475569;
  }
  input, select, textarea {
    width: 100%;
    border: 1px solid #cbd5e1;
    background: #fff;
    border-radius: 12px;
    padding: 11px 12px;
    color: var(--text);
  }
  textarea { min-height: 120px; resize: vertical; }
  .tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .tab-btn {
    border: 1px solid var(--border);
    background: #fff;
    color: #334155;
    border-radius: 999px;
    padding: 10px 14px;
    cursor: pointer;
    font-weight: 700;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  button.btn {
    border: 0;
    border-radius: 12px;
    padding: 11px 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .primary { background: var(--accent); color: #fff; }
  .secondary { background: #e2e8f0; color: var(--text); }
  .danger { background: var(--danger); color: #fff; }
  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .row-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .section-card {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    background: #fff;
  }
  .status {
    display: none;
    margin-top: 12px;
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
  }
  .status.ok { display: block; background: #dcfce7; color: #166534; }
  .status.error { display: block; background: #fee2e2; color: #991b1b; }
  .preview-shell {
    width: 100%;
    min-height: 760px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: #fff;
  }
  .code-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .code-grid textarea {
    min-height: 220px;
    font-family: Consolas, Monaco, monospace;
    background: #0f172a;
    color: #e2e8f0;
    border-color: #1e293b;
  }
  @media (max-width: 1300px) {
    .editor-layout { grid-template-columns: 1fr; }
  }
  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { height: auto; position: static; border-right: 0; border-bottom: 1px solid var(--border); }
    .row-2, .row-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>Vera CMS</h1>
      <p>Gelişmiş sayfa editörü</p>
    </div>
    <nav class="nav">
      <a href="/admin/">Dashboard</a>
      <a href="/admin/pages.html" class="active">Sayfa Yönetimi</a>
      <a href="/admin/settings.html">Site Ayarları</a>
      <a href="/" target="_blank">Siteyi Aç</a>
      <button id="logoutBtn">Çıkış Yap</button>
    </nav>
  </aside>

  <main class="main">
    <section class="hero-card">
      <h1 style="margin:0 0 8px;">Sayfa Yönetimi</h1>
      <p class="muted" style="margin:0;">Standart içerik modu, section sistemi ve tam HTML/CSS/JS kod modu tek panelde.</p>
      <div id="status" class="status"></div>
    </section>

    <div class="editor-layout">
      <aside class="card">
        <h2 style="margin-top:0;">Kayıtlı Sayfalar</h2>
        <div id="pageList"></div>
      </aside>

      <section class="card">
        <div class="tabs">
          <button class="tab-btn active" data-tab="general">Genel</button>
          <button class="tab-btn" data-tab="layout">Yerleşim</button>
          <button class="tab-btn" data-tab="sections">Section</button>
          <button class="tab-btn" data-tab="code">Kod</button>
          <button class="tab-btn" data-tab="preview">Önizleme</button>
        </div>

        <div class="tab-pane active" data-pane="general">
          <div class="row-2">
            <div>
              <label for="title">Başlık</label>
              <input id="title" type="text" placeholder="Örn: Hakkımızda" />
            </div>
            <div>
              <label for="slug">Slug</label>
              <input id="slug" type="text" placeholder="hakkimizda" />
            </div>
          </div>

          <div class="row-2" style="margin-top:12px;">
            <div>
              <label for="statusField">Durum</label>
              <select id="statusField">
                <option value="draft">Taslak</option>
                <option value="published">Yayında</option>
              </select>
            </div>
            <div>
              <label for="mode">İçerik Modu</label>
              <select id="mode">
                <option value="standard">Standart</option>
                <option value="code">Tam Kod</option>
              </select>
            </div>
          </div>

          <div style="margin-top:12px;">
            <label for="template">Şablon</label>
            <select id="template">
              <option value="default">Varsayılan</option>
              <option value="landing">Landing Page</option>
              <option value="content">İçerik Sayfası</option>
              <option value="contact">İletişim</option>
            </select>
          </div>

          <div style="margin-top:12px;">
            <label for="excerpt">Kısa Açıklama</label>
            <textarea id="excerpt" style="min-height:90px;" placeholder="Sayfa özeti"></textarea>
          </div>

          <div style="margin-top:12px;">
            <label for="seoTitle">SEO Başlık</label>
            <input id="seoTitle" type="text" placeholder="Google başlığı" />
          </div>

          <div style="margin-top:12px;">
            <label for="seoDescription">SEO Açıklama</label>
            <textarea id="seoDescription" style="min-height:100px;" placeholder="Google açıklaması"></textarea>
          </div>

          <div style="margin-top:12px;">
            <label for="content">Standart İçerik</label>
            <textarea id="content" placeholder="Standart mod için temel içerik"></textarea>
          </div>
        </div>

        <div class="tab-pane" data-pane="layout">
          <div class="row-3">
            <div>
              <label for="pageBg">Sayfa Arka Plan</label>
              <input id="pageBg" type="color" />
            </div>
            <div>
              <label for="contentBg">İçerik Arka Plan</label>
              <input id="contentBg" type="color" />
            </div>
            <div>
              <label for="textColor">Metin Rengi</label>
              <input id="textColor" type="color" />
            </div>
          </div>

          <div class="row-3" style="margin-top:12px;">
            <div>
              <label for="mutedColor">İkincil Metin</label>
              <input id="mutedColor" type="color" />
            </div>
            <div>
              <label for="accentColor">Vurgu Rengi</label>
              <input id="accentColor" type="color" />
            </div>
            <div>
              <label for="buttonColor">Buton Rengi</label>
              <input id="buttonColor" type="color" />
            </div>
          </div>

          <div class="row-3" style="margin-top:12px;">
            <div>
              <label for="buttonTextColor">Buton Yazı Rengi</label>
              <input id="buttonTextColor" type="color" />
            </div>
            <div>
              <label for="maxWidth">Maks. Genişlik (px)</label>
              <input id="maxWidth" type="number" min="640" max="2400" />
            </div>
            <div>
              <label for="contentWidth">İçerik Genişliği (%)</label>
              <input id="contentWidth" type="number" min="30" max="100" />
            </div>
          </div>

          <div class="row-3" style="margin-top:12px;">
            <div>
              <label for="textAlign">Metin Hizası</label>
              <select id="textAlign">
                <option value="left">Sol</option>
                <option value="center">Orta</option>
                <option value="right">Sağ</option>
              </select>
            </div>
            <div>
              <label for="borderRadius">Kart Yuvarlaklığı</label>
              <input id="borderRadius" type="number" min="0" max="60" />
            </div>
            <div>
              <label for="containerPadding">İç Boşluk</label>
              <input id="containerPadding" type="number" min="0" max="120" />
            </div>
          </div>

          <div class="row-3" style="margin-top:12px;">
            <div>
              <label for="sectionGap">Section Boşluğu</label>
              <input id="sectionGap" type="number" min="0" max="120" />
            </div>
            <div>
              <label for="titleSize">Başlık Boyutu</label>
              <input id="titleSize" type="number" min="16" max="120" />
            </div>
            <div>
              <label for="bodySize">Gövde Boyutu</label>
              <input id="bodySize" type="number" min="12" max="40" />
            </div>
          </div>

          <div class="row-2" style="margin-top:12px;">
            <div>
              <label for="fullWidth">Tam Genişlik</label>
              <select id="fullWidth">
                <option value="false">Hayır</option>
                <option value="true">Evet</option>
              </select>
            </div>
            <div>
              <label for="fullPageCode">Kod Modunda Tüm Sayfa</label>
              <select id="fullPageCode">
                <option value="false">Hayır</option>
                <option value="true">Evet</option>
              </select>
            </div>
          </div>
        </div>

        <div class="tab-pane" data-pane="sections">
          <div class="actions" style="margin-top:0;margin-bottom:12px;">
            <button class="btn primary" id="addSectionBtn">Section Ekle</button>
            <button class="btn secondary" id="loadTemplateBtn">Şablon Section Yükle</button>
          </div>
          <div id="sectionsWrap"></div>
        </div>

        <div class="tab-pane" data-pane="code">
          <div class="code-grid">
            <div>
              <label for="htmlCode">HTML</label>
              <textarea id="htmlCode" placeholder="<section>...</section>"></textarea>
            </div>
            <div>
              <label for="cssCode">CSS</label>
              <textarea id="cssCode" placeholder="body { ... }"></textarea>
            </div>
            <div>
              <label for="jsCode">JavaScript</label>
              <textarea id="jsCode" placeholder="console.log('merhaba')"></textarea>
            </div>
          </div>
        </div>

        <div class="tab-pane" data-pane="preview">
          <iframe id="previewFrame" class="preview-shell"></iframe>
        </div>

        <div class="actions">
          <button class="btn primary" id="saveBtn">Kaydet</button>
          <button class="btn secondary" id="newBtn">Yeni Sayfa</button>
          <button class="btn secondary" id="previewBtn">Önizlemeyi Yenile</button>
          <button class="btn danger" id="deleteBtn">Sil</button>
        </div>
      </section>
    </div>
  </main>
</div>

<script>
  let pages = [];
  let currentSlug = "";
  let sections = [];

  const defaultSettings = {
    pageBg: "#f8fafc",
    contentBg: "#ffffff",
    textColor: "#0f172a",
    mutedColor: "#475569",
    accentColor: "#2563eb",
    buttonColor: "#2563eb",
    buttonTextColor: "#ffffff",
    maxWidth: 1280,
    contentWidth: 100,
    fullWidth: false,
    textAlign: "left",
    borderRadius: 18,
    containerPadding: 24,
    sectionGap: 18,
    titleSize: 40,
    bodySize: 17,
    fullPageCode: false
  };

  function showStatus(message, type) {
    const box = document.getElementById("status");
    box.className = "status " + type;
    box.textContent = message;
  }

  function clearStatus() {
    const box = document.getElementById("status");
    box.className = "status";
    box.textContent = "";
  }

  function slugify(text) {
    return String(text || "")
      .toLowerCase()
      .trim()
      .replace(/ğ/g, "g")
      .replace(/ü/g, "u")
      .replace(/ş/g, "s")
      .replace(/ı/g, "i")
      .replace(/ö/g, "o")
      .replace(/ç/g, "c")
      .replace(/[^a-z0-9\s-]/g, "")
      .replace(/\s+/g, "-")
      .replace(/-+/g, "-");
  }

  function uid(prefix) {
    return prefix + "-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
  }

  function getPageSettings() {
    return {
      pageBg: document.getElementById("pageBg").value,
      contentBg: document.getElementById("contentBg").value,
      textColor: document.getElementById("textColor").value,
      mutedColor: document.getElementById("mutedColor").value,
      accentColor: document.getElementById("accentColor").value,
      buttonColor: document.getElementById("buttonColor").value,
      buttonTextColor: document.getElementById("buttonTextColor").value,
      maxWidth: Number(document.getElementById("maxWidth").value || 1280),
      contentWidth: Number(document.getElementById("contentWidth").value || 100),
      fullWidth: document.getElementById("fullWidth").value === "true",
      textAlign: document.getElementById("textAlign").value,
      borderRadius: Number(document.getElementById("borderRadius").value || 18),
      containerPadding: Number(document.getElementById("containerPadding").value || 24),
      sectionGap: Number(document.getElementById("sectionGap").value || 18),
      titleSize: Number(document.getElementById("titleSize").value || 40),
      bodySize: Number(document.getElementById("bodySize").value || 17),
      fullPageCode: document.getElementById("fullPageCode").value === "true"
    };
  }

  function setPageSettings(settings = {}) {
    const s = { ...defaultSettings, ...(settings || {}) };
    document.getElementById("pageBg").value = s.pageBg;
    document.getElementById("contentBg").value = s.contentBg;
    document.getElementById("textColor").value = s.textColor;
    document.getElementById("mutedColor").value = s.mutedColor;
    document.getElementById("accentColor").value = s.accentColor;
    document.getElementById("buttonColor").value = s.buttonColor;
    document.getElementById("buttonTextColor").value = s.buttonTextColor;
    document.getElementById("maxWidth").value = s.maxWidth;
    document.getElementById("contentWidth").value = s.contentWidth;
    document.getElementById("fullWidth").value = String(!!s.fullWidth);
    document.getElementById("textAlign").value = s.textAlign;
    document.getElementById("borderRadius").value = s.borderRadius;
    document.getElementById("containerPadding").value = s.containerPadding;
    document.getElementById("sectionGap").value = s.sectionGap;
    document.getElementById("titleSize").value = s.titleSize;
    document.getElementById("bodySize").value = s.bodySize;
    document.getElementById("fullPageCode").value = String(!!s.fullPageCode);
  }

  function createEmptySection() {
    return {
      id: uid("section"),
      type: "content",
      title: "",
      content: "",
      width: 100,
      background: "#ffffff",
      textColor: "#0f172a",
      padding: 24,
      radius: 18
    };
  }

  function renderSections() {
    const wrap = document.getElementById("sectionsWrap");
    wrap.innerHTML = "";

    if (!sections.length) {
      wrap.innerHTML = '<div class="muted">Henüz section yok.</div>';
      return;
    }

    sections.forEach((section, index) => {
      const card = document.createElement("div");
      card.className = "section-card";
      card.innerHTML = `
        <div class="row-2">
          <div>
            <label>Tip</label>
            <select data-field="type">
              <option value="content" ${section.type === "content" ? "selected" : ""}>Content</option>
              <option value="hero" ${section.type === "hero" ? "selected" : ""}>Hero</option>
              <option value="html" ${section.type === "html" ? "selected" : ""}>HTML</option>
            </select>
          </div>
          <div>
            <label>Başlık</label>
            <input data-field="title" value="${escapeAttr(section.title)}" />
          </div>
        </div>
        <div style="margin-top:12px;">
          <label>İçerik</label>
          <textarea data-field="content" style="min-height:120px;">${escapeText(section.content)}</textarea>
        </div>
        <div class="row-3" style="margin-top:12px;">
          <div>
            <label>Genişlik (%)</label>
            <input data-field="width" type="number" min="30" max="100" value="${Number(section.width || 100)}" />
          </div>
          <div>
            <label>Padding</label>
            <input data-field="padding" type="number" min="0" max="120" value="${Number(section.padding || 24)}" />
          </div>
          <div>
            <label>Radius</label>
            <input data-field="radius" type="number" min="0" max="60" value="${Number(section.radius || 18)}" />
          </div>
        </div>
        <div class="row-2" style="margin-top:12px;">
          <div>
            <label>Arka Plan</label>
            <input data-field="background" type="color" value="${section.background || "#ffffff"}" />
          </div>
          <div>
            <label>Metin</label>
            <input data-field="textColor" type="color" value="${section.textColor || "#0f172a"}" />
          </div>
        </div>
        <div class="actions">
          <button type="button" class="btn secondary move-up">Yukarı</button>
          <button type="button" class="btn secondary move-down">Aşağı</button>
          <button type="button" class="btn danger remove-section">Sil</button>
        </div>
      `;

      card.querySelectorAll("[data-field]").forEach((field) => {
        field.addEventListener("input", (e) => {
          const name = e.target.getAttribute("data-field");
          sections[index][name] = ["width", "padding", "radius"].includes(name)
            ? Number(e.target.value || 0)
            : e.target.value;
        });
        field.addEventListener("change", (e) => {
          const name = e.target.getAttribute("data-field");
          sections[index][name] = ["width", "padding", "radius"].includes(name)
            ? Number(e.target.value || 0)
            : e.target.value;
        });
      });

      card.querySelector(".remove-section").addEventListener("click", () => {
        sections.splice(index, 1);
        renderSections();
      });

      card.querySelector(".move-up").addEventListener("click", () => {
        if (index === 0) return;
        const temp = sections[index - 1];
        sections[index - 1] = sections[index];
        sections[index] = temp;
        renderSections();
      });

      card.querySelector(".move-down").addEventListener("click", () => {
        if (index >= sections.length - 1) return;
        const temp = sections[index + 1];
        sections[index + 1] = sections[index];
        sections[index] = temp;
        renderSections();
      });

      wrap.appendChild(card);
    });
  }

  function escapeAttr(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/"/g, "&quot;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function escapeText(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function fillForm(page) {
    document.getElementById("title").value = page.title || "";
    document.getElementById("slug").value = page.slug || "";
    document.getElementById("statusField").value = page.status || "draft";
    document.getElementById("mode").value = page.mode || "standard";
    document.getElementById("template").value = page.template || "default";
    document.getElementById("excerpt").value = page.excerpt || "";
    document.getElementById("seoTitle").value = page.seoTitle || "";
    document.getElementById("seoDescription").value = page.seoDescription || "";
    document.getElementById("content").value = page.content || "";
    document.getElementById("htmlCode").value = page.html || "";
    document.getElementById("cssCode").value = page.css || "";
    document.getElementById("jsCode").value = page.js || "";
    sections = Array.isArray(page.sections) ? page.sections : [];
    setPageSettings(page.settings || {});
    currentSlug = page.slug || "";
    renderSections();
    refreshPreview();
  }

  function clearForm() {
    currentSlug = "";
    document.getElementById("title").value = "";
    document.getElementById("slug").value = "";
    document.getElementById("statusField").value = "draft";
    document.getElementById("mode").value = "standard";
    document.getElementById("template").value = "default";
    document.getElementById("excerpt").value = "";
    document.getElementById("seoTitle").value = "";
    document.getElementById("seoDescription").value = "";
    document.getElementById("content").value = "";
    document.getElementById("htmlCode").value = "";
    document.getElementById("cssCode").value = "";
    document.getElementById("jsCode").value = "";
    sections = [];
    setPageSettings(defaultSettings);
    renderSections();
    refreshPreview();
  }

  function renderPageList() {
    const list = document.getElementById("pageList");
    list.innerHTML = "";

    if (!pages.length) {
      list.innerHTML = '<div class="muted">Henüz sayfa yok.</div>';
      return;
    }

    pages.forEach((page) => {
      const item = document.createElement("div");
      item.className = "list-item" + (page.slug === currentSlug ? " active" : "");
      item.innerHTML = `
        <strong>${page.title || "-"}</strong>
        <div class="muted">/${page.slug || ""}</div>
        <div class="muted">durum: ${page.status || "draft"} · mod: ${page.mode || "standard"}</div>
      `;
      item.addEventListener("click", () => {
        fillForm(page);
        renderPageList();
      });
      list.appendChild(item);
    });
  }

  function collectPayload() {
    let slug = document.getElementById("slug").value.trim();
    const title = document.getElementById("title").value.trim();
    slug = slugify(slug || title);
    document.getElementById("slug").value = slug;

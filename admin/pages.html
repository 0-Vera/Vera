<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera Admin - Sayfalar</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a}
    .loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#64748b}.hidden{display:none!important}
    .layout{min-height:100vh;display:grid;grid-template-columns:260px 1fr}.sidebar{background:#0f172a;color:#e2e8f0;padding:22px 18px;border-right:1px solid rgba(255,255,255,.06)}
    .brand h1{margin:0 0 6px;font-size:24px}.brand p{margin:0;color:#94a3b8;font-size:13px}.nav-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin:22px 0 10px}
    .nav-link,.nav-btn{display:block;width:100%;text-align:left;text-decoration:none;border:0;background:transparent;color:#e2e8f0;padding:12px 14px;border-radius:12px;cursor:pointer;font-size:14px;margin-bottom:8px}.nav-link:hover,.nav-btn:hover,.nav-link.active{background:rgba(255,255,255,.08)}
    .main{display:flex;flex-direction:column}.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .topbar-left h2{margin:0 0 4px;font-size:20px}.topbar-left p{margin:0;color:#64748b;font-size:13px}.btn{border:0;border-radius:12px;padding:11px 16px;font-weight:700;cursor:pointer;font-size:14px}.btn-primary{background:#2563eb;color:#fff}.btn-secondary{background:#e2e8f0;color:#0f172a}.btn-danger{background:#dc2626;color:#fff}
    .content{padding:22px;display:grid;grid-template-columns:360px 1fr;gap:18px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:22px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .card h3{margin:0 0 12px}.card p{margin:0 0 18px;color:#64748b;line-height:1.7}label{display:block;margin-bottom:6px;font-size:14px;color:#475569}
    input,textarea,select{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:14px;color:#0f172a;background:#fff}textarea{min-height:100px;resize:vertical}.code-area{font-family:Consolas,monospace;min-height:180px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap}.page-list{display:grid;gap:12px}.page-item{border:1px solid #e2e8f0;border-radius:14px;padding:14px;background:#fff;cursor:pointer}.page-item.active{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.08)}
    .meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.chip{display:inline-flex;padding:6px 10px;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-size:12px;font-weight:700}.status{display:none;margin-top:8px;padding:12px;border-radius:12px;font-size:14px}.status.show{display:block}.status.ok{background:#dcfce7;color:#166534}.status.error{background:#fee2e2;color:#991b1b}
    .toggle-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.mode-wrap{display:none}.mode-wrap.show{display:block}
    .builder-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.builder-item{border:1px solid #e2e8f0;border-radius:14px;padding:14px;margin-bottom:12px;background:#fff}.builder-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.builder-title{font-size:14px;font-weight:700}.builder-actions{display:flex;gap:8px;flex-wrap:wrap}.mini-btn{border:0;border-radius:10px;padding:8px 10px;font-size:12px;font-weight:700;cursor:pointer;background:#e2e8f0;color:#0f172a}.mini-btn.danger{background:#fee2e2;color:#991b1b}.builder-preview-shell{display:flex;flex-direction:column;gap:14px}.builder-preview-card{border:1px dashed #cbd5e1;background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.04)}.builder-preview-card h4{margin:0 0 10px;font-size:24px}.builder-preview-card p{margin:0 0 14px;color:inherit;line-height:1.7}.builder-preview-actions{display:flex;gap:10px;flex-wrap:wrap}.builder-preview-actions span{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid #cbd5e1;background:#fff}
    @media(max-width:1200px){.layout{grid-template-columns:1fr}.sidebar{border-right:0;border-bottom:1px solid rgba(255,255,255,.06)}.content{grid-template-columns:1fr}.toggle-grid,.builder-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="loading" class="loading">Oturum kontrol ediliyor...</div>
  <div id="app" class="layout hidden">
    <aside class="sidebar">
      <div class="brand"><h1>Vera Admin</h1><p>Sayfa yönetimi</p></div>
      <div class="nav-title">Editör</div>
      <a class="nav-link" href="/admin">Ana Sayfa Editörü</a>
      <a class="nav-link active" href="/admin/pages.html">Sayfalar</a>
      <div class="nav-title">Oturum</div>
      <button id="logoutBtnSide" class="nav-btn" type="button">Çıkış Yap</button>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h2>Sayfa Yönetimi</h2>
          <p>Her sayfa için blok veya kod düzenleme</p>
        </div>
        <button id="logoutBtnTop" class="btn btn-danger" type="button">Çıkış Yap</button>
      </header>
      <section class="content">
        <div class="card">
          <h3>Sayfa Listesi</h3>
          <div class="toolbar">
            <button id="newPageBtn" class="btn btn-primary" type="button">Yeni Sayfa</button>
            <button id="refreshBtn" class="btn btn-secondary" type="button">Yenile</button>
          </div>
          <div id="pageList" class="page-list" style="margin-top:16px"></div>
        </div>
        <div class="card">
          <h3>Sayfa Düzenle</h3>
          <label for="pageTitle">Başlık</label>
          <input id="pageTitle" type="text">
          <label for="pageSlug">Slug</label>
          <input id="pageSlug" type="text" placeholder="ornek-sayfa">

          <div class="toggle-grid">
            <div>
              <label for="pageStatus">Durum</label>
              <select id="pageStatus"><option value="draft">Taslak</option><option value="published">Yayında</option></select>
            </div>
            <div>
              <label for="pageIsHome">Ana Sayfa</label>
              <select id="pageIsHome"><option value="false">Hayır</option><option value="true">Evet</option></select>
            </div>
</html>

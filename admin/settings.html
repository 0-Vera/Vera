<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vera Admin - Site Ayarları</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a}
    .loading{min-height:100vh;display:flex;align-items:center;justify-content:center;color:#64748b}.hidden{display:none!important}
    .layout{min-height:100vh;display:grid;grid-template-columns:260px 1fr}.sidebar{background:#0f172a;color:#e2e8f0;padding:22px 18px}.brand h1{margin:0 0 6px;font-size:24px}.brand p{margin:0;color:#94a3b8;font-size:13px}
    .nav-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin:22px 0 10px}.nav-link,.nav-btn{display:block;width:100%;text-align:left;text-decoration:none;border:0;background:transparent;color:#e2e8f0;padding:12px 14px;border-radius:12px;cursor:pointer;font-size:14px;margin-bottom:8px}.nav-link:hover,.nav-btn:hover,.nav-link.active{background:rgba(255,255,255,.08)}
    .main{display:flex;flex-direction:column}.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px}.topbar-left h2{margin:0 0 4px;font-size:20px}.topbar-left p{margin:0;color:#64748b;font-size:13px}
    .content{padding:22px;display:grid;gap:18px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:22px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
    .card h3{margin:0 0 12px}.card p{margin:0 0 18px;color:#64748b;line-height:1.7}label{display:block;margin-bottom:6px;font-size:14px;color:#475569}
    input,textarea,select{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:12px 14px;margin-bottom:14px;font-size:14px;color:#0f172a;background:#fff}textarea{min-height:100px;resize:vertical}
    .btn{border:0;border-radius:12px;padding:11px 16px;font-weight:700;cursor:pointer;font-size:14px}.btn-primary{background:#2563eb;color:#fff}.btn-secondary{background:#e2e8f0;color:#0f172a}.btn-danger{background:#dc2626;color:#fff}
    .menu-item{border:1px solid #e2e8f0;border-radius:14px;padding:14px;margin-bottom:12px;background:#fff}.menu-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.status{display:none;margin-top:8px;padding:12px;border-radius:12px;font-size:14px}.status.show{display:block}.status.ok{background:#dcfce7;color:#166534}.status.error{background:#fee2e2;color:#991b1b}
    .menu-help{margin:-4px 0 12px;color:#64748b;font-size:12px}
    @media(max-width:1100px){.layout{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="loading" class="loading">Oturum kontrol ediliyor...</div>
  <div id="app" class="layout hidden">
    <aside class="sidebar">
      <div class="brand"><h1>Vera Admin</h1><p>Site ayarları</p></div>
      <div class="nav-title">Menü</div>
      <a class="nav-link" href="/admin/index.html">Dashboard</a>
      <a class="nav-link" href="/admin/pages.html">Sayfalar</a>
      <a class="nav-link active" href="/admin/settings.html">Site Ayarları</a>
      <div class="nav-title">Oturum</div>
      <button id="logoutBtnSide" class="nav-btn" type="button">Çıkış Yap</button>
    </aside>
    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <h2>Site Ayarları</h2>
          <p>Global menü, logo, footer ve iletişim alanları</p>
        </div>
        <button id="logoutBtnTop" class="btn btn-danger" type="button">Çıkış Yap</button>
      </header>
      <section class="content">
        <div class="grid">
          <div class="card">
            <h3>Genel</h3>
            <label for="siteName">Site Adı</label><input id="siteName" type="text">
            <label for="logoText">Logo Metni</label><input id="logoText" type="text">
            <label for="logoLink">Logo Linki</label><input id="logoLink" type="text">
            <label for="contactEmail">E-posta</label><input id="contactEmail" type="text">
            <label for="contactPhone">Telefon</label><input id="contactPhone" type="text">
            <label for="footerText">Footer Yazısı</label><input id="footerText" type="text">
          </div>
          <div class="card">
            <h3>Görünüm</h3>
            <label for="showHeader">Header Göster</label>
            <select id="showHeader"><option value="true">Evet</option><option value="false">Hayır</option></select>
            <label for="showFooter">Footer Göster</label>
            <select id="showFooter"><option value="true">Evet</option><option value="false">Hayır</option></select>
            <label for="showTopCta">Üst CTA Göster</label>
            <select id="showTopCta"><option value="true">Evet</option><option value="false">Hayır</option></select>
            <label for="topCtaText">Üst CTA Metni</label><input id="topCtaText" type="text">
            <label for="topCtaLink">Üst CTA Linki</label><input id="topCtaLink" type="text">
          </div>
        </div>
        <div class="card">
          <h3>Menü Öğeleri</h3>
          <button id="addMenuBtn" class="btn btn-secondary" type="button">Menü Öğesi Ekle</button>
          <div id="menuWrap" style="margin-top:14px"></div>
          <button id="saveBtn" class="btn btn-primary" type="button">Kaydet</button>
          <div id="statusBox" class="status"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    let siteSettings = {
      siteName: 'Vera',
      logoText: 'Vera',
      logoLink: '/',
      contactEmail: '',
      contactPhone: '',
      footerText: '© Vera',
      showHeader: true,
      showFooter: true,
      showTopCta: true,
      topCtaText: 'İletişim',
      topCtaLink: '/iletisim',
      topCtaAction: { type: 'url', url: '/iletisim', pageId: '', anchor: '', email: '', phone: '', whatsapp: '', downloadUrl: '', newTab: false },
      menuItems: []
    };

    let availablePages = [];

    function uid() {
      return 'm-' + Math.random().toString(36).slice(2) + Date.now();
    }

    function escapeHtml(v) {
      return String(v || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function showStatus(message, type) {
      statusBox.className = 'status show ' + type;
      statusBox.textContent = message;
    }

    function normalizeMenuItem(item = {}) {
      return {
        id: String(item.id || uid()),
        text: String(item.text || '').trim(),
        targetType: item.targetType === 'page' ? 'page' : 'link',
        link: String(item.link || '').trim(),
        pageId: String(item.pageId || '').trim(),
        action: {
          type: ['url','page','anchor','email','phone','whatsapp','download','none'].includes(item?.action?.type) ? item.action.type : (item.targetType === 'page' ? 'page' : 'url'),
          url: String(item?.action?.url || item.link || '').trim(),
          pageId: String(item?.action?.pageId || item.pageId || '').trim(),
          anchor: String(item?.action?.anchor || '').trim(),
          email: String(item?.action?.email || '').trim(),
          phone: String(item?.action?.phone || '').trim(),
          whatsapp: String(item?.action?.whatsapp || '').trim(),
          downloadUrl: String(item?.action?.downloadUrl || '').trim(),
          newTab: !!item?.action?.newTab
        }
      };
    }

    function readForm() {
      siteSettings = {
        siteName: siteName.value.trim() || 'Vera',
        logoText: logoText.value.trim() || 'Vera',
        logoLink: logoLink.value.trim() || '/',
        contactEmail: contactEmail.value.trim(),
        contactPhone: contactPhone.value.trim(),
        footerText: footerText.value.trim() || '© Vera',
        showHeader: showHeader.value === 'true',
        showFooter: showFooter.value === 'true',
        showTopCta: showTopCta.value === 'true',
        topCtaText: topCtaText.value.trim(),
        topCtaLink: topCtaLink.value.trim(),
        topCtaAction: siteSettings.topCtaAction || { type: 'url', url: topCtaLink.value.trim(), pageId: '', anchor: '', email: '', phone: '', whatsapp: '', downloadUrl: '', newTab: false },
        menuItems: Array.isArray(siteSettings.menuItems)
          ? siteSettings.menuItems.map(normalizeMenuItem)
          : []
      };
    }

    function fillForm() {
      siteName.value = siteSettings.siteName || '';
      logoText.value = siteSettings.logoText || '';
      logoLink.value = siteSettings.logoLink || '/';
      contactEmail.value = siteSettings.contactEmail || '';
      contactPhone.value = siteSettings.contactPhone || '';
      footerText.value = siteSettings.footerText || '';
      showHeader.value = String(siteSettings.showHeader !== false);
      showFooter.value = String(siteSettings.showFooter !== false);
      showTopCta.value = String(siteSettings.showTopCta !== false);
      topCtaText.value = siteSettings.topCtaText || '';
      topCtaLink.value = siteSettings.topCtaLink || '';
      if (!Array.isArray(siteSettings.menuItems)) siteSettings.menuItems = [];
      siteSettings.menuItems = siteSettings.menuItems.map(normalizeMenuItem);
      renderMenuItems();
    }

    function pageOptionsHtml(selectedPageId) {
      let html = '<option value="">Sayfa seç</option>';

      availablePages.forEach(function(page) {
        const selected = String(page.id) === String(selectedPageId) ? ' selected' : '';
        const title = escapeHtml(page.title || 'İsimsiz Sayfa');
        const slug = page.isHome ? '/' : '/' + String(page.slug || '').replace(/^\/+/, '');
        const status = page.status === 'published' ? 'Yayında' : 'Taslak';
        html += '<option value="' + escapeHtml(page.id) + '"' + selected + '>' + title + ' (' + escapeHtml(slug) + ' - ' + escapeHtml(status) + ')</option>';
      });

      return html;
    }

    function createMenuItemHtml(item, index) {
      const isPage = item.targetType === 'page';

      const actionType = item.action?.type || (isPage ? 'page' : 'url');
      const actionValue =
        actionType === 'anchor' ? (item.action?.anchor || '') :
        actionType === 'email' ? (item.action?.email || '') :
        actionType === 'phone' ? (item.action?.phone || '') :
        actionType === 'whatsapp' ? (item.action?.whatsapp || '') :
        actionType === 'download' ? (item.action?.downloadUrl || '') :
        (item.action?.url || item.link || '');

      return ''
        + '<div class="menu-head">'
        + '  <strong>Menü Öğesi ' + (index + 1) + '</strong>'
        + '  <button class="btn btn-danger remove-menu" type="button">Sil</button>'
        + '</div>'

        + '<label>Metin</label>'
        + '<input data-key="text" value="' + escapeHtml(item.text) + '">'

        + '<label>Yönlendirme Türü</label>'
        + '<select data-key="targetType">'
        + '  <option value="link"' + (item.targetType === 'link' ? ' selected' : '') + '>Özel Eylem</option>'
        + '  <option value="page"' + (item.targetType === 'page' ? ' selected' : '') + '>Sayfa Seç</option>'
        + '</select>'

        + '<label>Eylem Tipi</label>'
        + '<select data-key="actionType"' + (isPage ? ' disabled' : '') + '>'
        + '  <option value="url"' + (actionType === 'url' ? ' selected' : '') + '>URL</option>'
        + '  <option value="anchor"' + (actionType === 'anchor' ? ' selected' : '') + '>Anchor</option>'
        + '  <option value="email"' + (actionType === 'email' ? ' selected' : '') + '>E-posta</option>'
        + '  <option value="phone"' + (actionType === 'phone' ? ' selected' : '') + '>Telefon</option>'
        + '  <option value="whatsapp"' + (actionType === 'whatsapp' ? ' selected' : '') + '>WhatsApp</option>'
        + '  <option value="download"' + (actionType === 'download' ? ' selected' : '') + '>Dosya</option>'
        + '  <option value="none"' + (actionType === 'none' ? ' selected' : '') + '>Yok</option>'
        + '</select>'

        + '<div class="menu-help">Sayfa seçersen bağlantı otomatik gelir. Özel eylem seçersen aşağıdaki değer kullanılır.</div>'

        + '<label>Değer</label>'
        + '<input data-key="actionValue" placeholder="/iletisim veya #bolum veya mail@adres.com" value="' + escapeHtml(actionValue) + '"' + (isPage ? ' disabled' : '') + '>'

        + '<label><input data-key="actionNewTab" data-bool="1" type="checkbox"' + (item.action?.newTab ? ' checked' : '') + (isPage ? ' disabled' : '') + '> Yeni sekme</label>'

        + '<label>Sayfa</label>'
        + '<select data-key="pageId"' + (isPage ? '' : ' disabled') + '>'
        + pageOptionsHtml(item.pageId)
        + '</select>';
    }

    function renderMenuItems() {
      menuWrap.innerHTML = '';

      if (!siteSettings.menuItems.length) {
        menuWrap.innerHTML = '<p style="color:#64748b">Henüz menü öğesi yok.</p>';
        return;
      }

      siteSettings.menuItems.forEach(function(item, index) {
        const safeItem = normalizeMenuItem(item);
        siteSettings.menuItems[index] = safeItem;

        const el = document.createElement('div');
        el.className = 'menu-item';
        el.innerHTML = createMenuItemHtml(safeItem, index);

        el.querySelector('.remove-menu').addEventListener('click', function() {
          siteSettings.menuItems.splice(index, 1);
          renderMenuItems();
        });

        el.querySelectorAll('[data-key]').forEach(function(field) {
          function applyValue() {
            const key = field.getAttribute('data-key');
            const value = field.value;

            if (!siteSettings.menuItems[index]) return;

            siteSettings.menuItems[index][key] = value;

            if (key === 'targetType') {
              if (value === 'page') {
                siteSettings.menuItems[index].link = '';
              } else {
                siteSettings.menuItems[index].pageId = '';
              }
              renderMenuItems();
              return;
            }

            if (key === 'pageId') {
              siteSettings.menuItems[index].pageId = value;
              if (siteSettings.menuItems[index].targetType === 'page') {
                siteSettings.menuItems[index].link = '';
              }
            }

            if (key === 'link') {
              siteSettings.menuItems[index].link = value;
            }

            if (key === 'text') {
              siteSettings.menuItems[index].text = value;
            }
          }

          field.addEventListener('input', applyValue);
          field.addEventListener('change', applyValue);
        });

        menuWrap.appendChild(el);
      });
    }

    async function checkSession() {
      try {
        const res = await fetch('/api/verify', {
          method: 'GET',
          credentials: 'same-origin',
          headers: { Accept: 'application/json' }
        });
        const data = await res.json();
        if (!data.ok || !data.authenticated) {
          location.replace('/login');
          return;
        }
        loading.classList.add('hidden');
        app.classList.remove('hidden');
      } catch {
        location.replace('/login');
      }
    }

    async function loadPages() {
      try {
        const res = await fetch('/api/pages', {
          method: 'GET',
          credentials: 'same-origin',
          headers: { Accept: 'application/json' }
        });
        const data = await res.json();
        availablePages = Array.isArray(data.pages) ? data.pages : [];
      } catch {
        availablePages = [];
      }
    }

    async function loadSettings() {
      try {
        const res = await fetch('/api/site-settings', {
          headers: { Accept: 'application/json' }
        });
        const data = await res.json();
        siteSettings = data.settings || siteSettings;
        if (!Array.isArray(siteSettings.menuItems)) siteSettings.menuItems = [];
        fillForm();
      } catch {
        showStatus('Ayarlar yüklenemedi.', 'error');
      }
    }

    async function saveSettings() {
      readForm();

      try {
        const res = await fetch('/api/site-settings', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(siteSettings)
        });

        const data = await res.json();

        if (!data.ok) {
          return showStatus(data.error || 'Kayıt başarısız.', 'error');
        }

        siteSettings = data.settings || siteSettings;
        if (!Array.isArray(siteSettings.menuItems)) siteSettings.menuItems = [];
        fillForm();
        showStatus('Ayarlar kaydedildi.', 'ok');
      } catch {
        showStatus('İstek sırasında hata oluştu.', 'error');
      }
    }

    async function logout() {
      try {
        await fetch('/api/logout', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { Accept: 'application/json' }
        });
      } catch {}
      location.replace('/login');
    }

    addMenuBtn.addEventListener('click', function() {
      siteSettings.menuItems.push({
        id: uid(),
        text: 'Menü',
        targetType: 'link',
        link: '#',
        pageId: ''
      });
      renderMenuItems();
    });

    saveBtn.addEventListener('click', saveSettings);
    logoutBtnTop.addEventListener('click', logout);
    logoutBtnSide.addEventListener('click', logout);

    (async function init() {
      await checkSession();
      await loadPages();
      await loadSettings();
    })();
  </script>
</body>
</html>

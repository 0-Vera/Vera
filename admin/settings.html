<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Vera CMS - Site Ayarları</title>
<style>
body {
  font-family: system-ui;
  margin: 0;
  background: #f4f6f8;
}
header {
  background: #111;
  color: white;
  padding: 14px 20px;
}
.wrapper {
  display: flex;
  height: calc(100vh - 50px);
}
.sidebar {
  width: 220px;
  background: white;
  border-right: 1px solid #ddd;
  padding: 15px;
}
.sidebar h3 {
  margin-top: 0;
}
.sidebar ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.sidebar li {
  margin-bottom: 10px;
}
.sidebar a {
  color: #0b6cff;
  text-decoration: none;
}
.main {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}
.section {
  background: white;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 8px;
  box-shadow: 0 0 6px rgba(0, 0, 0, 0.05);
}
.section h3 {
  margin-top: 0;
  margin-bottom: 10px;
}
label {
  display: block;
  font-weight: 600;
  margin-top: 10px;
}
input[type="text"], input[type="number"], textarea {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  box-sizing: border-box;
  border: 1px solid #ccc;
  border-radius: 4px;
}
textarea {
  height: 80px;
  resize: vertical;
}
button {
  background: #0b6cff;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 5px;
  cursor: pointer;
  font-weight: 600;
}
button:disabled {
  opacity: 0.6;
  cursor: default;
}
</style>
</head>
<body>
<header>Vera CMS – Site Ayarları</header>
<div class="wrapper">
  <div class="sidebar">
    <h3>Yönetim</h3>
    <ul>
      <li><a href="index.html">Dashboard</a></li>
      <li><a href="pages.html">Sayfalar</a></li>
      <li><a href="settings.html">Site Ayarları</a></li>
    </ul>
  </div>
  <div class="main">
    <div class="section">
      <h3>Genel Bilgiler</h3>
      <label for="siteTitle">Site Başlığı</label>
      <input type="text" id="siteTitle" />
      <label for="siteDescription">Site Açıklaması</label>
      <textarea id="siteDescription"></textarea>
    </div>
    <div class="section">
      <h3>Renkler</h3>
      <label for="siteBg">Arkaplan Rengi (#hex)</label>
      <input type="text" id="siteBg" placeholder="#f8fafc" />
      <label for="siteText">Metin Rengi (#hex)</label>
      <input type="text" id="siteText" placeholder="#0f172a" />
      <label for="siteCard">Kart Arkaplanı (#hex)</label>
      <input type="text" id="siteCard" placeholder="#ffffff" />
      <label for="siteBorder">Kart Sınır Rengi (#hex)</label>
      <input type="text" id="siteBorder" placeholder="#e2e8f0" />
      <label for="siteAccent">Vurgu Rengi (#hex)</label>
      <input type="text" id="siteAccent" placeholder="#2563eb" />
    </div>
    <div class="section">
      <h3>Yerleşim</h3>
      <label for="headerMaxWidth">Başlık Maks. Genişliği (px)</label>
      <input type="number" id="headerMaxWidth" min="0" />
      <label for="headerPadding">Başlık İç Boşluğu (px)</label>
      <input type="number" id="headerPadding" min="0" />
      <label for="navRadius">Menü Kenar Yarıçapı (px)</label>
      <input type="number" id="navRadius" min="0" />
      <label for="mainRadius">Ana İçerik Kenar Yarıçapı (px)</label>
      <input type="number" id="mainRadius" min="0" />
      <label for="mainPadding">Ana İçerik İç Boşluğu (px)</label>
      <input type="number" id="mainPadding" min="0" />
    </div>
    <button onclick="saveSettings()" id="saveBtn">Kaydet</button>
  </div>
</div>
<script>
async function loadSettings() {
  try {
    const res = await fetch("/api/settings");
    const data = await res.json();
    const s = (data && data.settings) || {};
    siteTitle.value = s.siteTitle || "";
    siteDescription.value = s.siteDescription || "";
    siteBg.value = s.siteBg || "";
    siteText.value = s.siteText || "";
    siteCard.value = s.siteCard || "";
    siteBorder.value = s.siteBorder || "";
    siteAccent.value = s.siteAccent || "";
    headerMaxWidth.value = s.headerMaxWidth || '';
    headerPadding.value = s.headerPadding || '';
    navRadius.value = s.navRadius || '';
    mainRadius.value = s.mainRadius || '';
    mainPadding.value = s.mainPadding || '';
  } catch (err) {
    alert("Ayarlar yüklenemedi: " + err.message);
  }
}
async function saveSettings() {
  saveBtn.disabled = true;
  const body = {
    siteTitle: siteTitle.value.trim(),
    siteDescription: siteDescription.value.trim(),
    siteBg: siteBg.value.trim(),
    siteText: siteText.value.trim(),
    siteCard: siteCard.value.trim(),
    siteBorder: siteBorder.value.trim(),
    siteAccent: siteAccent.value.trim(),
    headerMaxWidth: Number(headerMaxWidth.value),
    headerPadding: Number(headerPadding.value),
    navRadius: Number(navRadius.value),
    mainRadius: Number(mainRadius.value),
    mainPadding: Number(mainPadding.value)
  };
  try {
    const res = await fetch("/api/settings", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.ok) {
      alert("Ayarlar kaydedildi");
    } else {
      alert("Hata: " + data.error);
    }
  } catch (err) {
    alert("Hata: " + err.message);
  } finally {
    saveBtn.disabled = false;
  }
}
loadSettings();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vera CMS - Site Ayarları</title>
<style>
*{box-sizing:border-box}:root{--bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--accent:#2563eb;--accent-soft:#dbeafe}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}.layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.sidebar{background:#fff;border-right:1px solid var(--border);padding:24px;position:sticky;top:0;height:100vh;overflow:auto}.brand h1{margin:0 0 6px;font-size:24px}.brand p{margin:0 0 24px;color:var(--muted);font-size:13px}.nav a,.nav button{display:block;width:100%;text-align:left;text-decoration:none;color:#334155;background:transparent;border:0;border-radius:12px;padding:12px 14px;margin-bottom:8px;font-size:14px;cursor:pointer}.nav a:hover,.nav button:hover,.nav .active{background:var(--accent-soft);color:#0f172a}.main{padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:0 1px 2px rgba(15,23,42,.04);padding:20px;margin-bottom:18px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}label{display:block;margin-bottom:6px;font-size:14px;color:#475569}input,textarea{width:100%;border:1px solid #cbd5e1;background:#fff;border-radius:12px;padding:11px 12px;color:var(--text)}textarea{min-height:120px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button.btn{border:0;border-radius:12px;padding:11px 16px;font-weight:700;cursor:pointer}.primary{background:var(--accent);color:#fff}.secondary{background:#e2e8f0;color:var(--text)}.muted{color:var(--muted)}.status{display:none;margin-top:12px;padding:12px;border-radius:12px;font-size:14px}.status.ok{display:block;background:#dcfce7;color:#166534}.status.error{display:block;background:#fee2e2;color:#991b1b}@media (max-width:1100px){.layout{grid-template-columns:1fr}.sidebar{height:auto;position:static;border-right:0;border-bottom:1px solid var(--border)}.grid-2,.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar"><div class="brand"><h1>Vera CMS</h1><p>Global site ayarları</p></div><nav class="nav"><a href="/admin/">Dashboard</a><a href="/admin/pages.html">Sayfa Yönetimi</a><a href="/admin/settings.html" class="active">Site Ayarları</a><a href="/" target="_blank">Siteyi Aç</a><button id="logoutBtn">Çıkış Yap</button></nav></aside>
  <main class="main">
    <section class="card"><h1 style="margin:0 0 8px;">Global Site Ayarları</h1><p class="muted" style="margin:0;">Logo, header, footer, renk, global kod alanları ve genel genişlik burada yönetilir.</p><div id="status" class="status"></div></section>
    <section class="card"><h2 style="margin-top:0;">Temel Bilgiler</h2><div class="grid-2"><div><label for="siteTitle">Site Başlığı</label><input id="siteTitle" type="text" /></div><div><label for="logoText">Logo Yazısı</label><input id="logoText" type="text" /></div></div><div class="grid-2" style="margin-top:12px;"><div><label for="logoUrl">Logo Görsel URL</label><input id="logoUrl" type="text" /></div><div><label for="faviconUrl">Favicon URL</label><input id="faviconUrl" type="text" /></div></div><div style="margin-top:12px;"><label for="siteDescription">Site Açıklaması</label><textarea id="siteDescription"></textarea></div></section>
    <section class="card"><h2 style="margin-top:0;">İletişim ve Sosyal</h2><div class="grid-3"><div><label for="contactPhone">Telefon</label><input id="contactPhone" type="text" /></div><div><label for="contactEmail">E-posta</label><input id="contactEmail" type="text" /></div><div><label for="contactAddress">Adres</label><input id="contactAddress" type="text" /></div></div><div class="grid-3" style="margin-top:12px;"><div><label for="instagramUrl">Instagram</label><input id="instagramUrl" type="text" /></div><div><label for="facebookUrl">Facebook</label><input id="facebookUrl" type="text" /></div><div><label for="linkedinUrl">LinkedIn</label><input id="linkedinUrl" type="text" /></div></div></section>
    <section class="card"><h2 style="margin-top:0;">Tasarım</h2><div class="grid-3"><div><label for="siteBg">Site Arka Plan</label><input id="siteBg" type="color" /></div><div><label for="siteText">Site Yazı</label><input id="siteText" type="color" /></div><div><label for="siteAccent">Vurgu</label><input id="siteAccent" type="color" /></div></div><div class="grid-3" style="margin-top:12px;"><div><label for="siteCard">Kart</label><input id="siteCard" type="color" /></div><div><label for="siteBorder">Kenarlık</label><input id="siteBorder" type="color" /></div><div><label for="footerBg">Footer Arka Plan</label><input id="footerBg" type="color" /></div></div><div class="grid-3" style="margin-top:12px;"><div><label for="footerText">Footer Yazı</label><input id="footerText" type="color" /></div><div><label for="headerMaxWidth">Site Genişliği (px)</label><input id="headerMaxWidth" type="number" min="640" max="2400" /></div><div><label for="headerPadding">Dış Padding</label><input id="headerPadding" type="number" min="0" max="120" /></div></div><div class="grid-3" style="margin-top:12px;"><div><label for="navRadius">Menü Radius</label><input id="navRadius" type="number" min="0" max="999" /></div><div><label for="mainRadius">Main Radius</label><input id="mainRadius" type="number" min="0" max="60" /></div><div><label for="mainPadding">Main Padding</label><input id="mainPadding" type="number" min="0" max="120" /></div></div></section>
    <section class="card"><h2 style="margin-top:0;">Global HTML Alanları</h2><div style="margin-top:12px;"><label for="headerHtml">Header HTML</label><textarea id="headerHtml"></textarea></div><div style="margin-top:12px;"><label for="footerHtml">Footer HTML</label><textarea id="footerHtml"></textarea></div><div style="margin-top:12px;"><label for="headCode">&lt;head&gt; Ek Kod</label><textarea id="headCode"></textarea></div><div style="margin-top:12px;"><label for="footerCode">Footer Script / Kod</label><textarea id="footerCode"></textarea></div></section>
    <section class="card"><div class="actions" style="margin-top:0;"><button class="btn primary" id="saveBtn">Kaydet</button><button class="btn secondary" id="resetBtn">Varsayılanları Yükle</button></div></section>
  </main>
</div>
<script>
const defaults={siteTitle:'Site Başlığı',siteDescription:'',logoText:'Vera',logoUrl:'',faviconUrl:'',contactPhone:'',contactEmail:'',contactAddress:'',instagramUrl:'',facebookUrl:'',linkedinUrl:'',headerHtml:'',footerHtml:'',headCode:'',footerCode:'',siteBg:'#f8fafc',siteText:'#0f172a',siteAccent:'#2563eb',siteCard:'#ffffff',siteBorder:'#e2e8f0',footerBg:'#0f172a',footerText:'#e2e8f0',headerMaxWidth:1180,headerPadding:24,navRadius:999,mainRadius:18,mainPadding:24};
function showStatus(message,type){const box=document.getElementById('status'); box.className='status '+type; box.textContent=message;}
function applySettings(settings={}){const s={...defaults,...(settings||{})}; Object.keys(s).forEach(key=>{ const el=document.getElementById(key); if(el) el.value=s[key]; });}
function collectSettings(){const out={}; Object.keys(defaults).forEach(key=>{ const el=document.getElementById(key); if(!el) return; if(['headerMaxWidth','headerPadding','navRadius','mainRadius','mainPadding'].includes(key)) out[key]=Number(el.value||defaults[key]); else out[key]=el.value; }); return out;}
async function loadSettings(){ try{ const res=await fetch('/api/settings'); const data=await res.json(); applySettings(data.settings||{}); } catch(err){ showStatus('Ayarlar yüklenemedi.','error'); } }
async function saveSettings(){ try{ const res=await fetch('/api/settings',{ method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify(collectSettings()) }); const data=await res.json(); if(!data.ok){ showStatus(data.error||'Kayıt sırasında hata oluştu.','error'); return; } showStatus('Site ayarları kaydedildi.','ok'); } catch(err){ showStatus('Kayıt sırasında hata oluştu.','error'); } }
document.getElementById('saveBtn').addEventListener('click',saveSettings);document.getElementById('resetBtn').addEventListener('click',()=>applySettings(defaults));document.getElementById('logoutBtn').addEventListener('click',async()=>{ try{ await fetch('/api/logout',{ method:'POST' }); }catch(err){} window.location.href='/login.html'; });loadSettings();
</script>
</body>
</html>

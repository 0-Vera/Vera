<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vera CMS - Dashboard</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --danger: #dc2626;
    --success: #16a34a;
  }
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }
  .sidebar {
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: auto;
  }
  .brand {
    margin-bottom: 24px;
  }
  .brand h1 {
    margin: 0 0 6px;
    font-size: 24px;
  }
  .brand p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
  }
  .nav a,
  .nav button {
    display: block;
    width: 100%;
    text-align: left;
    text-decoration: none;
    color: #334155;
    background: transparent;
    border: 0;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    font-size: 14px;
    cursor: pointer;
  }
  .nav a:hover,
  .nav button:hover,
  .nav .active {
    background: var(--accent-soft);
    color: #0f172a;
  }
  .main {
    padding: 28px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    margin-bottom: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
  }
  .card h2,
  .card h3 {
    margin-top: 0;
  }
  .muted {
    color: var(--muted);
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  label {
    display: block;
    margin-bottom: 6px;
    font-size: 14px;
    color: #475569;
  }
  input, select {
    width: 100%;
    border: 1px solid #cbd5e1;
    background: #fff;
    border-radius: 12px;
    padding: 11px 12px;
    color: var(--text);
  }
  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  button.btn {
    border: 0;
    border-radius: 12px;
    padding: 11px 16px;
    font-weight: 700;
    cursor: pointer;
  }
  .primary { background: var(--accent); color: #fff; }
  .secondary { background: #e2e8f0; color: var(--text); }
  .danger { background: var(--danger); color: #fff; }
  .status {
    display: none;
    margin-top: 12px;
    padding: 12px;
    border-radius: 12px;
    font-size: 14px;
  }
  .status.ok { display: block; background: #dcfce7; color: #166534; }
  .status.error { display: block; background: #fee2e2; color: #991b1b; }
  .list-item {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: .2s;
  }
  .list-item:hover,
  .list-item.active {
    border-color: #93c5fd;
    background: #eff6ff;
  }
  .stat {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .small {
    font-size: 13px;
  }
  @media (max-width: 1100px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { height: auto; position: static; border-right: 0; border-bottom: 1px solid var(--border); }
    .cards, .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>Vera CMS</h1>
      <p>Dashboard ve menü yönetimi</p>
    </div>

    <nav class="nav">
      <a href="/admin/" class="active">Dashboard</a>
      <a href="/admin/pages.html">Sayfa Yönetimi</a>
      <a href="/admin/settings.html">Site Ayarları</a>
      <a href="/" target="_blank">Siteyi Aç</a>
      <button id="logoutBtn">Çıkış Yap</button>
    </nav>
  </aside>

  <main class="main">
    <div class="cards">
      <div class="card">
        <div class="stat" id="statPages">0</div>
        <div class="small muted">Toplam sayfa</div>
      </div>
      <div class="card">
        <div class="stat" id="statMenus">0</div>
        <div class="small muted">Toplam menü</div>
      </div>
      <div class="card">
        <div class="stat" id="statPublished">0</div>
        <div class="small muted">Yayındaki sayfa</div>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Menü Düzenle</h2>
        <p class="muted">Burada menüyü hangi sayfaya veya bağlantıya gideceğini belirlersin.</p>
        <div id="status" class="status"></div>

        <div style="margin-bottom:12px;">
          <label for="title">Menü Başlığı</label>
          <input id="title" type="text" placeholder="Örn: Hakkımızda" />
        </div>

        <div style="margin-bottom:12px;">
          <label for="slug">Menü Slug</label>
          <input id="slug" type="text" placeholder="hakkimizda" />
        </div>

        <div style="margin-bottom:12px;">
          <label for="type">Menü Tipi</label>
          <select id="type">
            <option value="page">Sayfaya bağla</option>
            <option value="url">Harici / özel link</option>
          </select>
        </div>

        <div id="pageWrap" style="margin-bottom:12px;">
          <label for="pageSlug">Bağlı Sayfa</label>
          <select id="pageSlug"></select>
        </div>

        <div id="urlWrap" style="display:none;margin-bottom:12px;">
          <label for="url">Bağlantı</label>
          <input id="url" type="text" placeholder="https://... veya /iletisim" />
        </div>

        <div style="margin-bottom:12px;">
          <label for="target">Hedef</label>
          <select id="target">
            <option value="_self">Aynı sekme</option>
            <option value="_blank">Yeni sekme</option>
          </select>
        </div>

        <div style="margin-bottom:12px;">
          <label for="parentSlug">Üst Menü</label>
          <select id="parentSlug">
            <option value="">Yok</option>
          </select>
        </div>

        <div style="margin-bottom:12px;">
          <label for="visible">Görünürlük</label>
          <select id="visible">
            <option value="true">Aktif</option>
            <option value="false">Pasif</option>
          </select>
        </div>

        <div style="margin-bottom:12px;">
          <label for="order">Sıra</label>
          <input id="order" type="number" min="0" value="0" />
        </div>

        <div class="actions">
          <button class="btn primary" id="saveBtn">Kaydet</button>
          <button class="btn secondary" id="newBtn">Yeni Menü</button>
          <button class="btn danger" id="deleteBtn">Sil</button>
        </div>
      </section>

      <section class="card">
        <h2>Kayıtlı Menüler</h2>
        <div id="menuList"></div>
      </section>
    </div>
  </main>
</div>

<script>
  let menus = [];
  let pages = [];
  let currentSlug = "";

  function showStatus(message, type) {
    const box = document.getElementById("status");
    box.className = "status " + type;
    box.textContent = message;
  }

  function clearStatus() {
    const box = document.getElementById("status");
    box.className = "status";
    box.textContent = "";
  }

  function slugify(text) {
    return String(text || "")
      .toLowerCase()
      .trim()
      .replace(/ğ/g, "g")
      .replace(/ü/g, "u")
      .replace(/ş/g, "s")
      .replace(/ı/g, "i")
      .replace(/ö/g, "o")
      .replace(/ç/g, "c")
      .replace(/[^a-z0-9\s-]/g, "")
      .replace(/\s+/g, "-")
      .replace(/-+/g, "-");
  }

  function updateTypeVisibility() {
    const type = document.getElementById("type").value;
    document.getElementById("pageWrap").style.display = type === "page" ? "block" : "none";
    document.getElementById("urlWrap").style.display = type === "url" ? "block" : "none";
  }

  function fillPageOptions() {
    const pageSelect = document.getElementById("pageSlug");
    pageSelect.innerHTML = "";

    if (!pages.length) {
      const option = document.createElement("option");
      option.value = "";
      option.textContent = "Önce sayfa oluştur";
      pageSelect.appendChild(option);
    } else {
      pages.forEach((page) => {
        const option = document.createElement("option");
        option.value = page.slug;
        option.textContent = `${page.title} (${page.slug})`;
        pageSelect.appendChild(option);
      });
    }
  }

  function fillParentOptions() {
    const parentSelect = document.getElementById("parentSlug");
    const current = parentSelect.value;
    parentSelect.innerHTML = '<option value="">Yok</option>';

    menus.forEach((menu) => {
      if (menu.slug === currentSlug) return;
      const option = document.createElement("option");
      option.value = menu.slug;
      option.textContent = menu.title + " (" + menu.slug + ")";
      parentSelect.appendChild(option);
    });

    if (current) parentSelect.value = current;
  }

  function fillForm(menu) {
    document.getElementById("title").value = menu.title || "";
    document.getElementById("slug").value = menu.slug || "";
    document.getElementById("type").value = menu.type || "page";
    document.getElementById("pageSlug").value = menu.pageSlug || "";
    document.getElementById("url").value = menu.url || "";
    document.getElementById("target").value = menu.target || "_self";
    document.getElementById("parentSlug").value = menu.parentSlug || "";
    document.getElementById("visible").value = String(menu.visible !== false);
    document.getElementById("order").value = Number.isFinite(menu.order) ? menu.order : 0;
    currentSlug = menu.slug || "";
    fillParentOptions();
    document.getElementById("parentSlug").value = menu.parentSlug || "";
    updateTypeVisibility();
  }

  function clearForm() {
    currentSlug = "";
    document.getElementById("title").value = "";
    document.getElementById("slug").value = "";
    document.getElementById("type").value = "page";
    document.getElementById("pageSlug").value = pages[0]?.slug || "";
    document.getElementById("url").value = "";
    document.getElementById("target").value = "_self";
    document.getElementById("parentSlug").value = "";
    document.getElementById("visible").value = "true";
    document.getElementById("order").value = menus.length;
    fillParentOptions();
    updateTypeVisibility();
  }

  function renderStats() {
    document.getElementById("statPages").textContent = pages.length;
    document.getElementById("statMenus").textContent = menus.length;
    document.getElementById("statPublished").textContent = pages.filter((p) => p.status === "published").length;
  }

  function renderList() {
    const list = document.getElementById("menuList");
    list.innerHTML = "";

    if (!menus.length) {
      list.innerHTML = '<div class="muted">Henüz menü yok.</div>';
      return;
    }

    menus
      .slice()
      .sort((a, b) => (a.order || 0) - (b.order || 0))
      .forEach((menu) => {
        const item = document.createElement("div");
        item.className = "list-item" + (menu.slug === currentSlug ? " active" : "");
        item.innerHTML = `
          <strong>${menu.title || "-"}</strong>
          <div class="muted">slug: ${menu.slug || "-"}</div>
          <div class="muted">tip: ${menu.type || "page"}</div>
          <div class="muted">hedef: ${menu.type === "url" ? (menu.url || "-") : (menu.pageSlug || "-")}</div>
          <div class="muted">üst menü: ${menu.parentSlug || "-"}</div>
          <div class="muted">durum: ${menu.visible === false ? "pasif" : "aktif"}</div>
        `;
        item.addEventListener("click", () => {
          fillForm(menu);
          renderList();
        });
        list.appendChild(item);
      });
  }

  async function loadPages() {
    const res = await fetch("/api/pages");
    const data = await res.json();
    pages = data.pages || [];
    fillPageOptions();
  }

  async function loadMenus() {
    const res = await fetch("/api/menu");
    const data = await res.json();
    menus = data.menus || [];
    fillParentOptions();
    renderList();
  }

  async function saveMenu() {
    clearStatus();

    const title = document.getElementById("title").value.trim();
    let slug = document.getElementById("slug").value.trim();
    const type = document.getElementById("type").value;
    const pageSlug = document.getElementById("pageSlug").value.trim();
    const url = document.getElementById("url").value.trim();
    const target = document.getElementById("target").value;
    const parentSlug = document.getElementById("parentSlug").value.trim();
    const visible = document.getElementById("visible").value === "true";
    const order = Number(document.getElementById("order").value || 0);

    if (!title) {
      showStatus("Menü başlığı zorunludur.", "error");
      return;
    }

    slug = slugify(slug || title);
    document.getElementById("slug").value = slug;

    if (type === "page" && !pageSlug) {
      showStatus("Bir sayfa seçmelisin.", "error");
      return;
    }

    if (type === "url" && !url) {
      showStatus("Bağlantı alanı zorunludur.", "error");
      return;
    }

    if (parentSlug && parentSlug === slug) {
      showStatus("Bir menü kendisinin alt menüsü olamaz.", "error");
      return;
    }

    try {
      const res = await fetch("/api/menu", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          title,
          slug,
          type,
          pageSlug: type === "page" ? pageSlug : "",
          url: type === "url" ? url : "",
          target,
          parentSlug,
          visible,
          order
        })
      });

      const data = await res.json();
      if (!data.ok) {
        showStatus(data.error || "Kaydetme sırasında hata oluştu.", "error");
        return;
      }

      menus = data.menus || [];
      currentSlug = slug;
      fillParentOptions();
      renderList();
      renderStats();
      showStatus("Menü kaydedildi.", "ok");
    } catch (err) {
      showStatus("Kaydetme sırasında hata oluştu.", "error");
    }
  }

  async function deleteMenu() {
    clearStatus();
    const slug = document.getElementById("slug").value.trim();

    if (!slug) {
      showStatus("Silmek için önce menü seç.", "error");
      return;
    }

    if (!confirm('"' + slug + '" menüsü silinsin mi?')) return;

    try {
      const res = await fetch("/api/menu?slug=" + encodeURIComponent(slug), { method: "DELETE" });
      const data = await res.json();

      if (!data.ok) {
        showStatus(data.error || "Silme sırasında hata oluştu.", "error");
        return;
      }

      menus = data.menus || [];
      clearForm();
      renderList();
      renderStats();
      showStatus("Menü silindi.", "ok");
    } catch (err) {
      showStatus("Silme sırasında hata oluştu.", "error");
    }
  }

  document.getElementById("title").addEventListener("input", () => {
    const slugInput = document.getElementById("slug");
    if (!currentSlug && !slugInput.value.trim()) {
      slugInput.value = slugify(document.getElementById("title").value);
    }
  });

  document.getElementById("type").addEventListener("change", updateTypeVisibility);
  document.getElementById("saveBtn").addEventListener("click", saveMenu);
  document.getElementById("newBtn").addEventListener("click", () => {
    clearForm();
    clearStatus();
    renderList();
  });
  document.getElementById("deleteBtn").addEventListener("click", deleteMenu);

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    try { await fetch("/api/logout", { method: "POST" }); } catch (err) {}
    window.location.href = "/login.html";
  });

  async function init() {
    try {
      await loadPages();
      await loadMenus();
      clearForm();
      renderStats();
    } catch (err) {
      showStatus("Veriler yüklenemedi.", "error");
    }
  }

  init();
</script>
</body>
</html>

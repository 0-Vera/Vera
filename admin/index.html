<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Vera CMS - Yönetim Paneli</title>
<style>
body {
  font-family: system-ui;
  margin: 0;
  background: #f4f6f8;
}
header {
  background: #111;
  color: white;
  padding: 20px;
  font-size: 20px;
}
.main {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}
.cards {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  max-width: 900px;
  width: 100%;
}
.card {
  background: white;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
  padding: 20px;
  flex: 1 1 260px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
.card h3 {
  margin: 0 0 10px 0;
}
.card p {
  flex: 1;
  margin: 0 0 20px 0;
  color: #555;
}
.card a.btn {
  background: #0b6cff;
  color: white;
  padding: 10px 16px;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 600;
}
.card a.btn:hover {
  background: #095ac3;
}
</style>
</head>
<body>
<header>Vera CMS – Yönetim Paneli</header>
<div class="main">
  <div class="cards">
    <div class="card">
      <h3>Sayfalar</h3>
      <p>Yeni sayfalar oluşturun ve mevcut sayfaları düzenleyin.</p>
      <a href="pages.html" class="btn">Sayfa Yönetimi</a>
    </div>
    <div class="card">
      <h3>Site Ayarları</h3>
      <p>Sitenizin renkleri, başlığı ve genel görünümü ile ilgili ayarları yapılandırın.</p>
      <a href="settings.html" class="btn">Site Ayarları</a>
    </div>
  </div>
</div>
</body>
</html>
